    // Global fade-in observer for schedule cards
    const obs2 = new IntersectionObserver(entries => {
        entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); obs2.unobserve(e.target); } });
    }, { threshold: 0.1 });
    document.querySelectorAll('.schedule-grid .fade-in').forEach(el => obs2.observe(el));

    window.addEventListener('scroll', () => {
        document.getElementById('fixedNav').classList.toggle('scrolled', window.scrollY > 50);
    });
})();
</script>
<!-- Theme Toggle (injected into .fixed-nav) -->
<style>
.theme-toggle {
  margin-left: auto;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--card);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.9rem;
  transition: all 0.3s;
  opacity: 0.7;
  padding: 0;
  line-height: 1;
  flex-shrink: 0;
}
.theme-toggle:hover {
  opacity: 1;
  transform: scale(1.1);
  border-color: var(--accent);
  box-shadow: 0 0 12px var(--glow);
}
</style>
<script>
(function() {
  var KEY = 'hyperion-theme';
  var toggle = document.getElementById('themeToggle');
  var icon = document.getElementById('themeIcon');

  function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    icon.textContent = theme === 'light' ? '\u{1F319}' : '\u{2600}\u{FE0F}';
    localStorage.setItem(KEY, theme);
    window.dispatchEvent(new CustomEvent('themechange', { detail: { theme: theme } }));
  }

  var saved = localStorage.getItem(KEY);
  if (saved) {
    applyTheme(saved);
  } else {
    icon.textContent = '\u{2600}\u{FE0F}';
  }

  toggle.addEventListener('click', function() {
    var current = document.documentElement.getAttribute('data-theme');
    applyTheme(current === 'light' ? 'dark' : 'light');
  });

  // Utility for canvas code: read theme-aware CSS var values
  window.getThemeRGB = function(varName) {
    return getComputedStyle(document.documentElement).getPropertyValue(varName).trim();
  };
})();
</script>
