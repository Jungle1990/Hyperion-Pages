<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Breakdowns | Hyperion</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f1117;
  --card: #1a1d27;
  --card-hover: #222636;
  --accent: #6c63ff;
  --accent2: #ff6b6b;
  --accent3: #4ecdc4;
  --accent4: #ffe66d;
  --text: #e8e8f0;
  --text-dim: #8888a0;
  --border: #2a2d3a;
  --glow: rgba(108, 99, 255, 0.15);
  --font-sans: 'Noto Sans SC', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  --radius: 14px;
}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body { font-family: var(--font-sans); background: var(--bg); color: var(--text); line-height: 1.6; min-height: 100vh; }
::selection { background: var(--accent); color: #fff; }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ── Fixed Nav ── */
.fixed-nav { position: fixed; top: 0; left: 0; right: 0; z-index: 9998; padding: 0.6rem 1.5rem; font-size: 0.8rem; display: flex; align-items: center; gap: 0.4rem; background: rgba(var(--bg-rgb),0.85); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border-bottom: 1px solid transparent; transition: border-color 0.3s; }
.fixed-nav.scrolled { border-bottom-color: var(--border); }
.fixed-nav a { color: var(--text-dim); text-decoration: none; transition: color 0.3s; }
.fixed-nav a:hover { color: var(--accent); }
.fixed-nav .sep { color: var(--text-dim); margin: 0 0.15rem; }

/* ── Header ── */
.header {
  text-align: center;
  padding: 5rem 2rem 2rem;
}
.header-icon { font-size: 3rem; margin-bottom: 0.8rem; }
.header h1 {
  font-size: 2rem;
  font-weight: 800;
  margin-bottom: 0.3rem;
}
.header-sub {
  color: var(--text-dim);
  font-size: 0.9rem;
}
.stats {
  display: flex;
  justify-content: center;
  gap: 2.5rem;
  margin-top: 1.5rem;
}
.stat-num { font-size: 1.8rem; font-weight: 800; font-family: var(--font-mono); color: var(--accent); }
.stat-label { font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }

/* ── Book Grid ── */
.container { max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }
.group-label {
  font-size: 0.8rem;
  color: var(--text-dim);
  font-family: var(--font-mono);
  letter-spacing: 1px;
  text-transform: uppercase;
  margin: 2rem 0 0.8rem;
}
.book-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 1rem;
}
.book-card {
  display: flex;
  align-items: center;
  gap: 14px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1rem 1.2rem;
  text-decoration: none;
  color: var(--text);
  transition: all 0.3s;
}
.book-card:hover {
  border-color: var(--accent);
  transform: translateY(-2px);
  box-shadow: 0 6px 24px var(--glow);
  background: var(--card-hover);
}
.book-icon { font-size: 2rem; flex-shrink: 0; }
.book-body { flex: 1; min-width: 0; }
.book-title { font-weight: 600; font-size: 0.95rem; }
.book-author { font-size: 0.75rem; color: var(--text-dim); }
.book-badge {
  font-family: var(--font-mono);
  font-size: 0.65rem;
  color: var(--accent);
  background: rgba(108,99,255,0.1);
  padding: 2px 8px;
  border-radius: 2rem;
  white-space: nowrap;
  flex-shrink: 0;
}

/* ── Syntopical Link ── */
.syntopical-link {
  display: block;
  text-align: center;
  margin-top: 2rem;
  padding: 1rem;
  border: 1px dashed var(--border);
  border-radius: var(--radius);
  color: var(--accent3);
  text-decoration: none;
  font-size: 0.9rem;
  transition: all 0.3s;
}
.syntopical-link:hover {
  border-color: var(--accent3);
  background: rgba(78,205,196,0.05);
}

/* ── Footer ── */
.footer { text-align: center; padding: 2rem; color: var(--text-dim); font-size: 0.7rem; border-top: 1px solid var(--border); margin-top: 2rem; }
.footer a { color: var(--accent); text-decoration: none; }

@media (max-width: 600px) {
  .book-grid { grid-template-columns: 1fr; }
  .stats { gap: 1.5rem; }
}
/* ── RGB triplet defaults (dark) ── */
:root {
  --bg-rgb: 15,17,23;
  --card-rgb: 26,29,39;
  --card-hover-rgb: 34,38,54;
  --text-rgb: 232,232,240;
  --text-dim-rgb: 136,136,160;
  --border-rgb: 42,45,58;
  --accent-rgb: 108,99,255;
  --accent2-rgb: 255,107,107;
  --accent3-rgb: 78,205,196;
  --accent4-rgb: 255,230,109;
  --bg-hero: #13151f;
  --code-bg: #12141c;
  --code-border: #1e2030;
}

/* ── Light theme overrides ── */
[data-theme="light"] {
  --bg: #f5f5f7;
  --card: #ffffff;
  --card-hover: #f0f0f5;
  --accent: #5b52e6;
  --accent2: #e55d5d;
  --accent3: #3cb8b0;
  --accent4: #c49800;
  --text: #1a1a2e;
  --text-dim: #6e6e82;
  --border: #dcdce5;
  --glow: rgba(91,82,230,0.10);
  --success: #059669;
  --warning: #b45309;
  --danger: #dc2626;

  --bg-rgb: 245,245,247;
  --card-rgb: 255,255,255;
  --card-hover-rgb: 240,240,245;
  --text-rgb: 26,26,46;
  --text-dim-rgb: 110,110,130;
  --border-rgb: 220,220,229;
  --accent-rgb: 91,82,230;
  --accent2-rgb: 229,93,93;
  --accent3-rgb: 60,184,176;
  --accent4-rgb: 196,152,0;
  --bg-hero: #e8e8ed;
  --code-bg: #f0f0f5;
  --code-border: #dcdce5;
}

</style>
</head>
<body>

<nav class="fixed-nav" id="fixedNav">
  <a href="../index.html">Hyperion</a>
  <span class="sep">/</span>
  <span style="color:var(--text)">Book Breakdowns</span>
<button class="theme-toggle" id="themeToggle" aria-label="Toggle theme"><span class="theme-toggle-icon" id="themeIcon"></span></button>
</nav>

<div class="header">
  <div class="header-icon">📖</div>
  <h1>Book Breakdowns</h1>
  <div class="header-sub">Interactive chapter breakdowns with the Feynman Method</div>
  <div class="stats" id="stats"></div>
</div>

<main class="container">
  <div class="group-label">Technical</div>
  <div class="book-grid" id="technicalGrid"></div>

  <div class="group-label">Novels</div>
  <div class="book-grid" id="novelGrid"></div>

  <div id="syntopicalSlot"></div>
</main>

<div class="footer">
  Built with the <a href="https://en.wikipedia.org/wiki/Feynman_Technique">Feynman Method</a>
</div>

<script>
const books = [
  {
    "slug": "algorithms4",
    "type": "technical",
    "title": "算法（第四版）",
    "titleEn": "Algorithms, 4th Edition",
    "author": "Robert Sedgewick & Kevin Wayne",
    "icon": "🔬",
    "chapters": 25,
    "htmlCount": 29
  },
  {
    "slug": "baiyexing",
    "type": "novel",
    "title": "白夜行",
    "titleEn": "Journey Under the Midnight Sun",
    "author": "東野圭吾",
    "icon": "🌓",
    "chapters": 0,
    "htmlCount": 9
  },
  {
    "slug": "hongloumeng",
    "type": "novel",
    "title": "红楼梦",
    "titleEn": "Dream of the Red Chamber",
    "author": "曹雪芹 / 高鹗(续)",
    "icon": "🏮",
    "chapters": 0,
    "htmlCount": 9
  },
  {
    "slug": "kanren-de-yishu",
    "type": "technical",
    "title": "看人的艺术",
    "titleEn": "Snoop: What Your Stuff Says About You",
    "author": "山姆·高斯林 (Sam Gosling)",
    "icon": "🔍",
    "chapters": 11,
    "htmlCount": 15
  },
  {
    "slug": "lunyu-biecai",
    "type": "technical",
    "title": "论语别裁",
    "titleEn": "The Other Way of Reading the Analects",
    "author": "南怀瑾",
    "icon": "📜",
    "chapters": 20,
    "htmlCount": 24
  },
  {
    "slug": "more-programming-pearls",
    "type": "technical",
    "title": "编程珠玑（续）",
    "titleEn": "More Programming Pearls",
    "author": "Jon Bentley",
    "icon": "💎",
    "chapters": 15,
    "htmlCount": 19
  },
  {
    "slug": "renxing-de-ruodian",
    "type": "technical",
    "title": "人性的弱点",
    "titleEn": "How to Win Friends and Influence People",
    "author": "戴尔·卡耐基 (Dale Carnegie)",
    "icon": "🤝",
    "chapters": 15,
    "htmlCount": 19
  },
  {
    "slug": "ruhe-xuexi",
    "type": "technical",
    "title": "如何学习",
    "titleEn": "How We Learn",
    "author": "本尼迪克特·凯里 (Benedict Carey)",
    "icon": "🧠",
    "chapters": 10,
    "htmlCount": 14
  },
  {
    "slug": "ruhe-yuedu",
    "type": "technical",
    "title": "如何阅读一本书",
    "titleEn": "How to Read a Book",
    "author": "莫提默·J·艾德勒 & 查尔斯·范多伦 (Mortimer J. Adler & Charles Van Doren)",
    "icon": "📚",
    "chapters": 21,
    "htmlCount": 25
  },
  {
    "slug": "shaoyouren-zou-de-lu",
    "type": "technical",
    "title": "少有人走的路",
    "titleEn": "The Road Less Traveled",
    "author": "斯科特·派克 (M. Scott Peck)",
    "icon": "🛤️",
    "chapters": 12,
    "htmlCount": 16
  },
  {
    "slug": "shehuixing-dongwu",
    "type": "technical",
    "title": "社会性动物",
    "titleEn": "The Social Animal (12th Edition)",
    "author": "埃利奥特·阿伦森 (Elliot Aronson)",
    "icon": "🦁",
    "chapters": 9,
    "htmlCount": 13
  },
  {
    "slug": "sikao-kuaiyuman",
    "type": "technical",
    "title": "思考，快与慢",
    "titleEn": "Thinking, Fast and Slow",
    "author": "丹尼尔·卡尼曼 (Daniel Kahneman)",
    "icon": "🧠",
    "chapters": 38,
    "htmlCount": 43
  },
  {
    "slug": "yingyu-cigen",
    "type": "technical",
    "title": "英语词根与单词的说文解字",
    "titleEn": "English Word Roots: Shuowen Jiezi",
    "author": "李平武",
    "icon": "🌿",
    "chapters": 22,
    "htmlCount": 28
  }
];
const hasSyntopical = true;

const techGrid = document.getElementById('technicalGrid');
const novelGrid = document.getElementById('novelGrid');

let techCount = 0, novelCount = 0, totalChapters = 0;

books.forEach(b => {
  const card = document.createElement('a');
  card.className = 'book-card';
  card.href = b.slug + '/index.html';
  const badge = b.type === 'technical' ? b.chapters + ' ch' : b.htmlCount + ' lenses';
  card.innerHTML = `
    <span class="book-icon">${b.icon}</span>
    <div class="book-body">
      <div class="book-title">${b.title}</div>
      <div class="book-author">${b.author}</div>
    </div>
    <span class="book-badge">${badge}</span>`;

  if (b.type === 'novel') {
    novelGrid.appendChild(card);
    novelCount++;
  } else {
    techGrid.appendChild(card);
    techCount++;
    totalChapters += b.chapters || 0;
  }
});

document.getElementById('stats').innerHTML = `
  <div><div class="stat-num">${books.length}</div><div class="stat-label">Books</div></div>
  <div><div class="stat-num">${totalChapters}</div><div class="stat-label">Chapters</div></div>`;

if (hasSyntopical) {
  document.getElementById('syntopicalSlot').innerHTML =
    '<a class="syntopical-link" href="syntopical.html">📚 Syntopical Reading — Cross-book themes &amp; comparisons</a>';
}

window.addEventListener('scroll', () => {
  document.getElementById('fixedNav').classList.toggle('scrolled', window.scrollY > 50);
});
</script>
<!-- Theme Toggle (injected into .fixed-nav) -->
<style>
.theme-toggle {
  margin-left: auto;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--card);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.9rem;
  transition: all 0.3s;
  opacity: 0.7;
  padding: 0;
  line-height: 1;
  flex-shrink: 0;
}
.theme-toggle:hover {
  opacity: 1;
  transform: scale(1.1);
  border-color: var(--accent);
  box-shadow: 0 0 12px var(--glow);
}
</style>
<script>
(function() {
  var KEY = 'hyperion-theme';
  var toggle = document.getElementById('themeToggle');
  var icon = document.getElementById('themeIcon');

  function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    icon.textContent = theme === 'light' ? '\u{1F319}' : '\u{2600}\u{FE0F}';
    localStorage.setItem(KEY, theme);
    window.dispatchEvent(new CustomEvent('themechange', { detail: { theme: theme } }));
  }

  var saved = localStorage.getItem(KEY);
  if (saved) {
    applyTheme(saved);
  } else {
    icon.textContent = '\u{2600}\u{FE0F}';
  }

  toggle.addEventListener('click', function() {
    var current = document.documentElement.getAttribute('data-theme');
    applyTheme(current === 'light' ? 'dark' : 'light');
  });

  // Utility for canvas code: read theme-aware CSS var values
  window.getThemeRGB = function(varName) {
    return getComputedStyle(document.documentElement).getPropertyValue(varName).trim();
  };
})();
</script>

</body>
</html>
