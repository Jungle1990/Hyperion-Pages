*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
    --bg: #0f1117; --card: #1a1d27; --card-hover: #222636;
    --accent: #6c63ff; --accent2: #ff6b6b; --accent3: #4ecdc4; --accent4: #ffe66d;
    --text: #e8e8f0; --text-dim: #8888a0; --border: #2a2d3a; --glow: rgba(var(--accent-rgb),0.15);
    --bg-rgb: 15,17,23; --card-rgb: 26,29,39;
    --text-rgb: 232,232,240; --text-dim-rgb: 136,136,160;
    --border-rgb: 42,45,58; --accent-rgb: 108,99,255;
    --accent2-rgb: 255,107,107; --accent3-rgb: 78,205,196; --accent4-rgb: 255,230,109;
    --bg-hero: #13151f;
}

html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'Noto Sans SC', sans-serif; }
.app { display: flex; flex-direction: column; height: 100vh; width: 100vw; }

/* ── Hero ── */
.hero {
    height: 18vh; min-height: 130px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
    background: linear-gradient(180deg, var(--bg-hero) 0%, var(--bg) 100%);
}
.hero canvas { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }
.hero-content { position: relative; z-index: 1; text-align: center; }
.hero h1 {
    font-size: clamp(1.4rem, 3vw, 2.2rem); font-weight: 700;
    background: linear-gradient(135deg, var(--accent3) 0%, var(--accent) 50%, var(--accent4) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.hero .subtitle { margin-top: 6px; font-size: clamp(0.8rem, 1.4vw, 1rem); color: var(--text-dim); font-weight: 300; }
.back-link { position: absolute; top: 16px; left: 20px; color: var(--text-dim); text-decoration: none; font-size: 0.85rem; z-index: 2; transition: color 0.2s; }
.back-link:hover { color: var(--accent3); }

/* ── Controls ── */
.controls {
    position: sticky; top: 0; z-index: 20;
    display: flex; align-items: center; gap: 14px; padding: 8px 20px;
    background: rgba(var(--bg-rgb),0.92); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border); flex-wrap: wrap;
}
.controls-label { font-size: 0.75rem; color: var(--text-dim); font-family: 'JetBrains Mono', monospace; white-space: nowrap; }
.sort-btn {
    padding: 4px 10px; border-radius: 8px; border: 1px solid var(--border);
    background: transparent; color: var(--text-dim); font-family: 'Noto Sans SC', sans-serif;
    font-size: 0.75rem; cursor: pointer; transition: all 0.2s;
}
.sort-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

/* ── Heatmap area ── */
.heatmap-area { flex: 1; overflow: auto; position: relative; }
.heatmap-area canvas { display: block; }

/* ── Tooltip ── */
.tooltip {
    position: fixed; z-index: 30; background: var(--card); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 14px; max-width: 300px; pointer-events: none;
    opacity: 0; transition: opacity 0.15s; box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}
.tooltip.visible { opacity: 1; }
.tooltip-symbol { font-size: 0.85rem; font-weight: 700; margin-bottom: 2px; }
.tooltip-chapter { font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; color: var(--text-dim); margin-bottom: 6px; }
.tooltip-context { font-size: 0.78rem; color: var(--text-dim); line-height: 1.5; }

/* ── Sparkline panel ── */
.sparkline-panel {
    position: fixed; right: 0; top: 0; bottom: 0; width: 320px; z-index: 40;
    background: var(--card); border-left: 1px solid var(--border);
    transform: translateX(100%); transition: transform 0.3s ease;
    overflow-y: auto; padding: 20px;
}
.sparkline-panel.visible { transform: translateX(0); }
.sparkline-close { position: absolute; top: 12px; right: 16px; background: none; border: none; color: var(--text-dim); font-size: 1.4rem; cursor: pointer; }
.sparkline-close:hover { color: var(--accent2); }
.sparkline-header { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
.sparkline-icon { font-size: 1.5rem; }
.sparkline-name { font-size: 1.1rem; font-weight: 700; }
.sparkline-name-en { font-size: 0.78rem; color: var(--text-dim); }
.sparkline-canvas { width: 100%; height: 80px; margin-bottom: 12px; }
.sparkline-occurrences { display: flex; flex-direction: column; gap: 6px; }
.occ-row { display: flex; align-items: baseline; gap: 8px; font-size: 0.8rem; }
.occ-ch { font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; color: var(--accent); min-width: 40px; }
.occ-ctx { color: var(--text-dim); }

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
/* ── RGB triplet defaults (dark) ── */
:root {

  --code-border: #1e2030;
}

/* ── Light theme overrides ── */
[data-theme="light"] {

  _tc.accent = s.getPropertyValue('--accent-rgb').trim();
}
_refreshTC();
window.addEventListener('themechange', function() { _refreshTC(); });

// ══════════════════════════════════════════════════
// DOM REFS
// ══════════════════════════════════════════════════
const $hero = document.getElementById('heroCanvas');
const $heatmap = document.getElementById('heatmapCanvas');
const $heatmapArea = document.getElementById('heatmapArea');
const $tooltip = document.getElementById('tooltip');
const $ttSymbol = document.getElementById('ttSymbol');
const $ttChapter = document.getElementById('ttChapter');
const $ttContext = document.getElementById('ttContext');
const $sparkline = document.getElementById('sparklinePanel');
const $spIcon = document.getElementById('spIcon');
const $spName = document.getElementById('spName');
const $spNameEn = document.getElementById('spNameEn');
const $spCanvas = document.getElementById('sparklineCanvas');
const $spOccs = document.getElementById('spOccurrences');

// ══════════════════════════════════════════════════
// UTILITY
// ══════════════════════════════════════════════════
function dpr() { return window.devicePixelRatio || 1; }
function sizeCanvas(canvas, w, h) {
    const r = dpr();
    canvas.width = w * r; canvas.height = h * r;
    canvas.style.width = w + 'px'; canvas.style.height = h + 'px';
    const ctx = canvas.getContext('2d');
    ctx.setTransform(r, 0, 0, r, 0, 0);
    return ctx;
}

// Build occurrence lookup: symbolId → chapter → {intensity, context}
const occMap = {};
let maxIntensity = 1;
occurrences.forEach(o => {
    if (!occMap[o.symbol]) occMap[o.symbol] = {};
    occMap[o.symbol][o.chapter] = o;
    if (o.intensity > maxIntensity) maxIntensity = o.intensity;
});

function getSymbolFreq(sym) {
    return occurrences.filter(o => o.symbol === sym.id).length;
}

function getSymbolFirst(sym) {
    const occs = occurrences.filter(o => o.symbol === sym.id);
    return occs.length > 0 ? Math.min(...occs.map(o => o.chapter)) : 999;
}

function getSortedSymbols() {
    const sorted = [...symbols];
    if (sortMode === 'frequency') {
        sorted.sort((a, b) => getSymbolFreq(b) - getSymbolFreq(a));
    } else if (sortMode === 'first') {
        sorted.sort((a, b) => getSymbolFirst(a) - getSymbolFirst(b));
    } else {
        sorted.sort((a, b) => a.name.localeCompare(b.name, 'zh'));
    }
    return sorted;
}

// ══════════════════════════════════════════════════
// HERO PARTICLES
// ══════════════════════════════════════════════════
function initHero() {
    const heroSection = document.querySelector('.hero');
    const w = heroSection.clientWidth; const h = heroSection.clientHeight;
    const ctx = sizeCanvas($hero, w, h);
    const particles = [];
    const colors = symbols.map(s => s.color || '#6c63ff').slice(0, 6);
    for (let i = 0; i < 40; i++) {
        particles.push({
            x: Math.random() * w, y: Math.random() * h,
            r: Math.random() * 1.5 + 0.5, vx: (Math.random() - 0.5) * 0.2, vy: (Math.random() - 0.5) * 0.15,
            alpha: Math.random() * 0.3 + 0.1,
            color: colors[Math.floor(Math.random() * colors.length)],
        });
    }
    function draw() {
        ctx.clearRect(0, 0, w, h);
        particles.forEach(p => {
            p.x += p.vx; p.y += p.vy;
            if (p.x < 0) p.x = w; if (p.x > w) p.x = 0;
            if (p.y < 0) p.y = h; if (p.y > h) p.y = 0;
            ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
            ctx.fillStyle = p.color; ctx.globalAlpha = p.alpha; ctx.fill();
        });
        ctx.globalAlpha = 1;
        requestAnimationFrame(draw);
    }
    draw();
}

// ══════════════════════════════════════════════════
// HEATMAP DRAWING
// ══════════════════════════════════════════════════
function drawHeatmap() {
    const sorted = getSortedSymbols();
    const numCols = maxChapter;
    const canvasW = LABEL_W + numCols * CELL_W + 40;
    const canvasH = HEADER_H + sorted.length * CELL_H + 20;
    const ctx = sizeCanvas($heatmap, canvasW, canvasH);
    ctx.clearRect(0, 0, canvasW, canvasH);

    // ── Column headers (chapters) ──
    ctx.font = '9px "JetBrains Mono", monospace';
    ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
    for (let ch = 1; ch <= numCols; ch++) {
        const x = LABEL_W + (ch - 1) * CELL_W + CELL_W / 2;
        if (ch % 5 === 0 || ch === 1 || ch === numCols) {
            ctx.fillStyle = `rgba(${_tc.textDim},0.5)`;
            ctx.fillText(ch, x, HEADER_H - 4);
        }
        // Grid column line
        ctx.beginPath(); ctx.moveTo(x, HEADER_H); ctx.lineTo(x, canvasH - 20);
        ctx.strokeStyle = `rgba(${_tc.border},0.2)`; ctx.lineWidth = 0.5; ctx.stroke();
    }

    // ── Row labels + cells ──
    sorted.forEach((sym, row) => {
        const y = HEADER_H + row * CELL_H;
        const cy = y + CELL_H / 2;
        const isSelected = selectedSymbol === sym.id;

        // Row background on hover/select
        if (isSelected) {
            ctx.fillStyle = `rgba(${_tc.accent},0.06)`;
            ctx.fillRect(0, y, canvasW, CELL_H);
        }

        // Row separator
        ctx.beginPath(); ctx.moveTo(LABEL_W, y); ctx.lineTo(canvasW - 20, y);
        ctx.strokeStyle = `rgba(${_tc.border},0.3)`; ctx.lineWidth = 0.5; ctx.stroke();

        // Label: icon + name
        ctx.font = '11px "Noto Sans SC", sans-serif';
        ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
        ctx.fillStyle = isSelected ? sym.color || `rgb(${_tc.text})` : `rgba(${_tc.text},0.7)`;
        const label = (sym.icon || '') + ' ' + sym.name;
        ctx.fillText(label, LABEL_W - 10, cy);

        // Frequency badge
        const freq = getSymbolFreq(sym);
        ctx.font = '9px "JetBrains Mono", monospace';
        ctx.fillStyle = `rgba(${_tc.textDim},0.3)`;
        ctx.textAlign = 'left';
        ctx.fillText('×' + freq, LABEL_W - 8, cy + 10);

        // Heatmap cells
        for (let ch = 1; ch <= numCols; ch++) {
            const occ = (occMap[sym.id] || {})[ch];
            if (!occ) continue;
            const x = LABEL_W + (ch - 1) * CELL_W + CELL_W / 2;
            const normI = occ.intensity / maxIntensity;
            const r = 2 + normI * (CELL_W / 2 - 3);
            const color = sym.color || '#6c63ff';

            // Glow
            const grd = ctx.createRadialGradient(x, cy, 0, x, cy, r * 2);
            grd.addColorStop(0, color + '44');
            grd.addColorStop(1, color + '00');
            ctx.beginPath(); ctx.arc(x, cy, r * 2, 0, Math.PI * 2);
            ctx.fillStyle = grd; ctx.fill();

            // Dot
            ctx.beginPath(); ctx.arc(x, cy, r, 0, Math.PI * 2);
            ctx.fillStyle = color;
            ctx.globalAlpha = 0.3 + normI * 0.6;
            ctx.fill();
            ctx.globalAlpha = 1;

            // Store hit data
            occ._x = x; occ._y = cy; occ._r = Math.max(r, 6);
            occ._sym = sym;
        }
    });

    // Store row hit data for click-to-expand
    sorted.forEach((sym, row) => {
        sym._rowY = HEADER_H + row * CELL_H;
        sym._rowH = CELL_H;
    });
}

// ══════════════════════════════════════════════════
// INTERACTIONS
// ══════════════════════════════════════════════════
function setSort(mode, btn) {
    sortMode = mode;
    document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    drawHeatmap();
}

$heatmapArea.addEventListener('mousemove', (e) => {
    const rect = $heatmap.getBoundingClientRect();
    const mx = (e.clientX - rect.left) * dpr() / dpr();
    const my = (e.clientY - rect.top) * dpr() / dpr();

    let hit = null;
    occurrences.forEach(o => {
        if (o._x === undefined) return;
        const dx = mx - o._x; const dy = my - o._y;
        if (Math.sqrt(dx * dx + dy * dy) < o._r + 4) hit = o;
    });

    if (hit) {
        hoveredCell = hit;
        $ttSymbol.textContent = (hit._sym.icon || '') + ' ' + hit._sym.name;
        $ttChapter.textContent = '第 ' + hit.chapter + ' 章 · 强度 ' + hit.intensity;
        $ttContext.textContent = hit.context || '';
        $tooltip.classList.add('visible');
        $tooltip.style.left = (e.clientX + 16) + 'px';
        $tooltip.style.top = (e.clientY - 10) + 'px';
        $heatmapArea.style.cursor = 'pointer';
    } else {
        hoveredCell = null;
        $tooltip.classList.remove('visible');
        // Check if hovering over a row label area
        const sorted = getSortedSymbols();
        let overRow = false;
        sorted.forEach(sym => {
            if (mx < LABEL_W && my >= sym._rowY && my < sym._rowY + sym._rowH) {
                overRow = true;
                $heatmapArea.style.cursor = 'pointer';
            }
        });
        if (!overRow) $heatmapArea.style.cursor = 'default';
    }
});

$heatmapArea.addEventListener('mouseleave', () => {
    hoveredCell = null;
    $tooltip.classList.remove('visible');
});

$heatmapArea.addEventListener('click', (e) => {
    const rect = $heatmap.getBoundingClientRect();
    const mx = (e.clientX - rect.left);
    const my = (e.clientY - rect.top);

    // Click on row label → open sparkline panel
    if (mx < LABEL_W) {
        const sorted = getSortedSymbols();
        sorted.forEach(sym => {
            if (my >= sym._rowY && my < sym._rowY + sym._rowH) {
                showSparkline(sym);
            }
        });
        return;
    }
    // Click on cell → open sparkline for that symbol
    if (hoveredCell && hoveredCell._sym) {
        showSparkline(hoveredCell._sym);
    }
});

// ══════════════════════════════════════════════════
// SPARKLINE PANEL
// ══════════════════════════════════════════════════
function showSparkline(sym) {
    selectedSymbol = sym.id;
    $spIcon.textContent = sym.icon || '●';
    $spName.textContent = sym.name;
    $spNameEn.textContent = sym.nameEn || '';

    // Draw sparkline
    const w = 280; const h = 60;
    const ctx = sizeCanvas($spCanvas, w, h);
    ctx.clearRect(0, 0, w, h);
    const color = sym.color || '#6c63ff';

    // Build intensity array per chapter
    const data = [];
    for (let ch = 1; ch <= maxChapter; ch++) {
        const occ = (occMap[sym.id] || {})[ch];
        data.push(occ ? occ.intensity : 0);
    }
    const maxVal = Math.max(...data, 1);
    const xStep = w / (data.length - 1 || 1);

    // Area fill
    ctx.beginPath();
    ctx.moveTo(0, h);
    data.forEach((v, i) => {
        const x = i * xStep;
        const y = h - (v / maxVal) * (h - 4);
        if (i === 0) ctx.lineTo(x, y);
        else {
            const px = (i - 1) * xStep;
            const py = h - (data[i - 1] / maxVal) * (h - 4);
            const cpx = (px + x) / 2;
            ctx.bezierCurveTo(cpx, py, cpx, y, x, y);
        }
    });
    ctx.lineTo(w, h); ctx.closePath();
    ctx.fillStyle = color + '22'; ctx.fill();

    // Line
    ctx.beginPath();
    data.forEach((v, i) => {
        const x = i * xStep;
        const y = h - (v / maxVal) * (h - 4);
        if (i === 0) ctx.moveTo(x, y);
        else {
            const px = (i - 1) * xStep;
            const py = h - (data[i - 1] / maxVal) * (h - 4);
            const cpx = (px + x) / 2;
            ctx.bezierCurveTo(cpx, py, cpx, y, x, y);
        }
    });
    ctx.strokeStyle = color; ctx.lineWidth = 1.5; ctx.stroke();

    // Dots for non-zero
    data.forEach((v, i) => {
        if (v === 0) return;
        const x = i * xStep;
        const y = h - (v / maxVal) * (h - 4);
        ctx.beginPath(); ctx.arc(x, y, 3, 0, Math.PI * 2);
        ctx.fillStyle = color; ctx.fill();
    });

    // List occurrences
    $spOccs.innerHTML = '';
    const symOccs = occurrences.filter(o => o.symbol === sym.id).sort((a, b) => a.chapter - b.chapter);
    symOccs.forEach(o => {
        const row = document.createElement('div');
        row.className = 'occ-row';
        row.innerHTML = '<span class="occ-ch">Ch.' + o.chapter + '</span><span class="occ-ctx">' + (o.context || '') + '</span>';
        $spOccs.appendChild(row);
    });

    $sparkline.classList.add('visible');
    drawHeatmap();
}

function closeSparkline() {
    $sparkline.classList.remove('visible');
    selectedSymbol = null;
    drawHeatmap();
}

document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeSparkline(); });

// ══════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════
let resizeTimer;
window.addEventListener('resize', () => { clearTimeout(resizeTimer); resizeTimer = setTimeout(() => { initHero(); drawHeatmap(); }, 100); });

document.fonts.ready.then(() => {
    initHero();
    drawHeatmap();
});
</script>
<!-- Theme Toggle -->
<button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
  <span class="theme-toggle-icon" id="themeIcon"></span>
</button>
<style>
.theme-toggle {
  position: fixed;
  top: 1rem;
  right: 1rem;
  z-index: 9999;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--card);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.1rem;
  transition: all 0.3s;
  opacity: 0.7;
  padding: 0;
  line-height: 1;
}
.theme-toggle:hover {
  opacity: 1;
  transform: scale(1.1);
  border-color: var(--accent);
  box-shadow: 0 0 12px var(--glow);
}
</style>
<script>
(function() {
  var KEY = 'hyperion-theme';
  var toggle = document.getElementById('themeToggle');
  var icon = document.getElementById('themeIcon');

  function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    icon.textContent = theme === 'light' ? '\u{1F319}' : '\u{2600}\u{FE0F}';
    localStorage.setItem(KEY, theme);
    window.dispatchEvent(new CustomEvent('themechange', { detail: { theme: theme } }));
  }

  var saved = localStorage.getItem(KEY);
  if (saved) {
    applyTheme(saved);
  } else {
    icon.textContent = '\u{2600}\u{FE0F}';
  }

  toggle.addEventListener('click', function() {
    var current = document.documentElement.getAttribute('data-theme');
    applyTheme(current === 'light' ? 'dark' : 'light');
  });

  // Utility for canvas code: read theme-aware CSS var values
  window.getThemeRGB = function(varName) {
    return getComputedStyle(document.documentElement).getPropertyValue(varName).trim();
  };
})();
</script>
