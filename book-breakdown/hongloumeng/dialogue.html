:root {
    --bg: #0f1117;
    --card: #1a1d27;
    --card-hover: #222636;
    --accent: #6c63ff;
    --accent2: #ff6b6b;
    --accent3: #4ecdc4;
    --accent4: #ffe66d;
    --text: #e8e8f0;
    --text-dim: #8888a0;
    --border: #2a2d3a;
    --bg-rgb: 15,17,23;
    --card-rgb: 26,29,39;
    --text-rgb: 232,232,240;
    --text-dim-rgb: 136,136,160;
    --border-rgb: 42,45,58;
    --accent-rgb: 108,99,255;
    --accent2-rgb: 255,107,107;
    --accent3-rgb: 78,205,196;
    --accent4-rgb: 255,230,109;
    --bg-hero: #13151f;
    --glow: rgba(var(--accent-rgb),0.15);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: 'Noto Sans SC', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
    overflow-x: hidden;
}

/* ── Hero ── */
.hero {
    height: 25vh; min-height: 160px;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    text-align: center; padding: 1rem;
    position: relative; overflow: hidden;
}
.hero::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(ellipse at 40% 50%, rgba(var(--accent-rgb),0.06) 0%, transparent 60%);
    pointer-events: none;
}
.hero h1 { font-size: clamp(1.5rem, 4vw, 2.4rem); font-weight: 700; }
.hero .sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem; color: var(--accent3); opacity: 0.7;
}
/* ── Fixed Nav ── */
.fixed-nav { position: fixed; top: 0; left: 0; right: 0; z-index: 9998; padding: 0.6rem 1.5rem; font-size: 0.8rem; display: flex; align-items: center; gap: 0.4rem; background: rgba(15,17,23,0.85); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border-bottom: 1px solid transparent; transition: border-color 0.3s; }
.fixed-nav.scrolled { border-bottom-color: var(--border); }
.fixed-nav a { color: var(--text-dim); text-decoration: none; transition: color 0.3s; }
.fixed-nav a:hover { color: var(--accent); }
.fixed-nav .sep { color: var(--border); margin: 0 0.15rem; }

/* ── Controls ── */
.controls {
    position: sticky; top: 0; z-index: 20;
    background: var(--card); border-bottom: 1px solid var(--border);
    padding: 0.6rem 1.5rem; display: flex; align-items: center;
    gap: 1.2rem; flex-wrap: wrap;
}
.ctrl-label {
    font-size: 0.75rem; color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
}
.ctrl-group { display: flex; align-items: center; gap: 0.5rem; }
.range-wrap { display: flex; align-items: center; gap: 0.4rem; }
.range-wrap input[type="range"] {
    width: 100px; accent-color: var(--accent);
}
.range-val {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem; color: var(--accent4); min-width: 2ch;
}
.ch-range { display: flex; align-items: center; gap: 0.3rem; }
.ch-range input[type="range"] { width: 80px; accent-color: var(--accent3); }

/* ── Layout ── */
.main-layout {
    display: flex; height: calc(75vh - 45px);
    min-height: 400px;
}
.canvas-wrap {
    flex: 1; position: relative; overflow: hidden;
}
.canvas-wrap canvas { display: block; }

/* ── Side Panel ── */
.side-panel {
    width: 280px; background: var(--card);
    border-left: 1px solid var(--border);
    overflow-y: auto; padding: 1rem;
    font-size: 0.82rem;
}
.side-panel h3 {
    font-size: 0.9rem; margin-bottom: 0.8rem;
    color: var(--accent3);
}
.rank-list { list-style: none; }
.rank-item {
    display: flex; align-items: center; gap: 0.5rem;
    padding: 0.35rem 0; border-bottom: 1px solid var(--border);
}
.rank-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem; color: var(--text-dim);
    width: 1.5rem; text-align: right;
}
.rank-dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
}
.rank-name { flex: 1; }
.rank-val {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem; color: var(--accent4);
}
.pair-section { margin-top: 1.5rem; }
.pair-item {
    padding: 0.35rem 0; border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
}
.pair-names { font-size: 0.8rem; }
.pair-arrow { color: var(--text-dim); margin: 0 0.3rem; }

/* ── Tooltip ── */
.tooltip {
    position: fixed; z-index: 100;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 8px; padding: 0.7rem 1rem;
    pointer-events: none; opacity: 0;
    transition: opacity 0.15s; max-width: 260px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
}
.tooltip.show { opacity: 1; }
.tooltip .tt-title { font-weight: 700; font-size: 0.9rem; margin-bottom: 0.3rem; }
.tooltip .tt-sub { font-size: 0.75rem; color: var(--text-dim); }
.tooltip .tt-val {
    font-family: 'JetBrains Mono', monospace;
    color: var(--accent4); font-size: 0.85rem;
}

/* ── Detail Panel ── */
.detail-overlay {
    display: none; position: fixed; inset: 0; z-index: 50;
    background: rgba(0,0,0,0.5);
}
.detail-overlay.show { display: flex; justify-content: center; align-items: center; }
.detail-box {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 16px; padding: 1.8rem; max-width: 420px;
    width: 90%; max-height: 70vh; overflow-y: auto;
    box-shadow: 0 8px 40px rgba(0,0,0,0.5);
}
.detail-box h3 { font-size: 1.1rem; margin-bottom: 0.5rem; }
.detail-box .detail-sub {
    font-size: 0.8rem; color: var(--text-dim); margin-bottom: 1rem;
}
.detail-chapters {
    display: flex; flex-wrap: wrap; gap: 0.3rem;
}
.ch-pill {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem; padding: 0.15rem 0.5rem;
    border-radius: 10px; background: var(--bg);
    border: 1px solid var(--border); color: var(--text-dim);
}
.detail-close {
    float: right; background: none; border: none;
    color: var(--text-dim); font-size: 1.2rem; cursor: pointer;
}
.detail-close:hover { color: var(--text); }

@media (max-width: 768px) {
    .main-layout { flex-direction: column; height: auto; }
    .canvas-wrap { height: 50vh; }
    .side-panel { width: 100%; height: auto; max-height: 40vh; border-left: none; border-top: 1px solid var(--border); }
    .controls { gap: 0.6rem; }

/* ── RGB triplet defaults (dark) ── */

const charMap = {};

function charColor(id) {

// ── Theme Color Cache ──
var _tc = {};
function _refreshTC() {
  var s = getComputedStyle(document.documentElement);
  _tc.bg = s.getPropertyValue('--bg-rgb').trim();
  _tc.card = s.getPropertyValue('--card-rgb').trim();
  _tc.text = s.getPropertyValue('--text-rgb').trim();
  _tc.textDim = s.getPropertyValue('--text-dim-rgb').trim();
  _tc.border = s.getPropertyValue('--border-rgb').trim();
  _tc.accent = s.getPropertyValue('--accent-rgb').trim();
}
_refreshTC();
window.addEventListener('themechange', function() { _refreshTC(); });

// ── State ──
const canvas = document.getElementById('chordCanvas');
const ctx = canvas.getContext('2d');
let W, H, cx, cy, R;
let dpr = window.devicePixelRatio || 1;
let threshold = 1;
let chStart = 1, chEnd = 999;
let hoveredArc = -1;  // index into filteredChars
let hoveredChord = -1; // index into filteredPairs
let arcAngles = [];     // [{startAngle, endAngle, charId}]
let filteredChars = []; // char ids with at least one visible chord
let filteredPairs = []; // pairs passing filters

// ── Canvas sizing ──
function sizeCanvas() {
    const wrap = document.getElementById('canvasWrap');
    W = wrap.clientWidth;
    H = wrap.clientHeight;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    cx = W / 2;
    cy = H / 2;
    R = Math.min(W, H) * 0.36;
}

// ── Filter data ──
function filterData() {
    const maxCh = dialogue.chapterBreakdown
        ? Math.max(...dialogue.chapterBreakdown.map(c => c.chapter))
        : (dialogue.pairs.length > 0
            ? Math.max(...dialogue.pairs.flatMap(p => p.chapters || []))
            : 20);

    // Set slider max
    const chStartSlider = document.getElementById('chStartSlider');
    const chEndSlider = document.getElementById('chEndSlider');
    chStartSlider.max = maxCh;
    chEndSlider.max = maxCh;
    if (chEnd > maxCh) { chEnd = maxCh; chEndSlider.value = maxCh; }
    document.getElementById('chEndVal').textContent = chEnd;

    // Filter pairs by chapter range and threshold
    filteredPairs = [];
    dialogue.pairs.forEach(p => {
        let count = p.count;
        if (p.chapters && p.chapters.length > 0) {
            const inRange = p.chapters.filter(ch => ch >= chStart && ch <= chEnd);
            count = inRange.length > 0 ? Math.round(p.count * inRange.length / p.chapters.length) : 0;
        }
        if (count >= threshold) {
            filteredPairs.push({ a: p.a || p.char1, b: p.b || p.char2, count: count, chapters: p.chapters || [] });
        }
    });

    // Unique chars that appear in filtered pairs
    const charSet = new Set();
    filteredPairs.forEach(p => { charSet.add(p.a); charSet.add(p.b); });
    filteredChars = Array.from(charSet);

    // Sort by total dialogue count
    const totals = {};
    filteredPairs.forEach(p => {
        totals[p.a] = (totals[p.a] || 0) + p.count;
        totals[p.b] = (totals[p.b] || 0) + p.count;
    });
    filteredChars.sort((a, b) => (totals[b] || 0) - (totals[a] || 0));

    // Compute arc angles (proportional to total dialogue count)
    const totalAll = filteredChars.reduce((s, id) => s + (totals[id] || 0), 0) || 1;
    const gap = 0.02; // radians gap between arcs
    const totalGap = gap * filteredChars.length;
    const available = Math.PI * 2 - totalGap;
    let angle = -Math.PI / 2;
    arcAngles = [];
    filteredChars.forEach(id => {
        const frac = (totals[id] || 0) / totalAll;
        const sweep = frac * available;
        arcAngles.push({ startAngle: angle, endAngle: angle + sweep, charId: id, total: totals[id] || 0 });
        angle += sweep + gap;
    });

    // Update threshold slider max
    const maxCount = dialogue.pairs.length > 0
        ? Math.max(...dialogue.pairs.map(p => p.count))
        : 50;
    document.getElementById('thresholdSlider').max = Math.max(maxCount, 2);

    updateSidePanel(totals);
}

// ── Side Panel ──
function updateSidePanel(totals) {
    // Top speakers
    const ranked = filteredChars.slice(0, 15);
    const speakerList = document.getElementById('speakerRank');
    speakerList.innerHTML = '';
    ranked.forEach((id, i) => {
        const c = charMap[id];
        const name = c ? c.name : id;
        const li = document.createElement('li');
        li.className = 'rank-item';
        li.innerHTML =
            '<span class="rank-num">' + (i + 1) + '</span>' +
            '<span class="rank-dot" style="background:' + charColor(id) + '"></span>' +
            '<span class="rank-name">' + name + '</span>' +
            '<span class="rank-val">' + (totals[id] || 0) + '</span>';
        speakerList.appendChild(li);
    });

    // Top pairs
    const sortedPairs = filteredPairs.slice().sort((a, b) => b.count - a.count).slice(0, 15);
    const pairList = document.getElementById('pairRank');
    pairList.innerHTML = '';
    sortedPairs.forEach((p, i) => {
        const nameA = charMap[p.a] ? charMap[p.a].name : p.a;
        const nameB = charMap[p.b] ? charMap[p.b].name : p.b;
        const li = document.createElement('li');
        li.className = 'rank-item pair-item';
        li.innerHTML =
            '<span class="rank-num">' + (i + 1) + '</span>' +
            '<span class="pair-names">' + nameA + '<span class="pair-arrow">⇄</span>' + nameB + '</span>' +
            '<span class="rank-val">' + p.count + '</span>';
        li.style.cursor = 'pointer';
        li.onclick = function() { showDetail(p); };
        pairList.appendChild(li);
    });
}

// ── Drawing ──
function hexToRGBA(hex, a) {
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return 'rgba(' + r + ',' + g + ',' + b + ',' + a + ')';
}

function midAngle(arc) { return (arc.startAngle + arc.endAngle) / 2; }

function arcIndex(charId) { return filteredChars.indexOf(charId); }

function draw() {
    ctx.clearRect(0, 0, W, H);
    if (filteredChars.length === 0) {
        ctx.fillStyle = `rgb(${_tc.textDim})`;
        ctx.font = '14px "Noto Sans SC"';
        ctx.textAlign = 'center';
        ctx.fillText('无符合条件的对话数据', cx, cy);
        return;
    }

    const arcWidth = 18;
    const innerR = R - arcWidth;
    const maxCount = filteredPairs.length > 0 ? Math.max(...filteredPairs.map(p => p.count)) : 1;

    // ── Draw chords ──
    filteredPairs.forEach((p, pi) => {
        const ai = arcIndex(p.a);
        const bi = arcIndex(p.b);
        if (ai < 0 || bi < 0) return;

        const arcA = arcAngles[ai];
        const arcB = arcAngles[bi];
        const angA = midAngle(arcA);
        const angB = midAngle(arcB);

        const x1 = cx + Math.cos(angA) * innerR;
        const y1 = cy + Math.sin(angA) * innerR;
        const x2 = cx + Math.cos(angB) * innerR;
        const y2 = cy + Math.sin(angB) * innerR;

        const thickness = 1 + (p.count / maxCount) * 8;
        let alpha = 0.25 + (p.count / maxCount) * 0.35;

        // Highlight logic
        if (hoveredArc >= 0) {
            if (ai === hoveredArc || bi === hoveredArc) {
                alpha = 0.7;
            } else {
                alpha = 0.05;
            }
        }
        if (hoveredChord >= 0) {
            if (pi === hoveredChord) {
                alpha = 0.85;
            } else if (hoveredArc < 0) {
                alpha = 0.08;
            }
        }

        const color = charColor(p.a);
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.quadraticCurveTo(cx, cy, x2, y2);
        ctx.strokeStyle = hexToRGBA(color, alpha);
        ctx.lineWidth = thickness;
        ctx.stroke();
    });

    // ── Draw arcs ──
    arcAngles.forEach((arc, i) => {
        const color = charColor(arc.charId);
        let alpha = hoveredArc >= 0 ? (i === hoveredArc ? 1 : 0.25) : 0.85;

        ctx.beginPath();
        ctx.arc(cx, cy, R - arcWidth / 2, arc.startAngle, arc.endAngle);
        ctx.strokeStyle = hexToRGBA(color, alpha);
        ctx.lineWidth = arcWidth;
        ctx.lineCap = 'butt';
        ctx.stroke();

        // Glow on hover
        if (i === hoveredArc) {
            ctx.beginPath();
            ctx.arc(cx, cy, R - arcWidth / 2, arc.startAngle, arc.endAngle);
            ctx.strokeStyle = hexToRGBA(color, 0.15);
            ctx.lineWidth = arcWidth + 12;
            ctx.stroke();
        }
    });

    // ── Draw labels ──
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.font = '500 12px "Noto Sans SC"';

    arcAngles.forEach((arc, i) => {
        const ang = midAngle(arc);
        const labelR = R + 14;
        const lx = cx + Math.cos(ang) * labelR;
        const ly = cy + Math.sin(ang) * labelR;

        const c = charMap[arc.charId];
        const name = c ? c.name : arc.charId;

        ctx.save();
        ctx.translate(lx, ly);
        let rot = ang;
        if (rot > Math.PI / 2 && rot < Math.PI * 1.5) {
            rot += Math.PI;
        }
        if (rot < -Math.PI / 2 && rot > -Math.PI * 1.5) {
            rot += Math.PI;
        }
        ctx.rotate(rot);

        const alpha = hoveredArc >= 0 ? (i === hoveredArc ? 1 : 0.3) : 0.9;
        ctx.fillStyle = `rgba(${_tc.text},${alpha})`;
        ctx.fillText(name, 0, 0);
        ctx.restore();
    });
}

// ── Hit testing ──
function hitTest(mx, my) {
    const dx = mx - cx, dy = my - cy;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const angle = Math.atan2(dy, dx);

    // Test arc hit (outer ring)
    const arcWidth = 18;
    if (dist >= R - arcWidth - 5 && dist <= R + 5) {
        for (let i = 0; i < arcAngles.length; i++) {
            const arc = arcAngles[i];
            let a = angle;
            // Normalize angles for comparison
            let start = arc.startAngle, end = arc.endAngle;
            while (a < start - Math.PI) a += Math.PI * 2;
            while (a > start + Math.PI) a -= Math.PI * 2;
            if (a >= start && a <= end) {
                return { type: 'arc', index: i };
            }
        }
    }

    // Test chord hit (center area)
    if (dist < R - arcWidth) {
        const innerR2 = R - arcWidth;
        let closest = -1, closestDist = 20;
        filteredPairs.forEach((p, pi) => {
            const ai = arcIndex(p.a), bi = arcIndex(p.b);
            if (ai < 0 || bi < 0) return;
            const angA = midAngle(arcAngles[ai]);
            const angB = midAngle(arcAngles[bi]);
            const x1 = cx + Math.cos(angA) * innerR2;
            const y1 = cy + Math.sin(angA) * innerR2;
            const x2 = cx + Math.cos(angB) * innerR2;
            const y2 = cy + Math.sin(angB) * innerR2;

            // Sample points along quadratic bezier and find min distance
            for (let t = 0; t <= 1; t += 0.05) {
                const bx = (1 - t) * (1 - t) * x1 + 2 * (1 - t) * t * cx + t * t * x2;
                const by = (1 - t) * (1 - t) * y1 + 2 * (1 - t) * t * cy + t * t * y2;
                const d = Math.sqrt((mx - bx) ** 2 + (my - by) ** 2);
                if (d < closestDist) {
                    closestDist = d;
                    closest = pi;
                }
            }
        });
        if (closest >= 0) return { type: 'chord', index: closest };
    }

    return null;
}

// ── Tooltip ──
const tooltipEl = document.getElementById('tooltip');

function showTooltip(x, y, html) {
    tooltipEl.innerHTML = html;
    tooltipEl.classList.add('show');
    const rect = tooltipEl.getBoundingClientRect();
    let tx = x + 15, ty = y - 10;
    if (tx + rect.width > window.innerWidth - 10) tx = x - rect.width - 15;
    if (ty + rect.height > window.innerHeight - 10) ty = y - rect.height - 10;
    if (ty < 5) ty = 5;
    tooltipEl.style.left = tx + 'px';
    tooltipEl.style.top = ty + 'px';
}

    tooltipEl.classList.remove('show');
}

        (chapHtml ? '<p style="font-size:0.8rem;color:var(--text-dim);margin-bottom:0.5rem;">出现章节：</p>' + chapHtml : '');

    overlay.classList.add('show');

// ── Event handlers ──
function getCanvasPos(e) {
    const rect = canvas.getBoundingClientRect();
    return { x: e.clientX - rect.left, y: e.clientY - rect.top };
}

canvas.addEventListener('mousemove', function(e) {
    const pos = getCanvasPos(e);
    const hit = hitTest(pos.x, pos.y);

    if (hit && hit.type === 'arc') {
        hoveredArc = hit.index;
        hoveredChord = -1;
        canvas.style.cursor = 'pointer';
        const arc = arcAngles[hit.index];
        const c = charMap[arc.charId];
        const name = c ? c.name : arc.charId;
        const en = c && c.en ? c.en : '';
        showTooltip(e.clientX, e.clientY,
            '<div class="tt-title">' + name + '</div>' +
            (en ? '<div class="tt-sub">' + en + '</div>' : '') +
            '<div class="tt-val">' + arc.total + ' 次对话</div>');
    } else if (hit && hit.type === 'chord') {
        hoveredChord = hit.index;
        hoveredArc = -1;
        canvas.style.cursor = 'pointer';
        const p = filteredPairs[hit.index];
        const nameA = charMap[p.a] ? charMap[p.a].name : p.a;
        const nameB = charMap[p.b] ? charMap[p.b].name : p.b;
        showTooltip(e.clientX, e.clientY,
            '<div class="tt-title">' + nameA + ' ⇄ ' + nameB + '</div>' +
            '<div class="tt-val">' + p.count + ' 次对话</div>');
    } else {
        hoveredArc = -1;
        hoveredChord = -1;
        canvas.style.cursor = 'default';
        hideTooltip();
    }
    draw();
});

canvas.addEventListener('click', function(e) {
    const pos = getCanvasPos(e);
    const hit = hitTest(pos.x, pos.y);
    if (hit && hit.type === 'chord') {
        showDetail(filteredPairs[hit.index]);
    } else if (hit && hit.type === 'arc') {
        // Highlight this character's connections
        hoveredArc = hit.index;
        draw();
    }
});

canvas.addEventListener('mouseleave', function() {
    hoveredArc = -1;
    hoveredChord = -1;
    hideTooltip();
    draw();
});

// Touch support
canvas.addEventListener('touchstart', function(e) {
    e.preventDefault();
    const t = e.touches[0];
    const pos = getCanvasPos(t);
    const hit = hitTest(pos.x, pos.y);
    if (hit && hit.type === 'arc') {
        hoveredArc = hit.index;
        hoveredChord = -1;
    } else if (hit && hit.type === 'chord') {
        hoveredChord = hit.index;
        hoveredArc = -1;
        showDetail(filteredPairs[hit.index]);
    }
    draw();
}, { passive: false });

// Controls
document.getElementById('thresholdSlider').addEventListener('input', function() {
    threshold = parseInt(this.value);
    document.getElementById('thresholdVal').textContent = threshold;
    filterData();
    draw();
});

document.getElementById('chStartSlider').addEventListener('input', function() {
    chStart = parseInt(this.value);
    document.getElementById('chStartVal').textContent = chStart;
    if (chStart > chEnd) {
        chEnd = chStart;
        document.getElementById('chEndSlider').value = chEnd;
        document.getElementById('chEndVal').textContent = chEnd;
    }
    filterData();
    draw();
});

document.getElementById('chEndSlider').addEventListener('input', function() {
    chEnd = parseInt(this.value);
    document.getElementById('chEndVal').textContent = chEnd;
    if (chEnd < chStart) {
        chStart = chEnd;
        document.getElementById('chStartSlider').value = chStart;
        document.getElementById('chStartVal').textContent = chStart;
    }
    filterData();
    draw();
});

// Resize
let resizeTimer;
window.addEventListener('resize', function() {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(function() {
        dpr = window.devicePixelRatio || 1;
        sizeCanvas();
        draw();
    }, 150);
});

window.addEventListener('scroll', () => {
    document.getElementById('fixedNav').classList.toggle('scrolled', window.scrollY > 50);
});

// ── Init ──
document.fonts.ready.then(function() {
    sizeCanvas();
    filterData();
    draw();
});
</script>
<!-- Theme Toggle (injected into .fixed-nav) -->
<style>
.theme-toggle {
  margin-left: auto;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--card);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.9rem;
  transition: all 0.3s;
  opacity: 0.7;
  padding: 0;
  line-height: 1;
  flex-shrink: 0;
}
.theme-toggle:hover {
  opacity: 1;
  transform: scale(1.1);
  border-color: var(--accent);
  box-shadow: 0 0 12px var(--glow);
}
</style>
<script>
(function() {
  var KEY = 'hyperion-theme';
  var toggle = document.getElementById('themeToggle');
  var icon = document.getElementById('themeIcon');

  function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    icon.textContent = theme === 'light' ? '\u{1F319}' : '\u{2600}\u{FE0F}';
    localStorage.setItem(KEY, theme);
    window.dispatchEvent(new CustomEvent('themechange', { detail: { theme: theme } }));
  }

  var saved = localStorage.getItem(KEY);
  if (saved) {
    applyTheme(saved);
  } else {
    icon.textContent = '\u{2600}\u{FE0F}';
  }

  toggle.addEventListener('click', function() {
    var current = document.documentElement.getAttribute('data-theme');
    applyTheme(current === 'light' ? 'dark' : 'light');
  });

  // Utility for canvas code: read theme-aware CSS var values
  window.getThemeRGB = function(varName) {
    return getComputedStyle(document.documentElement).getPropertyValue(varName).trim();
  };
})();
</script>

</body>
