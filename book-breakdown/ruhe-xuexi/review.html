:root {
    --bg: #0f1117;

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body { font-family: var(--font-sans); background: var(--bg); color: var(--text); line-height: 1.8; overflow-x: hidden; }
::selection { background: var(--accent); color: #fff; }

/* ── Compact Hero ── */
.hero { padding: 3rem 2rem 2rem; text-align: center; position: relative; }
.hero::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at 30% 20%, rgba(108,99,255,0.08) 0%, transparent 50%), radial-gradient(ellipse at 70% 80%, rgba(255,107,107,0.06) 0%, transparent 50%); pointer-events: none; }
.hero-icon { font-size: 4rem; margin-bottom: 1rem; filter: drop-shadow(0 0 20px rgba(108,99,255,0.3)); }

.hero-en { font-size: 1rem; color: var(--text-dim); font-weight: 300; margin-bottom: 0.5rem; }
.hero-badge { display: inline-block; padding: 0.4rem 1.2rem; border: 1px solid var(--accent4); border-radius: 2rem; font-family: var(--font-mono); font-size: 0.8rem; color: var(--accent4); letter-spacing: 2px; }
.back-link { position: absolute; top: 1.5rem; left: 1.5rem; text-decoration: none; color: var(--text-dim); font-size: 0.85rem; display: flex; align-items: center; gap: 6px; transition: color 0.3s; }
.back-link:hover { color: var(--accent); }

/* ── Container ── */
.container { max-width: 900px; margin: 0 auto; padding: 0 24px; }

/* ── Mode Selector ── */
.mode-bar { display: flex; justify-content: center; gap: 12px; margin: 2rem 0; flex-wrap: wrap; }
.mode-btn { padding: 10px 24px; border: 1px solid var(--border); border-radius: 2rem; background: transparent; color: var(--text-dim); font-family: var(--font-sans); font-size: 0.9rem; cursor: pointer; transition: all 0.3s; }
.mode-btn:hover { border-color: var(--accent); color: var(--text); }
.mode-btn.active { border-color: var(--accent); background: rgba(108,99,255,0.15); color: var(--accent); }

.score-bar { display: flex; align-items: center; justify-content: center; gap: 2rem; margin-bottom: 2rem; padding: 1rem; background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); }
.score-label { font-family: var(--font-mono); font-size: 0.8rem; color: var(--text-dim); letter-spacing: 1px; }

.quiz-card.open .quiz-answer { padding-top: 12px; border-top: 1px solid var(--border); }
.quiz-toggle { font-family: var(--font-mono); font-size: 0.75rem; color: var(--accent3); letter-spacing: 1px; }

/* Chapter-ID mode */
.chapter-picker { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
.ch-pick-btn { padding: 4px 12px; border: 1px solid var(--border); border-radius: 6px; background: transparent; color: var(--text-dim); font-family: var(--font-mono); font-size: 0.75rem; cursor: pointer; transition: all 0.2s; }

.ch-pick-btn.wrong { border-color: var(--accent2); color: var(--accent2); background: rgba(255,107,107,0.1); }

/* ── Spaced Review ── */
.section-header { margin: 3rem 0 1.5rem; }
.section-badge { display: inline-block; font-family: var(--font-mono); font-size: 0.75rem; color: var(--accent); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 8px; }
.section-title { font-size: 1.4rem; font-weight: 700; }
.schedule-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; margin-bottom: 2rem; }
.schedule-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; text-align: center; transition: all 0.3s; }
.schedule-card:hover { border-color: var(--accent4); }
.schedule-interval { font-family: var(--font-mono); font-size: 0.8rem; color: var(--accent4); letter-spacing: 1px; margin-bottom: 6px; }
.schedule-date { font-size: 0.85rem; color: var(--text-dim); }

/* ── Footer ── */
.footer { text-align: center; padding: 4rem 0; color: var(--text-dim); font-size: 0.8rem; border-top: 1px solid var(--border); margin-top: 4rem; }

/* ── Empty State ── */
.empty-state { text-align: center; padding: 4rem 2rem; color: var(--text-dim); }
.empty-state-icon { font-size: 3rem; margin-bottom: 1rem; opacity: 0.5; }

/* ── Fade-in ── */
.fade-in { opacity: 0; transform: translateY(30px); transition: opacity 0.7s ease, transform 0.7s ease; }
.fade-in.visible { opacity: 1; transform: translateY(0); }

@media (max-width: 768px) {
    .score-bar { flex-wrap: wrap; gap: 1rem; }
    .schedule-grid { grid-template-columns: repeat(3, 1fr); }
}
</style>

(function() {
    const container = document.getElementById('quizContainer');
    const scoreBar = document.getElementById('scoreBar');

    if (typeof allQuizData === 'undefined' || !allQuizData || !allQuizData.length) {
        container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🔀</div><div>No quiz data available yet.</div></div>';
        return;
    }

    // Flatten and shuffle questions
    let questions = [];
    allQuizData.forEach(ch => {
        (ch.questions || []).forEach(q => {
            questions.push({ ...q, chapterNum: ch.chapterNum, chapterTitle: ch.chapterTitle });
        });
    });

    function shuffle(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    let shuffled = shuffle([...questions]);
    let mode = 'random';
    let correct = 0, total = 0;

    function updateScore() {
        document.getElementById('scoreCorrect').textContent = correct;
        document.getElementById('scoreTotal').textContent = total;
        document.getElementById('scorePct').textContent = total > 0 ? Math.round(correct / total * 100) + '%' : '—';
    }

    function renderQuiz() {
        scoreBar.style.display = mode === 'chapter-id' ? 'flex' : 'none';
        container.innerHTML = '';
        shuffled = shuffle([...questions]);
        correct = 0; total = 0; updateScore();

        shuffled.forEach((q, i) => {
            const card = document.createElement('div');
            card.className = 'quiz-card fade-in';

            if (mode === 'random') {
                const chTag = `<span class="quiz-chapter-tag hidden">CH.${String(q.chapterNum).padStart(2, '0')}</span>`;
                card.innerHTML = `
                    ${chTag}
                    <div class="quiz-question">${q.question}</div>
                    <div class="quiz-answer"><div>${q.answer}</div><div style="margin-top:8px;font-family:var(--font-mono);font-size:0.75rem;color:var(--accent3)">— Chapter ${q.chapterNum}: ${q.chapterTitle}</div></div>
                    <div class="quiz-toggle">CLICK TO REVEAL</div>`;
                card.addEventListener('click', function() {
                    if (this.classList.contains('open')) return;
                    this.classList.add('open');
                    const ans = this.querySelector('.quiz-answer');
                    ans.style.maxHeight = ans.scrollHeight + 'px';
                    this.querySelector('.quiz-toggle').textContent = '';
                    const tag = this.querySelector('.quiz-chapter-tag');
                    tag.className = 'quiz-chapter-tag visible';
                });
            } else {
                // Chapter-ID mode
                card.innerHTML = `
                    <span class="quiz-chapter-tag hidden">WHICH CHAPTER?</span>
                    <div class="quiz-question">${q.question}</div>
                    <div class="chapter-picker" id="picker-${i}"></div>
                    <div class="quiz-answer"><div>${q.answer}</div></div>`;
                card.style.cursor = 'default';

                // Build chapter picker after insertion
                setTimeout(() => {
                    const picker = document.getElementById('picker-' + i);
                    if (!picker) return;
                    const chNums = [...new Set(questions.map(x => x.chapterNum))].sort((a, b) => a - b);
                    chNums.forEach(num => {
                        const btn = document.createElement('button');
                        btn.className = 'ch-pick-btn';
                        btn.textContent = 'Ch.' + num;
                        btn.addEventListener('click', function(e) {
                            e.stopPropagation();
                            if (picker.dataset.answered) return;
                            picker.dataset.answered = 'true';
                            total++;
                            if (num === q.chapterNum) {
                                correct++;
                                btn.classList.add('correct');
                                card.classList.add('correct');
                            } else {
                                btn.classList.add('wrong');
                                card.classList.add('incorrect');
                                // Highlight correct
                                picker.querySelectorAll('.ch-pick-btn').forEach(b => {
                                    if (b.textContent === 'Ch.' + q.chapterNum) b.classList.add('correct');
                                });
                            }
                            updateScore();
                            // Reveal answer
                            card.classList.add('open');
                            const ans = card.querySelector('.quiz-answer');
                            ans.style.maxHeight = ans.scrollHeight + 'px';
                            const tag = card.querySelector('.quiz-chapter-tag');
                            tag.className = 'quiz-chapter-tag visible';
                            tag.textContent = 'CH.' + String(q.chapterNum).padStart(2, '0');
                        });
                        picker.appendChild(btn);
                    });
                }, 0);
            }
            container.appendChild(card);
        });

        // Observe fade-ins
        const obs = new IntersectionObserver(entries => {
            entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); } });
        }, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });
        container.querySelectorAll('.fade-in').forEach(el => obs.observe(el));
    }

    // Mode buttons
    document.querySelectorAll('.mode-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            mode = this.dataset.mode;
            renderQuiz();
        });
    });

    // Reset
    document.getElementById('resetBtn').addEventListener('click', renderQuiz);

    // Spaced review schedule
    (function() {
        const grid = document.getElementById('scheduleGrid');
        const intervals = [
            { label: 'TODAY', days: 0 },
            { label: '+1 DAY', days: 1 },
            { label: '+3 DAYS', days: 3 },
            { label: '+7 DAYS', days: 7 },
            { label: '+14 DAYS', days: 14 },
            { label: '+30 DAYS', days: 30 },
        ];
        const now = new Date();
        intervals.forEach(iv => {
            const d = new Date(now);
            d.setDate(d.getDate() + iv.days);
            const dateStr = d.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' });
            const card = document.createElement('div');
            card.className = 'schedule-card fade-in';
            card.innerHTML = `<div class="schedule-interval">${iv.label}</div><div class="schedule-date">${dateStr}</div>`;
            grid.appendChild(card);
        });
    })();

    renderQuiz();

    // Global fade-in observer for schedule cards
    const obs2 = new IntersectionObserver(entries => {
        entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); obs2.unobserve(e.target); } });
    }, { threshold: 0.1 });
    document.querySelectorAll('.schedule-grid .fade-in').forEach(el => obs2.observe(el));
})();
</script>
