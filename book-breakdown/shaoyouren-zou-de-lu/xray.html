<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>X-Ray · 少有人走的路 | Book Breakdown</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap');

:root {
    --bg: #0f1117;
    --card: #1a1d27;
    --card-hover: #222636;
    --accent: #6c63ff;
    --accent2: #ff6b6b;
    --accent3: #4ecdc4;
    --accent4: #ffe66d;
    --text: #e8e8f0;
    --text-dim: #8888a0;
    --border: #2a2d3a;
    --glow: rgba(var(--accent-rgb), 0.15);
    --radius: 14px;
    --font-sans: 'Noto Sans SC', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body { font-family: var(--font-sans); background: var(--bg); color: var(--text); line-height: 1.8; overflow-x: hidden; }
::selection { background: var(--accent); color: #fff; }

/* ── Compact Hero ── */
.hero { padding: 3rem 2rem 2rem; text-align: center; position: relative; }
.hero::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at 30% 20%, rgba(var(--accent-rgb),0.08) 0%, transparent 50%), radial-gradient(ellipse at 70% 80%, rgba(var(--accent2-rgb),0.06) 0%, transparent 50%); pointer-events: none; }
.hero-icon { font-size: 4rem; margin-bottom: 1rem; filter: drop-shadow(0 0 20px rgba(var(--accent-rgb),0.3)); }
.hero h1 { font-size: clamp(1.8rem, 5vw, 2.5rem); font-weight: 900; margin-bottom: 0.3rem; }
.hero-en { font-size: 1rem; color: var(--text-dim); font-weight: 300; margin-bottom: 0.5rem; }
.hero-badge { display: inline-block; padding: 0.4rem 1.2rem; border: 1px solid var(--accent3); border-radius: 2rem; font-family: var(--font-mono); font-size: 0.8rem; color: var(--accent3); letter-spacing: 2px; }
/* ── Fixed Nav ── */
.fixed-nav { position: fixed; top: 0; left: 0; right: 0; z-index: 9998; padding: 0.6rem 1.5rem; font-size: 0.8rem; display: flex; align-items: center; gap: 0.4rem; background: rgba(15,17,23,0.85); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border-bottom: 1px solid transparent; transition: border-color 0.3s; }
.fixed-nav.scrolled { border-bottom-color: var(--border); }
.fixed-nav a { color: var(--text-dim); text-decoration: none; transition: color 0.3s; }
.fixed-nav a:hover { color: var(--accent); }
.fixed-nav .sep { color: var(--border); margin: 0 0.15rem; }

/* ── Container ── */
.container { max-width: 900px; margin: 0 auto; padding: 0 24px; }

/* ── Section Header ── */
.section-header { margin: 3rem 0 1.5rem; }
.section-badge { display: inline-block; font-family: var(--font-mono); font-size: 0.75rem; color: var(--accent); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 8px; }
.section-title { font-size: 1.4rem; font-weight: 700; }

/* ── Unity Statement ── */
.unity-card { background: linear-gradient(135deg, rgba(var(--accent-rgb),0.1), rgba(var(--accent3-rgb),0.08)); border: 1px solid var(--accent); border-radius: var(--radius); padding: 2rem; text-align: center; margin-bottom: 2rem; }
.unity-label { font-family: var(--font-mono); font-size: 0.75rem; color: var(--accent); letter-spacing: 3px; margin-bottom: 1rem; }
.unity-text { font-size: 1.2rem; font-weight: 500; line-height: 1.9; }

/* ── Core Questions ── */
.question-list { list-style: none; counter-reset: q; margin-bottom: 2rem; }
.question-item { counter-increment: q; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px 24px 20px 60px; margin-bottom: 12px; position: relative; transition: all 0.3s; }
.question-item:hover { border-color: var(--accent4); transform: translateX(4px); }
.question-item::before { content: counter(q, decimal-leading-zero); position: absolute; left: 20px; top: 20px; font-family: var(--font-mono); font-size: 0.85rem; color: var(--accent4); font-weight: 700; }
.question-text { font-weight: 500; }
.question-context { font-size: 0.85rem; color: var(--text-dim); margin-top: 6px; }

/* ── Logical Outline ── */
.outline-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 16px; position: relative; padding-left: 60px; transition: all 0.3s; }
.outline-card:hover { border-color: var(--accent); }
.outline-num { position: absolute; left: 20px; top: 24px; font-family: var(--font-mono); font-size: 0.8rem; color: var(--accent); letter-spacing: 1px; }
.outline-title { font-weight: 600; font-size: 1.05rem; margin-bottom: 4px; }
.outline-desc { font-size: 0.9rem; color: var(--text-dim); }
.outline-chapters { font-family: var(--font-mono); font-size: 0.8rem; color: var(--accent3); margin-top: 8px; }
.outline-connector { width: 2px; height: 16px; background: linear-gradient(to bottom, var(--accent), transparent); margin: 0 0 0 33px; }

/* ── Key Terms ── */
.terms-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; margin-bottom: 2rem; }
.term-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; transition: all 0.3s; }
.term-card:hover { border-color: var(--accent3); transform: translateY(-3px); box-shadow: 0 8px 30px var(--glow); }
.term-name { font-weight: 700; font-size: 1.05rem; color: var(--accent3); margin-bottom: 6px; }
.term-name-en { font-size: 0.8rem; color: var(--text-dim); font-weight: 400; margin-left: 8px; }
.term-def { font-size: 0.9rem; color: var(--text-dim); line-height: 1.7; }
.term-chapter { font-family: var(--font-mono); font-size: 0.75rem; color: var(--accent); margin-top: 8px; }
.term-chapter a { color: var(--accent); text-decoration: none; }
.term-chapter a:hover { text-decoration: underline; }

/* ── Footer ── */
.footer { text-align: center; padding: 4rem 0; color: var(--text-dim); font-size: 0.8rem; border-top: 1px solid var(--border); margin-top: 4rem; }

/* ── Fade-in ── */
.fade-in { opacity: 0; transform: translateY(30px); transition: opacity 0.7s ease, transform 0.7s ease; }
.fade-in.visible { opacity: 1; transform: translateY(0); }

/* ── Empty State ── */
.empty-state { text-align: center; padding: 4rem 2rem; color: var(--text-dim); }
.empty-state-icon { font-size: 3rem; margin-bottom: 1rem; opacity: 0.5; }
.empty-state-text { font-size: 1rem; }

@media (max-width: 768px) {
    .terms-grid { grid-template-columns: 1fr; }
    .question-item { padding-left: 50px; }
    .outline-card { padding-left: 50px; }
}
/* ── RGB triplet defaults (dark) ── */
:root {
  --bg-rgb: 15,17,23;
  --card-rgb: 26,29,39;
  --card-hover-rgb: 34,38,54;
  --text-rgb: 232,232,240;
  --text-dim-rgb: 136,136,160;
  --border-rgb: 42,45,58;
  --accent-rgb: 108,99,255;
  --accent2-rgb: 255,107,107;
  --accent3-rgb: 78,205,196;
  --accent4-rgb: 255,230,109;
  --bg-hero: #13151f;
  --code-bg: #12141c;
  --code-border: #1e2030;
}

/* ── Light theme overrides ── */
[data-theme="light"] {
  --bg: #f5f5f7;
  --card: #ffffff;
  --card-hover: #f0f0f5;
  --accent: #5b52e6;
  --accent2: #e55d5d;
  --accent3: #3cb8b0;
  --accent4: #c49800;
  --text: #1a1a2e;
  --text-dim: #6e6e82;
  --border: #dcdce5;
  --glow: rgba(91,82,230,0.10);
  --success: #059669;
  --warning: #b45309;
  --danger: #dc2626;

  --bg-rgb: 245,245,247;
  --card-rgb: 255,255,255;
  --card-hover-rgb: 240,240,245;
  --text-rgb: 26,26,46;
  --text-dim-rgb: 110,110,130;
  --border-rgb: 220,220,229;
  --accent-rgb: 91,82,230;
  --accent2-rgb: 229,93,93;
  --accent3-rgb: 60,184,176;
  --accent4-rgb: 196,152,0;
  --bg-hero: #e8e8ed;
  --code-bg: #f0f0f5;
  --code-border: #dcdce5;
}

</style>

<script>

(function() {

    if (typeof xray === 'undefined' || !xray) {

    let html = '';

    // Unity Statement

        </div>`;
        xray.outline.forEach((group, i) => {
            if (i > 0) html += '<div class="outline-connector"></div>';
            html += `
            <div class="outline-card fade-in">
                <div class="outline-num">${String(i + 1).padStart(2, '0')}</div>
                <div class="outline-title">${group.title || group.group || ''}</div>
                <div class="outline-desc">${group.desc || group.why || ''}</div>
                ${group.chapters ? `<div class="outline-chapters">Chapters: ${group.chapters.join(', ')}</div>` : ''}
            </div>`;
        });
    }

    // Key Terms
    if (xray.keyTerms && xray.keyTerms.length) {
        html += `

            <div class="section-title">关键术语词汇表</div>
        </div>

        xray.keyTerms.forEach(t => {

    }

    container.innerHTML = html;

    // Observe fade-ins
    const observer = new IntersectionObserver(entries => {
        entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); } });
    }, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });
    container.querySelectorAll('.fade-in').forEach(el => observer.observe(el));

<!-- Theme Toggle (injected into .fixed-nav) -->
<style>
.theme-toggle {
  margin-left: auto;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--card);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.9rem;
  transition: all 0.3s;
  opacity: 0.7;
  padding: 0;
  line-height: 1;
  flex-shrink: 0;
}
.theme-toggle:hover {
  opacity: 1;
  transform: scale(1.1);
  border-color: var(--accent);
  box-shadow: 0 0 12px var(--glow);
}
</style>
<script>
(function() {
  var KEY = 'hyperion-theme';
  var toggle = document.getElementById('themeToggle');
  var icon = document.getElementById('themeIcon');

  function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    icon.textContent = theme === 'light' ? '\u{1F319}' : '\u{2600}\u{FE0F}';
    localStorage.setItem(KEY, theme);
    window.dispatchEvent(new CustomEvent('themechange', { detail: { theme: theme } }));
  }

  var saved = localStorage.getItem(KEY);
  if (saved) {
    applyTheme(saved);
  } else {
    icon.textContent = '\u{2600}\u{FE0F}';
  }

  toggle.addEventListener('click', function() {
    var current = document.documentElement.getAttribute('data-theme');
    applyTheme(current === 'light' ? 'dark' : 'light');
  });

  // Utility for canvas code: read theme-aware CSS var values
  window.getThemeRGB = function(varName) {
    return getComputedStyle(document.documentElement).getPropertyValue(varName).trim();
  };
})();
</script>
