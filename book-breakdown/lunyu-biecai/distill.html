<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>论语别裁 读后蒸馏 / Distill</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f1117;
  --card: #1a1d27;
  --card-hover: #222636;
  --accent: #6c63ff;
  --accent2: #ff6b6b;
  --accent3: #4ecdc4;
  --accent4: #ffe66d;
  --text: #e8e8f0;
  --text-dim: #8888a0;
  --border: #2a2d3a;
  --glow: rgba(var(--accent-rgb),0.15);
  --font-sans: 'Noto Sans SC', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  --radius: 14px;
}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--text);
  line-height: 1.8;
  overflow-x: hidden;
}
::selection { background: var(--accent); color: #fff; }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ── Progress Bar ── */
#progress-bar {
  position: fixed; top: 0; left: 0; height: 3px; width: 0%;
  background: linear-gradient(90deg, var(--accent), var(--accent3));
  z-index: 9999; transition: width 0.1s linear;
}

/* ── Hero ── */
.hero {
  min-height: 50vh;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  text-align: center; padding: 4rem 2rem 3rem; position: relative; overflow: hidden;
}
.hero::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(ellipse at 30% 20%, rgba(var(--accent-rgb),0.08) 0%, transparent 50%),
              radial-gradient(ellipse at 70% 80%, rgba(var(--accent3-rgb),0.06) 0%, transparent 50%);
  pointer-events: none;
}
.back-link {
  position: absolute; top: 20px; left: 24px;
  color: var(--text-dim); text-decoration: none; font-size: 0.85rem;
  z-index: 2; transition: color 0.2s;
}
.back-link:hover { color: var(--accent3); }
.hero-icon { font-size: 4rem; margin-bottom: 1rem; filter: drop-shadow(0 0 20px var(--glow)); }
.hero h1 {
  font-size: clamp(1.8rem, 5vw, 2.8rem); font-weight: 900;
  background: linear-gradient(135deg, var(--accent4) 0%, var(--accent) 40%, var(--accent3) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.hero-subtitle {
  font-size: 1rem; color: var(--text-dim); font-weight: 300;
  margin-top: 0.5rem; max-width: 500px;
}
.hero-book {
  font-size: 0.85rem; color: var(--accent); font-family: var(--font-mono);
  margin-top: 1rem; letter-spacing: 1px;
}

/* ── Section Nav ── */
.section-nav {
  display: flex; justify-content: center; gap: 8px; flex-wrap: wrap;
  padding: 16px 20px; position: sticky; top: 0; z-index: 50;
  background: rgba(var(--bg-rgb),0.92); backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
}
.nav-pill {
  padding: 6px 16px; border-radius: 2rem; border: 1px solid var(--border);
  background: transparent; color: var(--text-dim); font-family: var(--font-sans);
  font-size: 0.8rem; cursor: pointer; transition: all 0.2s; text-decoration: none;
}
.nav-pill:hover, .nav-pill.active { background: var(--accent); color: #fff; border-color: var(--accent); }

/* ── Container ── */
.container { max-width: 800px; margin: 0 auto; padding: 0 20px 4rem; }

/* ── Section Header ── */
.section-header {
  display: flex; align-items: center; gap: 14px;
  margin: 4rem 0 2rem; padding-bottom: 1rem;
  border-bottom: 1px solid var(--border);
}
.section-header-icon { font-size: 1.8rem; }
.section-header h2 { font-size: 1.5rem; font-weight: 700; }
.section-header .section-label {
  font-family: var(--font-mono); font-size: 0.7rem;
  color: var(--accent); letter-spacing: 2px; text-transform: uppercase;
  margin-left: auto;
}

/* ── Quotes ── */
.quote-list { display: flex; flex-direction: column; gap: 16px; }
.quote-card {
  background: var(--card); border: 1px solid var(--border);
  border-left: 3px solid var(--accent4); border-radius: var(--radius);
  padding: 20px 24px; cursor: pointer; transition: all 0.3s;
}
.quote-card:hover { border-color: var(--accent4); transform: translateX(4px); box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
.quote-text {
  font-size: 1.05rem; font-weight: 400; line-height: 1.9;
  position: relative; padding-left: 1.2rem;
}
.quote-text::before {
  content: '\201C'; position: absolute; left: -4px; top: -8px;
  font-size: 2.5rem; color: var(--accent4); opacity: 0.4; font-family: serif;
}
.quote-footer { display: flex; align-items: center; gap: 10px; margin-top: 10px; }
.quote-chapter {
  font-family: var(--font-mono); font-size: 0.7rem;
  background: rgba(var(--accent-rgb),0.15); color: var(--accent);
  padding: 2px 10px; border-radius: 2rem;
}
.quote-context {
  font-size: 0.78rem; color: var(--text-dim);
  max-height: 0; overflow: hidden; transition: max-height 0.3s ease, margin-top 0.3s ease;
  line-height: 1.6;
}
.quote-card.expanded .quote-context { max-height: 200px; margin-top: 10px; }
.quote-expand-hint {
  font-size: 0.7rem; color: var(--text-dim); margin-left: auto;
  font-family: var(--font-mono); opacity: 0.6;
}
.quote-card.expanded .quote-expand-hint { display: none; }

/* ── Concepts ── */
.concept-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; }
.concept-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 24px; transition: all 0.3s;
  cursor: default;
}
.concept-card:hover { border-color: var(--accent3); transform: translateY(-3px); box-shadow: 0 6px 24px rgba(0,0,0,0.3); }
.concept-icon { font-size: 2rem; margin-bottom: 12px; }
.concept-name { font-weight: 700; font-size: 1rem; margin-bottom: 2px; }
.concept-name-zh { font-size: 0.8rem; color: var(--accent3); margin-bottom: 10px; }
.concept-summary {
  font-size: 0.82rem; color: var(--text-dim); line-height: 1.7;
  max-height: 3.4rem; overflow: hidden; transition: max-height 0.4s ease;
}
.concept-card:hover .concept-summary { max-height: 400px; }
.concept-more {
  font-size: 0.7rem; color: var(--accent); margin-top: 6px;
  font-family: var(--font-mono); transition: opacity 0.2s;
}
.concept-card:hover .concept-more { opacity: 0; }

/* ── Principles ── */
.principle-list { display: flex; flex-direction: column; gap: 12px; counter-reset: principle; }
.principle-item {
  display: flex; align-items: flex-start; gap: 16px;
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 18px 22px; transition: all 0.3s;
  counter-increment: principle;
}
.principle-item:hover { border-color: var(--accent2); transform: translateX(4px); }
.principle-num {
  font-family: var(--font-mono); font-size: 0.75rem;
  color: var(--accent2); min-width: 28px; padding-top: 2px;
}
.principle-num::before { content: counter(principle, decimal-leading-zero); }
.principle-icon { font-size: 1.4rem; flex-shrink: 0; padding-top: 1px; }
.principle-body { flex: 1; }
.principle-text { font-size: 0.95rem; font-weight: 500; }
.principle-text-zh { font-size: 0.82rem; color: var(--text-dim); margin-top: 4px; }

/* ── Essence ── */
.essence-list { display: flex; flex-direction: column; gap: 2px; }
.essence-item {
  display: grid; grid-template-columns: 60px 1fr; gap: 16px;
  padding: 14px 20px; border-radius: var(--radius);
  transition: background 0.2s;
}
.essence-item:hover { background: var(--card); }
.essence-chapter {
  font-family: var(--font-mono); font-size: 0.75rem;
  color: var(--accent); padding-top: 3px; text-align: right;
}
.essence-body {}
.essence-title { font-size: 0.8rem; color: var(--text-dim); margin-bottom: 2px; }
.essence-sentence { font-size: 0.9rem; line-height: 1.7; }

/* ── Empty State ── */
.empty-state {
  text-align: center; padding: 3rem; color: var(--text-dim);
  font-size: 0.9rem;
}

/* ── Fade-in ── */
.fade-in { opacity: 0; transform: translateY(20px); transition: opacity 0.6s ease, transform 0.6s ease; }
.fade-in.visible { opacity: 1; transform: translateY(0); }

/* ── Footer ── */
.footer {
  text-align: center; padding: 2rem 0; color: var(--text-dim);
  font-size: 0.75rem; border-top: 1px solid var(--border); margin-top: 3rem;
}
.footer a { color: var(--accent); text-decoration: none; }

/* ── Responsive ── */
@media (max-width: 600px) {
  .hero { min-height: 40vh; padding: 3rem 1.5rem 2rem; }
  .concept-grid { grid-template-columns: 1fr; }
  .essence-item { grid-template-columns: 45px 1fr; gap: 10px; }
  .quote-card { padding: 16px 18px; }
  .section-header { margin: 3rem 0 1.5rem; }
}
/* ── RGB triplet defaults (dark) ── */
:root {
  --bg-rgb: 15,17,23;
  --card-rgb: 26,29,39;
  --card-hover-rgb: 34,38,54;
  --text-rgb: 232,232,240;
  --text-dim-rgb: 136,136,160;
  --border-rgb: 42,45,58;
  --accent-rgb: 108,99,255;
  --accent2-rgb: 255,107,107;
  --accent3-rgb: 78,205,196;
  --accent4-rgb: 255,230,109;
  --bg-hero: #13151f;
  --code-bg: #12141c;
  --code-border: #1e2030;
}

/* ── Light theme overrides ── */
[data-theme="light"] {
  --bg: #f5f5f7;
  --card: #ffffff;
  --card-hover: #f0f0f5;
  --accent: #5b52e6;
  --accent2: #e55d5d;
  --accent3: #3cb8b0;
  --accent4: #c49800;
  --text: #1a1a2e;
  --text-dim: #6e6e82;
  --border: #dcdce5;
  --glow: rgba(91,82,230,0.10);
  --success: #059669;
  --warning: #b45309;
  --danger: #dc2626;

  --bg-rgb: 245,245,247;
  --card-rgb: 255,255,255;
  --card-hover-rgb: 240,240,245;
  --text-rgb: 26,26,46;
  --text-dim-rgb: 110,110,130;
  --border-rgb: 220,220,229;
  --accent-rgb: 91,82,230;
  --accent2-rgb: 229,93,93;
  --accent3-rgb: 60,184,176;
  --accent4-rgb: 196,152,0;
  --bg-hero: #e8e8ed;
  --code-bg: #f0f0f5;
  --code-border: #dcdce5;
}

</style>
</head>

<script>
const distill = {
  "quotes": [
    {
      "text": "学而时习之，不亦说乎？有朋自远方来，不亦乐乎？人不知而不愠，不亦君子乎？",
      "chapter": 1,
      "context": "《论语》开篇三句，南怀瑾解读为做学问的三个层次：随时实践的内心喜悦、志同道合的切磋之乐、不被理解也不怨恨的修养境界。"
    },
    {
      "text": "吾日三省吾身：为人谋而不忠乎？与朋友交而不信乎？传不习乎？",
      "chapter": 1,
      "context": "曾子的反省功夫。南怀瑾强调这不是宗教式的忏悔，而是每天随时随地检点自己做人做事是否到位。"
    },
    {
      "text": "为政以德，譬如北辰，居其所而众星共之。",
      "chapter": 2,
      "context": "孔子论为政的根本精神：以道德感化为核心，自己站稳中心位置，万事自然归向，不需要权术手段。"
    },
    {
      "text": "吾十有五而志于学，三十而立，四十而不惑，五十而知天命，六十而耳顺，七十而从心所欲不逾矩。",
      "chapter": 2,
      "context": "孔子自述一生修养历程。南怀瑾指出这不是普通的自传，而是说明做学问需要一生的人情世故磨练，每个阶段都有不同的内在功夫。"
    },
    {
      "text": "朝闻道，夕死可矣。",
      "chapter": 4,
      "context": "南怀瑾认为这里的「道」是宇宙生命的本体真理，不是一般的道理。能够领悟到生命的真谛，死也无所遗憾。"
    },
    {
      "text": "知之者不如好之者，好之者不如乐之者。",
      "chapter": 6,
      "context": "学问的三个层次：理性认知、情感热爱、身心融合的乐趣。南怀瑾将此与佛家「法喜」、道家「乐道」相印证。"
    },
    {
      "text": "志于道，据于德，依于仁，游于艺。",
      "chapter": 7,
      "context": "孔子学问的四大纲领。南怀瑾解读为：志向在最高真理，行为以道德为根据，处世以仁爱为依归，在六艺中从容涵泳。"
    },
    {
      "text": "克己复礼为仁。一日克己复礼，天下归仁焉。",
      "chapter": 12,
      "context": "颜渊问仁，孔子给出最彻底的回答。南怀瑾解释「克己」为克制自己的妄念与偏私，「复礼」为恢复内心本有的庄严诚敬。"
    },
    {
      "text": "君子固穷，小人穷斯滥矣。",
      "chapter": 15,
      "context": "孔子在陈蔡绝粮时对子路说的话。南怀瑾认为这是修养的最高考验——真正的君子在困境中依然坚守信念，不因穷困而动摇。"
    },
    {
      "text": "不知命，无以为君子也；不知礼，无以立也；不知言，无以知人也。",
      "chapter": 20,
      "context": "《论语》全书最后三句，南怀瑾视为总结：知天命是认识时代趋势，知礼是懂得做人规范，知言是能辨别他人真意。三者具备才是完整的学问。"
    },
    {
      "text": "学问不是文学，不是知识，学问是从人生经验上来，做人做事上去体会的。",
      "chapter": 1,
      "context": "南怀瑾对「学问」的核心定义，贯穿全书。这是理解《论语别裁》立论的基石：学问的标准不在于读了多少书，而在于做人做事的修养。"
    },
    {
      "text": "孔家店被人打倒，是被宋儒冤枉的。六七百年来，所有的四书五经，被一家注解笼罩了。",
      "chapter": 1,
      "context": "南怀瑾对「五四打倒孔家店」的深刻反思：被打倒的其实是朱熹注解里的孔子，不是孔子本人。必须推开注解直接读原文。"
    }
  ],
  "concepts": [
    {
      "name": "Ren (Benevolence)",
      "nameZh": "仁",
      "summary": "孔子思想的核心概念。南怀瑾主张体用一贯：体是内心克己修养的功夫，用是推己及人、己所不欲勿施于人的行为实践。仁不是抽象的「博爱」，而是人与人之间真实的相处之道。",
      "icon": "💛"
    },
    {
      "name": "Li (Rites and Propriety)",
      "nameZh": "礼",
      "summary": "不仅是礼貌或仪式，而是涵盖文化制度、社会规范与个人内在修养的完整体系。《礼记》首句「毋不敬」揭示其核心——内心的庄严诚敬。礼乐相辅，是为政教化的文化载体。",
      "icon": "🏛️"
    },
    {
      "name": "Junzi vs Xiaoren",
      "nameZh": "君子与小人",
      "summary": "君子是有中心思想、有内在修养的人，「不器」——不自限为某一专才；「固穷」——困境中坚守信念。小人不是道德贬义，而是指没有中心思想、随波逐流的普通人。两者之辨贯穿《论语》全书。",
      "icon": "⚖️"
    },
    {

      "summary": "不是滑头的折中主义或和稀泥，而是力量均衡的持平之道。「中」是本体，「庸」是用——在事事物物上恰到好处地把握分寸。尧传舜「允执其中」是中国政治文化的根本心法。",
      "icon": "🎯"
    },
    {
      "name": "True Learning",
      "nameZh": "学而时习之",
      "summary": "南怀瑾对「学问」的重新定义：不是知识积累或文学造诣，而是做人做事的体验与修养。「时习之」不是按时温习功课，而是随时随地在生活中实践。不识一字也可能有真学问。",

    },
    {

      "nameZh": "一以贯之",
      "summary": "孔子学问的总纲领。不是靠博闻强记把知识一点点堆起来，而是找到一个根本的东西，豁然贯通一切。曾子解为「忠恕」——忠是尽心做事的体，恕是推己及人的用。",
      "icon": "🧵"
    },
    {
      "name": "Filial Piety as Foundation",
      "nameZh": "孝悌为本",
      "summary": "仁的根基。孝不是教条式服从「天下无不是的父母」，而是对父母养育之恩的真情回报。悌是兄弟朋友间的友爱。孝悌扩而充之，即为对社会、国家的责任与爱，是从政之本。",
      "icon": "🌳"
    },
    {
      "name": "Interpreting Classics by Classics",
      "nameZh": "以经解经",
      "summary": "南怀瑾的核心方法论：推开宋儒以来的注解框架，只读原文，以《论语》前后语句互相印证来还原孔孟本来的思想。六七百年来四书五经被朱熹一家注解笼罩，必须回到源头。",
      "icon": "🔑"
    }
  ],
  "principles": [
    {
      "text": "True learning is life experience, not book knowledge",
      "textZh": "学问不在读了多少书，而在做人做事的体验与修养——随时随地在生活中实践，才是「学而时习之」的真义",
      "icon": "📖"

(function() {
  const data = typeof distill !== 'undefined' ? distill : {};
  const quotes = data.quotes || [];
  const concepts = data.concepts || [];
  const principles = data.principles || [];
  const essence = data.essence || [];

  // ── Render Quotes ──
  const quoteList = document.getElementById('quoteList');
  if (quotes.length === 0) {
    quoteList.innerHTML = '<div class="empty-state">No quotes distilled yet.</div>';
  } else {
    quotes.forEach(q => {
      const card = document.createElement('div');
      card.className = 'quote-card fade-in';
      card.onclick = function() { this.classList.toggle('expanded'); };
      card.innerHTML =
        '<div class="quote-text">' + escHtml(q.text) + '</div>' +
        '<div class="quote-footer">' +
          (q.chapter ? '<span class="quote-chapter">Ch.' + q.chapter + '</span>' : '') +
          '<span class="quote-expand-hint">click to expand</span>' +
        '</div>' +
        (q.context ? '<div class="quote-context">' + escHtml(q.context) + '</div>' : '');
      quoteList.appendChild(card);
    });
  }

  // ── Render Concepts ──
  const conceptGrid = document.getElementById('conceptGrid');
  if (concepts.length === 0) {
    conceptGrid.innerHTML = '<div class="empty-state">No concepts distilled yet.</div>';
  } else {
    concepts.forEach(c => {
      const card = document.createElement('div');
      card.className = 'concept-card fade-in';
      card.innerHTML =
        '<div class="concept-icon">' + (c.icon || '\u{1F9E0}') + '</div>' +
        '<div class="concept-name">' + escHtml(c.name) + '</div>' +
        (c.nameZh ? '<div class="concept-name-zh">' + escHtml(c.nameZh) + '</div>' : '') +
        '<div class="concept-summary">' + escHtml(c.summary || '') + '</div>' +
        '<div class="concept-more">hover to read more</div>';
      conceptGrid.appendChild(card);
    });
  }

  // ── Render Principles ──
  const principleList = document.getElementById('principleList');
  if (principles.length === 0) {
    principleList.innerHTML = '<div class="empty-state">No principles distilled yet.</div>';
  } else {
    principles.forEach(p => {
      const item = document.createElement('div');
      item.className = 'principle-item fade-in';
      item.innerHTML =
        '<div class="principle-num"></div>' +
        '<div class="principle-icon">' + (p.icon || '\u{1F4A1}') + '</div>' +
        '<div class="principle-body">' +
          '<div class="principle-text">' + escHtml(p.text) + '</div>' +
          (p.textZh ? '<div class="principle-text-zh">' + escHtml(p.textZh) + '</div>' : '') +
        '</div>';
      principleList.appendChild(item);
    });
  }

  // ── Render Essence ──
  const essenceList = document.getElementById('essenceList');
  if (essence.length === 0) {
    essenceList.innerHTML = '<div class="empty-state">No chapter essences distilled yet.</div>';
  } else {
    essence.forEach(e => {
      const item = document.createElement('div');
      item.className = 'essence-item fade-in';
      item.innerHTML =
        '<div class="essence-chapter">Ch.' + (e.chapter || '?') + '</div>' +
        '<div class="essence-body">' +
          (e.title ? '<div class="essence-title">' + escHtml(e.title) + '</div>' : '') +
          '<div class="essence-sentence">' + escHtml(e.sentence || '') + '</div>' +
        '</div>';
      essenceList.appendChild(item);
    });
  }

  // ── Utility ──
  function escHtml(s) {
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  // ── Scroll Progress ──
  var progressBar = document.getElementById('progress-bar');
  window.addEventListener('scroll', function() {
    var h = document.documentElement;
    var pct = (h.scrollTop / (h.scrollHeight - h.clientHeight)) * 100;
    progressBar.style.width = Math.min(pct, 100) + '%';
  });

  // ── IntersectionObserver Fade-in ──
  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.1 });

  document.querySelectorAll('.fade-in').forEach(function(el) {
    observer.observe(el);
  });

  // ── Active nav pill tracking ──
  var sections = ['quotes', 'concepts', 'principles', 'essence'];
  var navPills = document.querySelectorAll('.nav-pill');
  var sectionObserver = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        navPills.forEach(function(p) { p.classList.remove('active'); });
        var pill = document.querySelector('.nav-pill[href="#' + entry.target.id + '"]');
        if (pill) pill.classList.add('active');
      }
    });
  }, { rootMargin: '-40% 0px -60% 0px' });

  sections.forEach(function(id) {
    var el = document.getElementById(id);
    if (el) sectionObserver.observe(el);
  });
})();

function scrollToSection(id, el) {
  var target = document.getElementById(id);
  if (target) {
    target.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
  document.querySelectorAll('.nav-pill').forEach(function(p) { p.classList.remove('active'); });
  if (el) el.classList.add('active');
}
</script>
<!-- Theme Toggle -->
<button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
  <span class="theme-toggle-icon" id="themeIcon"></span>
</button>
<style>
.theme-toggle {
  position: fixed;
  top: 1rem;
  right: 1rem;
  z-index: 9999;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--card);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.1rem;
  transition: all 0.3s;
  opacity: 0.7;
  padding: 0;
  line-height: 1;
}
.theme-toggle:hover {
  opacity: 1;
  transform: scale(1.1);
  border-color: var(--accent);
  box-shadow: 0 0 12px var(--glow);
}
</style>
<script>
(function() {
  var KEY = 'hyperion-theme';
  var toggle = document.getElementById('themeToggle');
  var icon = document.getElementById('themeIcon');

  function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    icon.textContent = theme === 'light' ? '\u{1F319}' : '\u{2600}\u{FE0F}';
    localStorage.setItem(KEY, theme);
    window.dispatchEvent(new CustomEvent('themechange', { detail: { theme: theme } }));
  }

  var saved = localStorage.getItem(KEY);
  if (saved) {
    applyTheme(saved);
  } else {
    icon.textContent = '\u{2600}\u{FE0F}';
  }

  toggle.addEventListener('click', function() {
    var current = document.documentElement.getAttribute('data-theme');
    applyTheme(current === 'light' ? 'dark' : 'light');
  });

  // Utility for canvas code: read theme-aware CSS var values
  window.getThemeRGB = function(varName) {
    return getComputedStyle(document.documentElement).getPropertyValue(varName).trim();
  };
})();
</script>
