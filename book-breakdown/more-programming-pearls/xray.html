        <div class="section-header fade-in">
            <div class="section-badge">02 — CORE QUESTIONS</div>
            <div class="section-title">这本书回答的核心问题</div>
        </div>
        <ol class="question-list">`;
        xray.coreQuestions.forEach(q => {
            html += `
            <li class="question-item fade-in">
                <div class="question-text">${q.question || q}</div>
                ${q.context ? `<div class="question-context">${q.context}</div>` : ''}
            </li>`;
        });
        html += '</ol>';
    }

    // Logical Outline
    if (xray.outline && xray.outline.length) {
        html += `
        <div class="section-header fade-in">
            <div class="section-badge">03 — LOGICAL OUTLINE</div>
            <div class="section-title">逻辑结构（可能不同于目录顺序）</div>
        </div>`;
        xray.outline.forEach((group, i) => {
            if (i > 0) html += '<div class="outline-connector"></div>';
            html += `
            <div class="outline-card fade-in">
                <div class="outline-num">${String(i + 1).padStart(2, '0')}</div>
                <div class="outline-title">${group.title || group.group || ''}</div>
                <div class="outline-desc">${group.desc || group.why || ''}</div>
                ${group.chapters ? `<div class="outline-chapters">Chapters: ${group.chapters.join(', ')}</div>` : ''}
            </div>`;
        });
    }

    // Key Terms
    if (xray.keyTerms && xray.keyTerms.length) {
        html += `
        <div class="section-header fade-in">
            <div class="section-badge">04 — KEY TERMS</div>
            <div class="section-title">关键术语词汇表</div>
        </div>
        <div class="terms-grid">`;
        xray.keyTerms.forEach(t => {
            const chLink = t.firstChapter ? `<a href="ch${String(t.firstChapter).padStart(2, '0')}.html">Ch.${t.firstChapter}</a>` : '';
            html += `
            <div class="term-card fade-in">
                <div class="term-name">${t.term}${t.termEn ? `<span class="term-name-en">${t.termEn}</span>` : ''}</div>
                <div class="term-def">${t.definition || t.def || ''}</div>
                ${chLink ? `<div class="term-chapter">First appears: ${chLink}</div>` : ''}
            </div>`;
        });
        html += '</div>';
    }

    container.innerHTML = html;

    // Observe fade-ins
    const observer = new IntersectionObserver(entries => {
        entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); } });
    }, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });
    container.querySelectorAll('.fade-in').forEach(el => observer.observe(el));

    window.addEventListener('scroll', () => {
        document.getElementById('fixedNav').classList.toggle('scrolled', window.scrollY > 50);
    });
})();
</script>
<!-- Theme Toggle (injected into .fixed-nav) -->
<style>
.theme-toggle {
  margin-left: auto;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--card);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.9rem;
  transition: all 0.3s;
  opacity: 0.7;
  padding: 0;
  line-height: 1;
  flex-shrink: 0;
}
.theme-toggle:hover {
  opacity: 1;
  transform: scale(1.1);
  border-color: var(--accent);
  box-shadow: 0 0 12px var(--glow);
}
</style>
<script>
(function() {
  var KEY = 'hyperion-theme';
  var toggle = document.getElementById('themeToggle');
  var icon = document.getElementById('themeIcon');

  function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    icon.textContent = theme === 'light' ? '\u{1F319}' : '\u{2600}\u{FE0F}';
    localStorage.setItem(KEY, theme);
    window.dispatchEvent(new CustomEvent('themechange', { detail: { theme: theme } }));
  }

  var saved = localStorage.getItem(KEY);
  if (saved) {
    applyTheme(saved);
  } else {
    icon.textContent = '\u{2600}\u{FE0F}';
  }

  toggle.addEventListener('click', function() {
    var current = document.documentElement.getAttribute('data-theme');
    applyTheme(current === 'light' ? 'dark' : 'light');
  });

  // Utility for canvas code: read theme-aware CSS var values
  window.getThemeRGB = function(varName) {
    return getComputedStyle(document.documentElement).getPropertyValue(varName).trim();
  };
})();
</script>

</body>
