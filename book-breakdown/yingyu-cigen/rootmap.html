<style>
:root {
  --bg: #0f1117;
  --card: #1a1d27;
  --card-hover: #222636;
  --accent: #6c63ff;
  --accent-rgb: 108,99,255;
  --accent2: #ff6b6b;
  --accent2-rgb: 255,107,107;
  --accent3: #4ecdc4;
  --accent3-rgb: 78,205,196;
  --accent4: #ffe66d;
  --accent4-rgb: 255,230,109;
  --text: #e8e8f0;
  --text-dim: #8888a0;
  --border: #2a2d3a;
  --font-sans: 'Noto Sans SC', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  --radius: 14px;
}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  overflow: hidden;
  height: 100vh;
}
::selection { background: var(--accent); color: #fff; }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ── Layout ── */
.app { display: flex; height: 100vh; }
.main { flex: 1; display: flex; flex-direction: column; position: relative; }
canvas { flex: 1; display: block; cursor: grab; }
canvas:active { cursor: grabbing; }

/* ── Top Bar ── */
.top-bar {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 20px;
  background: var(--card);
  border-bottom: 1px solid var(--border);
  z-index: 10;
}
.back-link {
  color: var(--text-dim); text-decoration: none; font-size: 0.85rem;
  display: flex; align-items: center; gap: 4px;
  transition: color 0.2s;
}
.back-link:hover { color: var(--accent); }
.top-title { font-size: 1rem; font-weight: 700; }
.top-title-en { font-size: 0.8rem; color: var(--text-dim); font-weight: 300; margin-left: 8px; }

/* ── Search ── */
.search-box {
  margin-left: auto;
  position: relative;
}
.search-box input {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 2rem;
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 0.8rem;
  padding: 6px 16px 6px 32px;
  width: 220px;
  outline: none;
  transition: border-color 0.2s, width 0.3s;
}
.search-box input:focus {
  border-color: var(--accent);
  width: 300px;
}
.search-box::before {
  content: '🔍';
  position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
  font-size: 0.75rem; pointer-events: none;
}

/* ── Filter Pills ── */
.filters {
  display: flex; gap: 8px;
  padding: 8px 20px;
  background: var(--card);
  border-bottom: 1px solid var(--border);
}
.filter-pill {
  display: flex; align-items: center; gap: 6px;
  padding: 4px 14px;
  border-radius: 2rem;
  border: 1px solid var(--border);
  font-size: 0.75rem;
  font-family: var(--font-mono);
  cursor: pointer;
  transition: all 0.2s;
  user-select: none;
  color: var(--text-dim);
}
.filter-pill .dot {
  width: 8px; height: 8px; border-radius: 50%;
}
.filter-pill.active {
  color: var(--text);
  border-color: var(--text-dim);
}
.filter-pill.active .dot { box-shadow: 0 0 6px currentColor; }

.stats-bar {
  display: flex; gap: 20px;
  margin-left: auto;
  font-family: var(--font-mono);
  font-size: 0.75rem;
  color: var(--text-dim);
}
.stats-bar strong { color: var(--accent4); }

/* ── Tooltip ── */
.tooltip {
  position: fixed;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 16px;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.15s;
  z-index: 100;
  max-width: 320px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}
.tooltip.visible { opacity: 1; }
.tooltip-root {
  font-family: var(--font-mono);
  font-size: 1rem;
  font-weight: 700;
  margin-bottom: 4px;
}
.tooltip-meaning { font-size: 0.85rem; color: var(--text-dim); margin-bottom: 6px; }
.tooltip-derivs { font-size: 0.8rem; color: var(--accent3); }

/* ── Side Panel ── */
.side-panel {
  width: 0;
  overflow: hidden;
  background: var(--card);
  border-left: 1px solid var(--border);
  transition: width 0.3s ease;
  flex-shrink: 0;
}
.side-panel.open { width: 340px; }
.panel-inner {
  width: 340px;
  padding: 24px;
  height: 100%;
  overflow-y: auto;
}
.panel-close {
  float: right;
  background: none; border: none;
  color: var(--text-dim);
  font-size: 1.2rem;
  cursor: pointer;
  transition: color 0.2s;
}
.panel-close:hover { color: var(--accent2); }
.panel-icon { font-size: 2.5rem; margin-bottom: 8px; }
.panel-root {
  font-family: var(--font-mono);
  font-size: 1.4rem;
  font-weight: 700;
  margin-bottom: 4px;
}
.panel-origin {
  display: inline-block;
  padding: 2px 10px;
  border-radius: 2rem;
  font-size: 0.7rem;
  font-family: var(--font-mono);
  margin-bottom: 12px;
}
.panel-meaning {
  font-size: 0.95rem;
  color: var(--text-dim);
  margin-bottom: 4px;
}
.panel-meaning-zh {
  font-size: 0.9rem;
  color: var(--accent4);
  margin-bottom: 16px;
}
.panel-chapter {
  font-size: 0.8rem;
  color: var(--text-dim);
  margin-bottom: 16px;
}
.panel-chapter a {
  color: var(--accent);
  text-decoration: none;
}
.panel-chapter a:hover { text-decoration: underline; }
.panel-section-title {
  font-family: var(--font-mono);
  font-size: 0.75rem;
  color: var(--accent);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 10px;
}
.deriv-list { list-style: none; }
.deriv-item {
  padding: 8px 12px;
  background: var(--bg);
  border-radius: 8px;
  margin-bottom: 6px;
  transition: transform 0.2s;
}
.deriv-item:hover { transform: translateX(4px); }
.deriv-word {
  font-family: var(--font-mono);
  font-weight: 700;
  font-size: 0.9rem;
}
.deriv-def {
  font-size: 0.8rem;
  color: var(--text-dim);
  margin-top: 2px;
}

/* ── Help Overlay ── */
.help-btn {
  position: fixed; bottom: 20px; right: 20px;
  width: 36px; height: 36px;
  border-radius: 50%;
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text-dim);
  font-size: 0.9rem;
  cursor: pointer;
  z-index: 50;
  transition: all 0.2s;
}
.help-btn:hover { border-color: var(--accent); color: var(--text); }

/* ── Zoom Controls ── */
.zoom-controls {
  position: fixed; bottom: 20px; left: 20px;
  display: flex; flex-direction: column; gap: 4px;
  z-index: 50;
}
.zoom-btn {
  width: 36px; height: 36px;
  border-radius: 8px;
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text-dim);
  font-size: 1.1rem;
  cursor: pointer;
  transition: all 0.2s;
  display: flex; align-items: center; justify-content: center;
}
.zoom-btn:hover { border-color: var(--accent); color: var(--text); }

/* ── Search Results Dropdown ── */
.search-results {
  position: absolute;
  top: 100%;
  right: 0;
  margin-top: 4px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  max-height: 300px;
  overflow-y: auto;
  width: 300px;
  display: none;
  z-index: 200;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}
.search-results.visible { display: block; }
.search-result-item {
  padding: 8px 14px;
  cursor: pointer;
  font-size: 0.85rem;
  transition: background 0.15s;
  border-bottom: 1px solid var(--border);
}
.search-result-item:last-child { border-bottom: none; }
.search-result-item:hover { background: var(--card-hover); }
.search-result-item .sr-root {
  font-family: var(--font-mono);
  font-weight: 700;
}
.search-result-item .sr-meaning {
  color: var(--text-dim);
  font-size: 0.75rem;
}

@media (max-width: 768px) {
  .side-panel.open { width: 100vw; position: fixed; inset: 0; z-index: 200; }
  .panel-inner { width: 100%; }
  .search-box input { width: 140px; }
  .search-box input:focus { width: 200px; }
  .stats-bar { display: none; }
}
/* ── RGB triplet defaults (dark) ── */

/* ── Theme-aware colors (read from CSS vars) ── */
function getThemeColors() {
  const s = getComputedStyle(document.documentElement);
  return {
    bg: s.getPropertyValue('--bg').trim() || '#0f1117',
    text: s.getPropertyValue('--text').trim() || '#e8e8f0',
    textDim: s.getPropertyValue('--text-dim').trim() || '#8888a0',
    card: s.getPropertyValue('--card').trim() || '#1a1d27',
    border: s.getPropertyValue('--border').trim() || '#2a2d3a',
    accent4: s.getPropertyValue('--accent4').trim() || '#ffe66d',
  };
}
let TC = getThemeColors();

// Re-read theme colors when theme toggles
const themeObserver = new MutationObserver(() => { TC = getThemeColors(); });
themeObserver.observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme'] });

const ORIGINS = {};
rootmap.origins.forEach(o => { ORIGINS[o.id] = o; });

const COLOR_MAP = {};
rootmap.origins.forEach(o => { COLOR_MAP[o.id] = o.color; });

/* ── Build Nodes & Edges ── */
const nodes = [];
const edges = [];
const rootById = {};

// Origin hub nodes
rootmap.origins.forEach((o, i) => {
  nodes.push({
    id: 'origin_' + o.id,
    type: 'origin',
    label: o.label,
    labelZh: o.labelZh,
    color: o.color,
    x: 0, y: 0,
    vx: 0, vy: 0,
    radius: 28,
    fixed: false,
  });
});

// Root nodes
rootmap.roots.forEach(r => {
  const node = {
    id: r.id,
    type: 'root',
    label: r.root,
    meaning: r.meaning,
    meaningZh: r.meaningZh,
    icon: r.icon,
    origin: r.origin,
    chapter: r.chapter,
    derivatives: r.derivatives || [],
    color: COLOR_MAP[r.origin] || '#888',
    x: 0, y: 0,
    vx: 0, vy: 0,
    radius: 7,
    expanded: false,
  };
  nodes.push(node);
  rootById[r.id] = node;

  // Edge from origin hub to root
  edges.push({ source: 'origin_' + r.origin, target: r.id, type: 'origin-root' });
});

/* ── Initial Positions — radial layout by origin ── */
const originNodes = nodes.filter(n => n.type === 'origin');
const angleStep = (2 * Math.PI) / originNodes.length;
originNodes.forEach((n, i) => {
  n.x = Math.cos(angleStep * i - Math.PI / 2) * 250;
  n.y = Math.sin(angleStep * i - Math.PI / 2) * 250;
});

rootmap.roots.forEach((r, i) => {
  const hub = nodes.find(n => n.id === 'origin_' + r.origin);
  const group = rootmap.roots.filter(rr => rr.origin === r.origin);
  const idx = group.indexOf(r);
  const count = group.length;
  const angle = (2 * Math.PI * idx / count) + Math.random() * 0.3;
  const dist = 120 + Math.random() * 100;
  const node = rootById[r.id];
  node.x = hub.x + Math.cos(angle) * dist;
  node.y = hub.y + Math.sin(angle) * dist;
});

/* ── Canvas Setup ── */
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H;
let scale = 1, offsetX = 0, offsetY = 0;
let dragging = false, dragStart = null;
let dragNode = null;
let hoveredNode = null;
let selectedRoot = null;
let activeFilters = new Set(rootmap.origins.map(o => o.id));
let searchQuery = '';

function resize() {
  W = canvas.clientWidth;
  H = canvas.clientHeight;
  canvas.width = W * devicePixelRatio;
  canvas.height = H * devicePixelRatio;
  ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
}
window.addEventListener('resize', resize);
resize();

/* ── Filters UI ── */
(function buildFilters() {
  const el = document.getElementById('filters');
  rootmap.origins.forEach(o => {
    const count = rootmap.roots.filter(r => r.origin === o.id).length;
    const pill = document.createElement('div');
    pill.className = 'filter-pill active';
    pill.dataset.origin = o.id;
    pill.innerHTML = `<span class="dot" style="background:${o.color}"></span>${o.label} · ${o.labelZh} <span style="opacity:0.5">${count}</span>`;
    pill.addEventListener('click', () => {
      if (activeFilters.has(o.id)) {
        activeFilters.delete(o.id);
        pill.classList.remove('active');
      } else {
        activeFilters.add(o.id);
        pill.classList.add('active');
      }
    });
    el.appendChild(pill);
  });

  // Stats
  const stats = document.createElement('div');
  stats.className = 'stats-bar';
  stats.innerHTML = `
    <span><strong>${rootmap.stats.totalRoots}</strong> roots</span>
    <span><strong>${rootmap.stats.totalDerivatives}</strong> derivatives</span>
  `;
  el.appendChild(stats);
})();

/* ── Force Simulation ── */
function applyForces() {
  const nodeMap = {};
  nodes.forEach(n => { nodeMap[n.id] = n; });

  // Repulsion between all visible nodes
  const visible = nodes.filter(n => {
    if (n.type === 'origin') return activeFilters.has(n.id.replace('origin_', ''));
    if (n.type === 'root') return activeFilters.has(n.origin);
    if (n.type === 'deriv') return activeFilters.has(n.origin);
    return true;
  });

  for (let i = 0; i < visible.length; i++) {
    for (let j = i + 1; j < visible.length; j++) {
      const a = visible[i], b = visible[j];
      let dx = b.x - a.x, dy = b.y - a.y;
      let dist = Math.sqrt(dx * dx + dy * dy) || 1;
      const minDist = (a.radius + b.radius) * 3;
      if (dist < minDist) {
        const force = (minDist - dist) / dist * 0.15;
        const fx = dx * force, fy = dy * force;
        if (!a.fixed) { a.vx -= fx; a.vy -= fy; }
        if (!b.fixed) { b.vx += fx; b.vy += fy; }
      }
    }
  }

  // Spring forces along edges
  edges.forEach(e => {
    const a = nodeMap[e.source], b = nodeMap[e.target];
    if (!a || !b) return;
    const dx = b.x - a.x, dy = b.y - a.y;
    const dist = Math.sqrt(dx * dx + dy * dy) || 1;
    const targetDist = e.type === 'origin-root' ? 180 : 50;
    const force = (dist - targetDist) / dist * 0.02;
    const fx = dx * force, fy = dy * force;
    if (!a.fixed) { a.vx += fx; a.vy += fy; }
    if (!b.fixed) { b.vx -= fx; b.vy -= fy; }
  });

  // Center gravity
  visible.forEach(n => {
    if (n.fixed) return;
    n.vx -= n.x * 0.0005;
    n.vy -= n.y * 0.0005;
  });

  // Velocity damping & position update
  visible.forEach(n => {
    if (n.fixed) return;
    n.vx *= 0.85;
    n.vy *= 0.85;
    n.x += n.vx;
    n.y += n.vy;
  });
}

/* ── Expand / Collapse Derivatives ── */
function expandRoot(rootNode) {
  if (rootNode.expanded) return;
  rootNode.expanded = true;
  const derivs = rootNode.derivatives;
  derivs.forEach((d, i) => {
    const angle = (2 * Math.PI * i / derivs.length);
    const dist = 40 + derivs.length * 3;
    const dNode = {
      id: rootNode.id + '_d_' + i,
      type: 'deriv',
      label: d.word,
      def: d.def,
      origin: rootNode.origin,
      parentRoot: rootNode.id,
      color: rootNode.color,
      x: rootNode.x + Math.cos(angle) * dist,
      y: rootNode.y + Math.sin(angle) * dist,
      vx: 0, vy: 0,
      radius: 4,
    };
    nodes.push(dNode);
    edges.push({ source: rootNode.id, target: dNode.id, type: 'root-deriv' });
  });
}

function collapseRoot(rootNode) {
  if (!rootNode.expanded) return;
  rootNode.expanded = false;
  const toRemove = nodes.filter(n => n.type === 'deriv' && n.parentRoot === rootNode.id);
  const removeIds = new Set(toRemove.map(n => n.id));
  for (let i = nodes.length - 1; i >= 0; i--) {
    if (removeIds.has(nodes[i].id)) nodes.splice(i, 1);
  }
  for (let i = edges.length - 1; i >= 0; i--) {
    if (removeIds.has(edges[i].target)) edges.splice(i, 1);
  }
}

/* ── Coordinate Transforms ── */
function toScreen(x, y) {
  return [x * scale + offsetX + W / 2, y * scale + offsetY + H / 2];
}
function toWorld(sx, sy) {
  return [(sx - W / 2 - offsetX) / scale, (sy - H / 2 - offsetY) / scale];
}

/* ── Draw ── */
function draw() {
  ctx.clearRect(0, 0, W, H);
  ctx.save();
  ctx.translate(W / 2 + offsetX, H / 2 + offsetY);
  ctx.scale(scale, scale);

  const nodeMap = {};
  nodes.forEach(n => { nodeMap[n.id] = n; });

  // Draw edges
  edges.forEach(e => {
    const a = nodeMap[e.source], b = nodeMap[e.target];
    if (!a || !b) return;
    if (a.type === 'origin' && !activeFilters.has(a.id.replace('origin_', ''))) return;
    if (b.type === 'root' && !activeFilters.has(b.origin)) return;
    if (b.type === 'deriv' && !activeFilters.has(b.origin)) return;

    ctx.beginPath();
    ctx.moveTo(a.x, a.y);
    ctx.lineTo(b.x, b.y);
    if (e.type === 'root-deriv') {
      ctx.strokeStyle = hexAlpha(b.color, 0.3);
      ctx.lineWidth = 1;
    } else {
      ctx.strokeStyle = hexAlpha(a.color || TC.textDim, 0.1);
      ctx.lineWidth = 0.5;
    }
    ctx.stroke();
  });

  // Draw nodes
  const visible = nodes.filter(n => {
    if (n.type === 'origin') return activeFilters.has(n.id.replace('origin_', ''));
    if (n.type === 'root') return activeFilters.has(n.origin);
    if (n.type === 'deriv') return activeFilters.has(n.origin);
    return true;
  });

  // Nodes: origins, roots, derivs
  visible.forEach(n => {
    const isHovered = hoveredNode === n;
    const isSelected = selectedRoot === n;
    const isSearchMatch = searchQuery && matchesSearch(n, searchQuery);
    const dimmed = searchQuery && !isSearchMatch;

    ctx.beginPath();
    ctx.arc(n.x, n.y, n.radius, 0, Math.PI * 2);

    if (n.type === 'origin') {
      ctx.fillStyle = dimmed ? hexAlpha(n.color, 0.15) : n.color;
      ctx.fill();
      ctx.strokeStyle = TC.text;
      ctx.lineWidth = 2;
      ctx.stroke();
      // Label
      ctx.fillStyle = dimmed ? hexAlpha(TC.text, 0.2) : TC.text;
      ctx.font = 'bold 11px "JetBrains Mono"';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(n.label, n.x, n.y - 2);
      ctx.font = '9px "Noto Sans SC"';
      ctx.fillText(n.labelZh, n.x, n.y + 12);
    } else if (n.type === 'root') {
      const alpha = dimmed ? 0.15 : (isHovered || isSelected ? 1 : 0.7);
      ctx.fillStyle = hexAlpha(n.color, alpha);
      ctx.fill();
      if (isHovered || isSelected) {
        ctx.strokeStyle = TC.text;
        ctx.lineWidth = 1.5;
        ctx.stroke();
      }
      if (isSearchMatch) {
        ctx.strokeStyle = TC.accent4;
        ctx.lineWidth = 2;
        ctx.stroke();
      }
      // Label if zoomed enough or hovered
      if (scale > 1.2 || isHovered || isSelected || isSearchMatch) {
        ctx.fillStyle = dimmed ? hexAlpha(TC.text, 0.15) : (isHovered || isSelected ? TC.text : hexAlpha(TC.text, 0.7));
        ctx.font = `${isHovered || isSelected ? 'bold ' : ''}${Math.max(8, 10 / scale)}px "JetBrains Mono"`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'bottom';
        ctx.fillText(n.label, n.x, n.y - n.radius - 3);
      }
    } else if (n.type === 'deriv') {
      ctx.fillStyle = dimmed ? hexAlpha(n.color, 0.15) : hexAlpha(n.color, 0.6);
      ctx.fill();
      // Label
      ctx.fillStyle = dimmed ? hexAlpha(TC.text, 0.1) : hexAlpha(TC.text, 0.8);
      ctx.font = `${Math.max(7, 9 / scale)}px "JetBrains Mono"`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'bottom';
      ctx.fillText(n.label, n.x, n.y - n.radius - 2);
    }
  });

  ctx.restore();
}

function hexAlpha(hex, alpha) {
  if (hex.length === 4) hex = '#' + hex[1]+hex[1]+hex[2]+hex[2]+hex[3]+hex[3];
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function matchesSearch(node, q) {
  q = q.toLowerCase();
  if (node.type === 'root') {
    if (node.label.toLowerCase().includes(q)) return true;
    if (node.meaning && node.meaning.toLowerCase().includes(q)) return true;
    if (node.meaningZh && node.meaningZh.includes(q)) return true;
    if (node.derivatives.some(d => d.word.toLowerCase().includes(q))) return true;
  }
  if (node.type === 'deriv') {
    if (node.label.toLowerCase().includes(q)) return true;
    if (node.def && node.def.includes(q)) return true;
  }
  if (node.type === 'origin') {
    if (node.label.toLowerCase().includes(q)) return true;
    if (node.labelZh && node.labelZh.includes(q)) return true;
  }
  return false;
}

/* ── Animation Loop ── */
let simSteps = 300;
function tick() {
  if (simSteps > 0) {
    applyForces();
    simSteps--;
  }
  draw();
  requestAnimationFrame(tick);
}
requestAnimationFrame(tick);

/* ── Hit Test ── */
function hitTest(mx, my) {
  const [wx, wy] = toWorld(mx, my);
  let closest = null, closestDist = Infinity;
  for (let i = nodes.length - 1; i >= 0; i--) {
    const n = nodes[i];
    if (n.type === 'origin' && !activeFilters.has(n.id.replace('origin_', ''))) continue;
    if ((n.type === 'root' || n.type === 'deriv') && !activeFilters.has(n.origin)) continue;
    const dx = wx - n.x, dy = wy - n.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const hitRadius = Math.max(n.radius, 10 / scale);
    if (dist < hitRadius && dist < closestDist) {
      closest = n;
      closestDist = dist;
    }
  }
  return closest;
}

/* ── Mouse Events ── */
const tooltip = document.getElementById('tooltip');

canvas.addEventListener('mousedown', e => {
  const hit = hitTest(e.offsetX, e.offsetY);
  if (hit && hit.type !== 'origin') {
    dragNode = hit;
    dragNode.fixed = true;
  } else {
    dragging = true;
    dragStart = { x: e.offsetX - offsetX, y: e.offsetY - offsetY };
  }
});

canvas.addEventListener('mousemove', e => {
  if (dragNode) {
    const [wx, wy] = toWorld(e.offsetX, e.offsetY);
    dragNode.x = wx;
    dragNode.y = wy;
    simSteps = Math.max(simSteps, 50);
    return;
  }
  if (dragging) {
    offsetX = e.offsetX - dragStart.x;
    offsetY = e.offsetY - dragStart.y;
    return;
  }

  const hit = hitTest(e.offsetX, e.offsetY);
  hoveredNode = hit;
  canvas.style.cursor = hit ? 'pointer' : 'grab';

  if (hit && hit.type === 'root') {
    tooltip.innerHTML = `
      <div class="tooltip-root">${escHtml(hit.label)}</div>
      <div class="tooltip-meaning">${escHtml(hit.meaning)}${hit.meaningZh ? ' · ' + escHtml(hit.meaningZh) : ''}</div>
      <div class="tooltip-derivs">${hit.derivatives.slice(0, 6).map(d => escHtml(d.word)).join(', ')}${hit.derivatives.length > 6 ? '...' : ''}</div>
    `;
    tooltip.style.left = (e.clientX + 16) + 'px';
    tooltip.style.top = (e.clientY + 16) + 'px';
    tooltip.classList.add('visible');
  } else if (hit && hit.type === 'deriv') {
    tooltip.innerHTML = `
      <div class="tooltip-root">${escHtml(hit.label)}</div>
      <div class="tooltip-meaning">${escHtml(hit.def || '')}</div>
    `;
    tooltip.style.left = (e.clientX + 16) + 'px';
    tooltip.style.top = (e.clientY + 16) + 'px';
    tooltip.classList.add('visible');
  } else {
    tooltip.classList.remove('visible');
  }
});

canvas.addEventListener('mouseup', e => {
  if (dragNode) {
    dragNode.fixed = false;
    dragNode = null;
    return;
  }
  dragging = false;
});

canvas.addEventListener('click', e => {
  const hit = hitTest(e.offsetX, e.offsetY);
  if (hit && hit.type === 'root') {
    if (selectedRoot && selectedRoot !== hit) collapseRoot(selectedRoot);
    if (hit.expanded) {
      collapseRoot(hit);
      selectedRoot = null;
      closeSidePanel();
    } else {
      expandRoot(hit);
      selectedRoot = hit;
      openSidePanel(hit);
    }
    simSteps = Math.max(simSteps, 100);
  }
});

/* ── Zoom ── */
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const zoomFactor = e.deltaY > 0 ? 0.9 : 1.1;
  const [wx, wy] = toWorld(e.offsetX, e.offsetY);
  scale *= zoomFactor;
  scale = Math.max(0.2, Math.min(8, scale));
  offsetX = e.offsetX - W / 2 - wx * scale;
  offsetY = e.offsetY - H / 2 - wy * scale;
}, { passive: false });

document.getElementById('zoomIn').addEventListener('click', () => { scale = Math.min(8, scale * 1.3); });
document.getElementById('zoomOut').addEventListener('click', () => { scale = Math.max(0.2, scale / 1.3); });
document.getElementById('zoomReset').addEventListener('click', () => { scale = 1; offsetX = 0; offsetY = 0; });

/* ── Side Panel ── */
const sidePanel = document.getElementById('sidePanel');
const panelInner = document.getElementById('panelInner');

function openSidePanel(rootNode) {
  const o = ORIGINS[rootNode.origin] || {};
  panelInner.innerHTML = `
    <button class="panel-close" onclick="closeSidePanel()">✕</button>
    <div class="panel-icon">${rootNode.icon}</div>
    <div class="panel-root">${escHtml(rootNode.label)}</div>
    <div class="panel-origin" style="background:${hexAlpha(rootNode.color, 0.2)};color:${rootNode.color}">
      ${escHtml(o.label || '')} · ${escHtml(o.labelZh || '')}
    </div>
    <div class="panel-meaning">${escHtml(rootNode.meaning)}</div>
    <div class="panel-meaning-zh">${escHtml(rootNode.meaningZh)}</div>
    <div class="panel-chapter">Chapter <a href="ch${String(rootNode.chapter).padStart(2, '0')}.html">${rootNode.chapter}</a></div>
    <div class="panel-section-title">DERIVATIVES · 派生词 (${rootNode.derivatives.length})</div>
    <ul class="deriv-list">
      ${rootNode.derivatives.map(d => `
        <li class="deriv-item">
          <div class="deriv-word">${escHtml(d.word)}</div>
          <div class="deriv-def">${escHtml(d.def)}</div>
        </li>
      `).join('')}
    </ul>
  `;
  sidePanel.classList.add('open');
}

window.closeSidePanel = function() {
  sidePanel.classList.remove('open');
  if (selectedRoot) {
    collapseRoot(selectedRoot);
    selectedRoot = null;
    simSteps = Math.max(simSteps, 50);
  }
};

/* ── Search ── */
const searchInput = document.getElementById('searchInput');
const searchResults = document.getElementById('searchResults');

searchInput.addEventListener('input', () => {
  searchQuery = searchInput.value.trim();
  if (searchQuery.length < 2) {
    searchResults.classList.remove('visible');
    return;
  }

  const q = searchQuery.toLowerCase();
  const matches = [];

  rootmap.roots.forEach(r => {
    const rootNode = rootById[r.id];
    if (!rootNode) return;
    let score = 0;
    if (r.root.toLowerCase().includes(q)) score = 3;
    else if (r.meaning.toLowerCase().includes(q)) score = 2;
    else if (r.meaningZh && r.meaningZh.includes(q)) score = 2;
    else if (r.derivatives.some(d => d.word.toLowerCase().includes(q))) score = 1;
    else if (r.derivatives.some(d => d.def.includes(q))) score = 1;
    if (score > 0) matches.push({ root: r, node: rootNode, score });
  });

  matches.sort((a, b) => b.score - a.score);
  const top = matches.slice(0, 10);

  if (top.length === 0) {
    searchResults.innerHTML = '<div class="search-result-item" style="color:var(--text-dim)">No results</div>';
  } else {
    searchResults.innerHTML = top.map(m => `
      <div class="search-result-item" data-root-id="${m.root.id}">
        <span class="sr-root">${escHtml(m.root.root)}</span>
        <span class="sr-meaning"> = ${escHtml(m.root.meaning)}</span>
      </div>
    `).join('');
  }
  searchResults.classList.add('visible');
});

searchResults.addEventListener('click', e => {
  const item = e.target.closest('.search-result-item');
  if (!item || !item.dataset.rootId) return;
  const rootNode = rootById[item.dataset.rootId];
  if (!rootNode) return;

  // Focus on the root
  if (selectedRoot && selectedRoot !== rootNode) collapseRoot(selectedRoot);
  expandRoot(rootNode);
  selectedRoot = rootNode;
  openSidePanel(rootNode);

  // Pan to node
  offsetX = -rootNode.x * scale;
  offsetY = -rootNode.y * scale;
  simSteps = Math.max(simSteps, 80);

  searchResults.classList.remove('visible');
  searchInput.value = rootNode.label;
  searchQuery = '';
});

searchInput.addEventListener('blur', () => {
  setTimeout(() => searchResults.classList.remove('visible'), 200);
});

searchInput.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    searchInput.value = '';
    searchQuery = '';
    searchResults.classList.remove('visible');
    searchInput.blur();
  }
});

/* ── Keyboard Shortcuts ── */
document.addEventListener('keydown', e => {
  if (e.target === searchInput) return;
  if (e.key === '/' || e.key === 'f') { e.preventDefault(); searchInput.focus(); }
  if (e.key === 'Escape') closeSidePanel();
  if (e.key === '+' || e.key === '=') { scale = Math.min(8, scale * 1.2); }
  if (e.key === '-') { scale = Math.max(0.2, scale / 1.2); }
  if (e.key === '0') { scale = 1; offsetX = 0; offsetY = 0; }
});

/* ── Help ── */
document.getElementById('helpBtn').addEventListener('click', () => {
  alert(
    'Keyboard Shortcuts:\n\n' +
    '/  or  f  — Focus search\n' +
    '+  /  -   — Zoom in / out\n' +
    '0         — Reset view\n' +
    'Esc       — Close panel\n\n' +
    'Mouse:\n' +
    'Click root — Expand derivatives\n' +
    'Drag root  — Move node\n' +
    'Drag bg    — Pan view\n' +
    'Scroll     — Zoom'
  );
});

function escHtml(s) {
  if (!s) return '';
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

})();
</script>
<!-- Theme Toggle -->
<button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
  <span class="theme-toggle-icon" id="themeIcon"></span>
</button>
<style>
.theme-toggle {
  position: fixed;
  top: 1rem;
  right: 1rem;
  z-index: 9999;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--card);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.1rem;
  transition: all 0.3s;
  opacity: 0.7;
  padding: 0;
  line-height: 1;
}
.theme-toggle:hover {
  opacity: 1;
  transform: scale(1.1);
  border-color: var(--accent);
  box-shadow: 0 0 12px var(--glow);
}
</style>
<script>
(function() {
  var KEY = 'hyperion-theme';
  var toggle = document.getElementById('themeToggle');
  var icon = document.getElementById('themeIcon');

  function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    icon.textContent = theme === 'light' ? '\u{1F319}' : '\u{2600}\u{FE0F}';
    localStorage.setItem(KEY, theme);
    window.dispatchEvent(new CustomEvent('themechange', { detail: { theme: theme } }));
  }

  var saved = localStorage.getItem(KEY);
  if (saved) {
    applyTheme(saved);
  } else {
    icon.textContent = '\u{2600}\u{FE0F}';
  }

  toggle.addEventListener('click', function() {
    var current = document.documentElement.getAttribute('data-theme');
    applyTheme(current === 'light' ? 'dark' : 'light');
  });

  // Utility for canvas code: read theme-aware CSS var values
  window.getThemeRGB = function(varName) {
    return getComputedStyle(document.documentElement).getPropertyValue(varName).trim();
  };
})();
</script>
