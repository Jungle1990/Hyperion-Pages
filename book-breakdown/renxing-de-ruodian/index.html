<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<title>人性的弱点 · How to Win Friends and Influence People | Book Breakdown</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap');

:root {
    --bg: #0f1117;
    --card: #1a1d27;
    --card-hover: #222636;
    --accent: #6c63ff;
    --accent2: #ff6b6b;
    --accent3: #4ecdc4;
    --accent4: #ffe66d;
    --text: #e8e8f0;
    --text-dim: #8888a0;
    --border: #2a2d3a;
    --glow: rgba(108, 99, 255, 0.15);
    --radius: 14px;
    --font-sans: 'Noto Sans SC', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body { font-family: var(--font-sans); background: var(--bg); color: var(--text); line-height: 1.8; overflow-x: hidden; }
::selection { background: var(--accent); color: #fff; }

/* ── Hero ── */
.hero { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 2rem; position: relative; overflow: hidden; }
.hero::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at 30% 20%, rgba(108,99,255,0.08) 0%, transparent 50%), radial-gradient(ellipse at 70% 80%, rgba(255,107,107,0.06) 0%, transparent 50%); pointer-events: none; }
.hero-icon { font-size: 6rem; margin-bottom: 1.5rem; animation: float 4s ease-in-out infinite; filter: drop-shadow(0 0 30px rgba(108,99,255,0.3)); }
@keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
.hero h1 { font-size: clamp(3rem, 8vw, 5rem); font-weight: 900; letter-spacing: 0.1em; background: linear-gradient(135deg, #fff 0%, var(--accent) 50%, var(--accent3) 100%); background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: shimmer 4s ease-in-out infinite; margin-bottom: 0.3rem; }
@keyframes shimmer { 0%, 100% { background-position: 0% center; } 50% { background-position: 200% center; } }
.hero-en { font-size: 1.3rem; color: var(--text-dim); font-weight: 300; margin-bottom: 0.5rem; }
.hero-author { font-size: 1rem; color: var(--accent3); font-weight: 400; }
.hero-method { display: inline-block; margin-top: 1.5rem; padding: 0.5rem 1.5rem; border: 1px solid var(--accent); border-radius: 2rem; font-family: var(--font-mono); font-size: 0.85rem; color: var(--accent); letter-spacing: 2px; }

/* Stats */
.stats { display: flex; justify-content: center; gap: 3rem; margin-top: 2rem; }
.stat { text-align: center; }
.stat-num { font-size: 2.5rem; font-weight: 900; color: var(--accent4); font-family: var(--font-mono); }
.stat-label { font-size: 0.8rem; color: var(--text-dim); letter-spacing: 1px; }

.scroll-hint { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); animation: bounce 2s infinite; }
@keyframes bounce { 0%, 100% { transform: translateX(-50%) translateY(0); } 50% { transform: translateX(-50%) translateY(10px); } }
.scroll-hint span { display: block; width: 2px; height: 40px; background: linear-gradient(to bottom, var(--accent), transparent); margin: 0 auto 8px; }
.scroll-hint small { font-size: 0.75rem; color: var(--text-dim); letter-spacing: 2px; }

/* ── Container ── */
.container { max-width: 900px; margin: 0 auto; padding: 0 24px; }

/* ── Part Header ── */
.part-header { margin: 4rem 0 2rem; }
.part-badge { display: inline-block; font-family: var(--font-mono); font-size: 0.75rem; color: var(--accent); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 8px; }
.part-title { font-size: 1.5rem; font-weight: 700; }

/* ── Chapter Cards ── */
.chapter-grid { display: grid; gap: 16px; margin-bottom: 2rem; }
.chapter-card { display: flex; align-items: center; gap: 20px; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px 24px; text-decoration: none; color: var(--text); transition: all 0.3s; }
.chapter-card:hover { border-color: var(--accent); transform: translateY(-3px); box-shadow: 0 8px 30px var(--glow); }
.ch-icon { font-size: 2rem; flex-shrink: 0; }
.ch-num { font-family: var(--font-mono); font-size: 0.8rem; color: var(--accent); letter-spacing: 2px; margin-bottom: 2px; }
.ch-title { font-weight: 600; font-size: 1.05rem; margin-bottom: 2px; }
.ch-title-en { font-size: 0.8rem; color: var(--text-dim); }
.ch-arrow { margin-left: auto; color: var(--accent); font-size: 1.2rem; opacity: 0; transition: opacity 0.3s; }
.chapter-card:hover .ch-arrow { opacity: 1; }

/* ── Footer ── */
.footer { text-align: center; padding: 4rem 0; color: var(--text-dim); font-size: 0.8rem; border-top: 1px solid var(--border); margin-top: 4rem; }

/* ── Tool Links ── */
.tool-links { display: flex; justify-content: center; gap: 12px; margin-top: 2rem; flex-wrap: wrap; }
.tool-link { display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px; border: 1px solid var(--border); border-radius: 2rem; text-decoration: none; color: var(--text-dim); font-size: 0.85rem; transition: all 0.3s; }
.tool-link:hover { border-color: var(--accent); color: var(--text); transform: translateY(-2px); }
.tool-link-icon { font-size: 1.1rem; }

/* ── Fade-in ── */
.fade-in { opacity: 0; transform: translateY(30px); transition: opacity 0.7s ease, transform 0.7s ease; }
.fade-in.visible { opacity: 1; transform: translateY(0); }

@media (max-width: 768px) {
    .stats { gap: 1.5rem; }
    .stat-num { font-size: 1.8rem; }
    .chapter-card { padding: 16px; gap: 14px; }
}
</style>
</head>
<body>

<section class="hero">
    <div class="hero-icon">🤝</div>
    <h1>人性的弱点</h1>
    <div class="hero-en">How to Win Friends and Influence People</div>
    <div class="hero-author">戴尔·卡耐基 (Dale Carnegie)</div>
    <div class="hero-method">FEYNMAN METHOD</div>
    <div class="stats" id="stats"></div>
    <div class="tool-links">
        <a class="tool-link" href="xray.html"><span class="tool-link-icon">🩻</span> X-Ray · 透视这本书</a>
        <a class="tool-link" href="review.html"><span class="tool-link-icon">🔀</span> Interleaved Review · 交叉复习</a>
        <a class="tool-link" href="../syntopical.html"><span class="tool-link-icon">🕸️</span> Syntopical · 主题阅读</a>
    </div>
    <div class="scroll-hint"><span></span><small>SCROLL</small></div>
</section>

<div class="container" id="chaptersContainer"></div>

<script>
const meta = {
  "title": "人性的弱点",
  "titleEn": "How to Win Friends and Influence People",
  "author": "戴尔·卡耐基 (Dale Carnegie)",
  "icon": "🤝",
  "slug": "renxing-de-ruodian",
  "methodLabel": "FEYNMAN METHOD",
  "stats": [
    {
      "num": "15",
      "label": "Chapters"
    },
    {
      "num": "4",
      "label": "Parts"
    },
    {
      "num": "∞",
      "label": "Insights"
    }
  ]
};

const parts = [
  {
    "title": "Part I · 自序与导读 — 成书缘起与使用方法",
    "chapters": [
      1
    ]
  },
  {
    "title": "Part II · 人际关系的基本技巧 — 三大核心法则",
    "chapters": [
      2,
      3,
      4
    ]
  },
  {
    "title": "Part III · 赢得他人喜爱 — 六种让人欢迎你的方法",
    "chapters": [
      5,
      6,
      7
    ]
  },
  {
    "title": "Part IV · 赢得对方认同 — 十二条说服法则",
    "chapters": [
      8,
      9,
      10,
      11,
      12
    ]
  },
  {
    "title": "Part V · 成为领导者 — 九条改变他人的法则",
    "chapters": [
      13,
      14,
      15
    ]
  }
];

const chapterManifest = [
  {
    "num": 1,
    "slug": "ch01",
    "title": "成书缘起与阅读建议",
    "titleEn": "Origin Story & How to Read This Book",
    "icon": "📖"
  },
  {
    "num": 2,
    "slug": "ch02",
    "title": "想采蜜就请善待蜂巢",
    "titleEn": "Don't Criticize, Condemn or Complain",
    "icon": "🐝"
  },
  {
    "num": 3,
    "slug": "ch03",
    "title": "人际交往的秘诀：真诚赞美",
    "titleEn": "Give Honest and Sincere Appreciation",
    "icon": "⭐"
  },
  {
    "num": 4,
    "slug": "ch04",
    "title": "换位思考：激发他人的主动性",
    "titleEn": "Arouse in the Other Person an Eager Want",
    "icon": "🎯"
  },
  {
    "num": 5,
    "slug": "ch05",
    "title": "真心关注他人与微笑的力量",
    "titleEn": "Be Genuinely Interested & Smile",
    "icon": "😊"
  },
  {
    "num": 6,
    "slug": "ch06",
    "title": "记住名字与善于倾听",
    "titleEn": "Remember Names & Be a Good Listener",
    "icon": "👂"
  },
  {
    "num": 7,
    "slug": "ch07",
    "title": "谈论对方兴趣与让人感到重要",
    "titleEn": "Talk About Their Interests & Make Them Feel Important",
    "icon": "💎"
  },
  {
    "num": 8,
    "slug": "ch08",
    "title": "避免争辩与尊重他人意见",
    "titleEn": "Avoid Arguments & Respect Opinions",
    "icon": "🤝"
  },
  {
    "num": 9,
    "slug": "ch09",
    "title": "坦然认错与友善开始",

  },
  {

    "title": "让对方说「是」与鼓励多说话",

  },
  {
    "num": 11,
    "slug": "ch11",
    "title": "让对方觉得是自己的主意",
    "titleEn": "Let the Other Person Feel It's Their Idea",
    "icon": "💡"
  },
  {
    "num": 12,
    "slug": "ch12",
    "title": "激发高尚动机与戏剧化表达",
    "titleEn": "Appeal to Noble Motives & Dramatize",
    "icon": "🎭"
  },
  {

  },
  {

  },
  {
    "num": 15,
    "slug": "ch15",
    "title": "鼓励进步与赋予美誉",
    "titleEn": "Encourage & Give a Reputation to Live Up To",
    "icon": "🏆"
  }
];


/* ── Render Stats ── */
(function() {
    const el = document.getElementById('stats');
    if (typeof meta === 'undefined') return;
    (meta.stats || []).forEach(s => {
        const div = document.createElement('div');
        div.className = 'stat';
        div.innerHTML = `<div class="stat-num">${s.num}</div><div class="stat-label">${s.label}</div>`;
        el.appendChild(div);
    });
})();

/* ── Render Chapters ── */
(function() {
    const container = document.getElementById('chaptersContainer');
    if (typeof parts === 'undefined' || typeof chapterManifest === 'undefined') return;

    parts.forEach((part, pi) => {
        const header = document.createElement('div');
        header.className = 'part-header fade-in';
        header.innerHTML = `<div class="part-badge">Part ${pi + 1}</div><div class="part-title">${part.title}</div>`;
        container.appendChild(header);

        const grid = document.createElement('div');
        grid.className = 'chapter-grid';

        part.chapters.forEach(chNum => {
            const ch = chapterManifest.find(c => c.num === chNum);
            if (!ch) return;
            const a = document.createElement('a');
            a.className = 'chapter-card fade-in';
            a.href = `ch${String(ch.num).padStart(2, '0')}.html`;
            a.innerHTML = `
                <div class="ch-icon">${ch.icon || '📖'}</div>
                <div>
                    <div class="ch-num">CHAPTER ${String(ch.num).padStart(2, '0')}</div>
                    <div class="ch-title">${ch.title}</div>
                    <div class="ch-title-en">${ch.titleEn || ''}</div>
                </div>
                <div class="ch-arrow">→</div>`;
            grid.appendChild(a);
        });

        container.appendChild(grid);
    });
})();

/* ── IntersectionObserver ── */
const observer = new IntersectionObserver(entries => {
    entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); } });
}, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });
document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));
</script>
</body>
