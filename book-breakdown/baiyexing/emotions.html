<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>白夜行 情感弧线 / Emotional Arc</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
    --bg: #0f1117;
    --card: #1a1d27;
    --card-hover: #222636;
    --accent: #6c63ff;
    --accent2: #ff6b6b;
    --accent3: #4ecdc4;
    --accent4: #ffe66d;
    --text: #e8e8f0;
    --text-dim: #8888a0;
    --border: #2a2d3a;
    --glow: rgba(108,99,255,0.15);
}

html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'Noto Sans SC', sans-serif; }

.app { display: flex; flex-direction: column; height: 100vh; width: 100vw; }

/* ── Hero ── */
.hero {
    height: 20vh; min-height: 140px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
    background: linear-gradient(180deg, #13151f 0%, var(--bg) 100%);
}
.hero canvas { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }
.hero-content { position: relative; z-index: 1; text-align: center; }
.hero h1 {
    font-size: clamp(1.4rem, 3vw, 2.2rem); font-weight: 700; letter-spacing: 0.04em;
    background: linear-gradient(135deg, var(--accent4) 0%, var(--accent2) 50%, var(--accent4) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.hero .subtitle { margin-top: 6px; font-size: clamp(0.8rem, 1.4vw, 1rem); color: var(--text-dim); font-weight: 300; letter-spacing: 0.06em; }
.back-link { position: absolute; top: 16px; left: 20px; color: var(--text-dim); text-decoration: none; font-size: 0.85rem; z-index: 2; transition: color 0.2s; }
.back-link:hover { color: var(--accent3); }

/* ── Controls ── */
.controls {
    position: sticky; top: 0; z-index: 20;
    display: flex; align-items: center; gap: 14px; padding: 8px 20px;
    background: rgba(15,17,23,0.92); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border); flex-wrap: wrap;
}
.controls-label { font-size: 0.75rem; color: var(--text-dim); font-family: 'JetBrains Mono', monospace; margin-right: 4px; white-space: nowrap; }
.dim-btn {
    padding: 4px 10px; border-radius: 12px; border: 1.5px solid; background: transparent;
    font-family: 'Noto Sans SC', sans-serif; font-size: 0.78rem; font-weight: 500;
    cursor: pointer; transition: all 0.2s; user-select: none;
}
.dim-btn.active { color: var(--bg) !important; }
.dim-btn:not(.active) { opacity: 0.45; }

/* ── Chart area ── */
.chart-area { flex: 1; position: relative; overflow: hidden; }
.chart-area canvas { position: absolute; top: 0; left: 0; }

/* ── Tooltip ── */
.tooltip {
    position: absolute; z-index: 30; background: var(--card); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 14px; max-width: 300px; pointer-events: none;
    opacity: 0; transition: opacity 0.15s; box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}
.tooltip.visible { opacity: 1; }
.tooltip-chapter { font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; color: var(--text-dim); margin-bottom: 4px; }
.tooltip-title { font-size: 0.85rem; font-weight: 700; margin-bottom: 6px; }
.tooltip-bars { display: flex; flex-direction: column; gap: 4px; }
.tooltip-bar { display: flex; align-items: center; gap: 6px; font-size: 0.72rem; }
.tooltip-bar-fill { height: 6px; border-radius: 3px; transition: width 0.2s; }
.tooltip-bar-label { min-width: 28px; font-family: 'JetBrains Mono', monospace; color: var(--text-dim); font-size: 0.65rem; }

/* ── Detail overlay ── */
.detail-overlay { position: fixed; inset: 0; z-index: 50; background: rgba(0,0,0,0.55); display: none; align-items: flex-end; justify-content: center; }
.detail-overlay.visible { display: flex; }
.detail-panel {
    width: 100%; max-width: 640px; max-height: 50vh;
    background: var(--card); border-top: 2px solid var(--accent4);
    border-radius: 16px 16px 0 0; padding: 24px 28px 32px; overflow-y: auto;
    animation: slideUp 0.3s ease-out;
}
@keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.detail-close { position: absolute; top: 12px; right: 16px; background: none; border: none; color: var(--text-dim); font-size: 1.4rem; cursor: pointer; transition: color 0.2s; line-height: 1; }
.detail-close:hover { color: var(--accent2); }
.detail-header { display: flex; align-items: baseline; gap: 12px; margin-bottom: 12px; }
.detail-header h2 { font-size: 1.15rem; font-weight: 700; }
.detail-header .chapter-num { font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; color: var(--text-dim); }
.detail-emotion-bars { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
.emotion-row { display: flex; align-items: center; gap: 10px; }
.emotion-label { font-size: 0.78rem; min-width: 50px; font-weight: 500; }
.emotion-track { flex: 1; height: 10px; border-radius: 5px; background: rgba(255,255,255,0.05); overflow: hidden; }
.emotion-fill { height: 100%; border-radius: 5px; transition: width 0.3s; }
.emotion-val { font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; color: var(--text-dim); min-width: 30px; text-align: right; }

/* ── Legend ── */
.legend-bar { display: flex; align-items: center; gap: 14px; padding: 6px 20px 8px; border-bottom: 1px solid var(--border); background: rgba(15,17,23,0.6); flex-wrap: wrap; }
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 0.7rem; color: var(--text-dim); font-family: 'JetBrains Mono', monospace; }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

/* ── Arc labels ── */
.arc-label {
    position: absolute; top: 6px;
    font-size: 0.6rem; font-family: 'JetBrains Mono', monospace;
    color: rgba(108,99,255,0.35); pointer-events: none; z-index: 4; white-space: nowrap;
}

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>
<div class="app">
    <section class="hero">
        <canvas id="heroCanvas"></canvas>
        <a href="index.html" class="back-link">&larr; 返回目录 / Back</a>
        <div class="hero-content">
            <h1>情感弧线 / Emotional Arc</h1>
            <p class="subtitle">白夜行 — 故事的心跳节律</p>
        </div>
    </section>

    <div class="controls">
        <span class="controls-label">维度</span>
        <div id="dimBtns"></div>
    </div>

    <div class="legend-bar" id="legendBar"></div>

    <div class="chart-area" id="chartArea">
        <canvas id="chartCanvas"></canvas>
    </div>
</div>

<div class="tooltip" id="tooltip">
    <div class="tooltip-chapter" id="ttChapter"></div>
    <div class="tooltip-title" id="ttTitle"></div>
    <div class="tooltip-bars" id="ttBars"></div>
</div>

<div class="detail-overlay" id="detailOverlay">
    <div class="detail-panel">
        <button class="detail-close" onclick="closeDetail()">&times;</button>
        <div class="detail-header">
            <h2 id="detailTitle"></h2>
            <span class="chapter-num" id="detailChNum"></span>
        </div>
        <div class="detail-emotion-bars" id="detailBars"></div>
    </div>
</div>

<script>
const emotions = {
  "dimensions": [
    "joy",
    "sorrow",
    "tension",
    "peace"
  ],
  "colors": [
    "#ffe66d",
    "#6c63ff",
    "#ff6b6b",
    "#4ecdc4"
  ],
  "chapters": [
    {
      "chapter": 1,
      "joy": 0.05,
      "sorrow": 0.7,
      "tension": 0.85,
      "peace": 0.08
    },
    {
      "chapter": 2,
      "joy": 0.1,
      "sorrow": 0.55,
      "tension": 0.75,
      "peace": 0.15
    },
    {
      "chapter": 3,
      "joy": 0.08,
      "sorrow": 0.6,
      "tension": 0.78,
      "peace": 0.12
    },
    {
      "chapter": 4,
      "joy": 0.12,
      "sorrow": 0.62,
      "tension": 0.72,
      "peace": 0.18
    },
    {
      "chapter": 5,
      "joy": 0.25,
      "sorrow": 0.58,
      "tension": 0.7,
      "peace": 0.2
    },
    {
      "chapter": 6,
      "joy": 0.06,
      "sorrow": 0.75,
      "tension": 0.82,
      "peace": 0.05
    },
    {
      "chapter": 7,
      "joy": 0.2,
      "sorrow": 0.5,
      "tension": 0.6,
      "peace": 0.25
    },
    {
      "chapter": 8,
      "joy": 0.08,
      "sorrow": 0.55,
      "tension": 0.8,
      "peace": 0.1
    },
    {
      "chapter": 9,
      "joy": 0.05,
      "sorrow": 0.68,
      "tension": 0.82,
      "peace": 0.08
    },
    {
      "chapter": 10,
      "joy": 0.04,
      "sorrow": 0.6,
      "tension": 0.88,
      "peace": 0.06
    },
    {
      "chapter": 11,
      "joy": 0.03,
      "sorrow": 0.72,
      "tension": 0.9,
      "peace": 0.05
    },
    {
      "chapter": 12,
      "joy": 0.15,
      "sorrow": 0.65,
      "tension": 0.78,
      "peace": 0.12
    },
    {
      "chapter": 13,
      "joy": 0.02,
      "sorrow": 0.85,
      "tension": 0.95,
      "peace": 0.03
    }
  ]
};

const arcs = [
  {
    "id": "childhood",
    "title": "童年 · 一切的起点",
    "titleEn": "Childhood — The Origin",
    "chapters": [
      1
    ],
    "yearRange": "1973"
  },
  {
    "id": "adolescence",
    "title": "少年时代 · 暗流涌动",
    "titleEn": "Adolescence — Undercurrents",
    "chapters": [
      2,
      3,
      4
    ],
    "yearRange": "1977–1980"
  },
  {
    "id": "university",
    "title": "大学时代 · 犯罪升级",
    "titleEn": "University — Escalation",
    "chapters": [
      5,
      6
    ],
    "yearRange": "1982–1984"
  },
  {
    "id": "marriage",
    "title": "婚姻与事业 · 步步为营",
    "titleEn": "Marriage & Business — Strategic Moves",
    "chapters": [
      7,
      8,
      9
    ],
    "yearRange": "1985–1989"
  },
  {
    "id": "investigation",
    "title": "调查 · 接近真相",
    "titleEn": "Investigation — Closing In",
    "chapters": [
      10,
      11
    ],
    "yearRange": "1991–1992"
  },
  {
    "id": "finale",
    "title": "终章 · 白夜落幕",
    "titleEn": "Finale — End of the White Night",
    "chapters": [
      12,
      13
    ],
    "yearRange": "1998–1999"
  }
];


// ══════════════════════════════════════════════════
// CONFIG
// ══════════════════════════════════════════════════
const DIMS = emotions.dimensions;
const DIM_COLORS = emotions.colors;
const DIM_LABELS = emotions.dimensionLabels || DIMS;
const chapterData = emotions.chapters;
const ARCS = (typeof arcs !== 'undefined') ? arcs : [];

const MARGIN = { top: 50, right: 30, bottom: 50, left: 60 };

let state = {
    dimVisible: DIMS.map(() => true),
    hoveredIdx: -1,
    selectedIdx: -1,
};

// ══════════════════════════════════════════════════
// DOM REFS
// ══════════════════════════════════════════════════
const $hero = document.getElementById('heroCanvas');
const $chart = document.getElementById('chartCanvas');
const $chartArea = document.getElementById('chartArea');
const $tooltip = document.getElementById('tooltip');
const $ttChapter = document.getElementById('ttChapter');
const $ttTitle = document.getElementById('ttTitle');
const $ttBars = document.getElementById('ttBars');
const $detailOverlay = document.getElementById('detailOverlay');
const $detailTitle = document.getElementById('detailTitle');
const $detailChNum = document.getElementById('detailChNum');
const $detailBars = document.getElementById('detailBars');

// ══════════════════════════════════════════════════
// UTILITY
// ══════════════════════════════════════════════════
function dpr() { return window.devicePixelRatio || 1; }

function sizeCanvas(canvas, w, h) {
    const r = dpr();
    canvas.width = w * r;
    canvas.height = h * r;
    canvas.style.width = w + 'px';
    canvas.style.height = h + 'px';
    const ctx = canvas.getContext('2d');
    ctx.setTransform(r, 0, 0, r, 0, 0);
    return ctx;
}

function hexToRGBA(hex, alpha) {
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return 'rgba(' + r + ',' + g + ',' + b + ',' + alpha + ')';
}

// ══════════════════════════════════════════════════
// BUILD CONTROLS
// ══════════════════════════════════════════════════
function buildControls() {
    const wrap = document.getElementById('dimBtns');
    wrap.style.display = 'flex';
    wrap.style.gap = '6px';
    wrap.style.flexWrap = 'wrap';

    DIMS.forEach((dim, i) => {
        const btn = document.createElement('button');
        btn.className = 'dim-btn active';
        btn.textContent = DIM_LABELS[i] || dim;
        btn.style.borderColor = DIM_COLORS[i];
        btn.style.color = DIM_COLORS[i];
        btn.style.background = DIM_COLORS[i];
        btn.addEventListener('click', () => {
            state.dimVisible[i] = !state.dimVisible[i];
            btn.classList.toggle('active');
            btn.style.background = state.dimVisible[i] ? DIM_COLORS[i] : 'transparent';
            render();
        });
        wrap.appendChild(btn);
    });

    // Legend
    const legendBar = document.getElementById('legendBar');
    DIMS.forEach((dim, i) => {
        const item = document.createElement('div');
        item.className = 'legend-item';
        const dot = document.createElement('div');
        dot.className = 'legend-dot';
        dot.style.background = DIM_COLORS[i];
        const label = document.createElement('span');
        label.textContent = DIM_LABELS[i] || dim;
        item.appendChild(dot);
        item.appendChild(label);
        legendBar.appendChild(item);
    });
}

// ══════════════════════════════════════════════════
// HERO PARTICLES
// ══════════════════════════════════════════════════
function initHero() {
    const heroSection = document.querySelector('.hero');
    const w = heroSection.clientWidth;
    const h = heroSection.clientHeight;
    const ctx = sizeCanvas($hero, w, h);
    const particles = [];
    for (let i = 0; i < 50; i++) {
        particles.push({
            x: Math.random() * w, y: Math.random() * h,
            r: Math.random() * 2 + 0.5,
            vx: (Math.random() - 0.5) * 0.3, vy: (Math.random() - 0.5) * 0.2,
            alpha: Math.random() * 0.4 + 0.1,
            color: DIM_COLORS[Math.floor(Math.random() * DIM_COLORS.length)],
        });
    }
    function draw() {
        ctx.clearRect(0, 0, w, h);
        particles.forEach(p => {
            p.x += p.vx; p.y += p.vy;
            if (p.x < 0) p.x = w; if (p.x > w) p.x = 0;
            if (p.y < 0) p.y = h; if (p.y > h) p.y = 0;
            ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
            ctx.fillStyle = p.color; ctx.globalAlpha = p.alpha; ctx.fill();
        });
        ctx.globalAlpha = 1;
        for (let i = 0; i < particles.length; i++) {
            for (let j = i + 1; j < particles.length; j++) {
                const dx = particles[i].x - particles[j].x;
                const dy = particles[i].y - particles[j].y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 80) {
                    ctx.beginPath(); ctx.moveTo(particles[i].x, particles[i].y);
                    ctx.lineTo(particles[j].x, particles[j].y);
                    ctx.strokeStyle = particles[i].color;
                    ctx.globalAlpha = (1 - dist / 80) * 0.08;
                    ctx.lineWidth = 0.5; ctx.stroke();
                }
            }
        }
        ctx.globalAlpha = 1;
        requestAnimationFrame(draw);
    }
    draw();
}

// ══════════════════════════════════════════════════
// CHART DRAWING
// ══════════════════════════════════════════════════
function drawChart() {
    const w = $chartArea.clientWidth;
    const h = $chartArea.clientHeight;
    const ctx = sizeCanvas($chart, w, h);
    ctx.clearRect(0, 0, w, h);

    const plotW = w - MARGIN.left - MARGIN.right;
    const plotH = h - MARGIN.top - MARGIN.bottom;
    const n = chapterData.length;
    if (n === 0) return;

    const xStep = plotW / (n - 1 || 1);

    function xPos(i) { return MARGIN.left + i * xStep; }
    function yPos(v) { return MARGIN.top + plotH * (1 - v); }

    // ── Grid lines ──
    ctx.save();
    ctx.setLineDash([4, 4]);
    for (let v = 0; v <= 1; v += 0.25) {
        const y = yPos(v);
        ctx.beginPath(); ctx.moveTo(MARGIN.left, y); ctx.lineTo(w - MARGIN.right, y);
        ctx.strokeStyle = 'rgba(42,45,58,0.5)'; ctx.lineWidth = 1; ctx.stroke();
        ctx.font = '10px "JetBrains Mono", monospace';
        ctx.fillStyle = 'rgba(136,136,160,0.4)'; ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
        ctx.fillText(v.toFixed(2), MARGIN.left - 8, y);
    }
    ctx.restore();

    // ── Arc separators ──
    if (ARCS.length > 0) {
        ARCS.forEach(arc => {
            if (!arc.chapters || arc.chapters.length === 0) return;
            const firstCh = arc.chapters[0];
            const idx = chapterData.findIndex(c => c.chapter === firstCh);
            if (idx > 0) {
                const x = xPos(idx);
                ctx.beginPath(); ctx.moveTo(x, MARGIN.top); ctx.lineTo(x, h - MARGIN.bottom);
                ctx.strokeStyle = 'rgba(108,99,255,0.2)'; ctx.lineWidth = 1;
                ctx.setLineDash([6, 4]); ctx.stroke(); ctx.setLineDash([]);
            }
            // Arc label at top
            const midIdx = chapterData.findIndex(c => c.chapter === arc.chapters[Math.floor(arc.chapters.length / 2)]);
            if (midIdx >= 0) {
                ctx.font = '9px "Noto Sans SC", sans-serif';
                ctx.fillStyle = 'rgba(108,99,255,0.3)'; ctx.textAlign = 'center'; ctx.textBaseline = 'top';
                ctx.fillText(arc.title || '', xPos(midIdx), MARGIN.top + 4);
            }
        });
    }

    // ── X axis labels ──
    ctx.font = '10px "JetBrains Mono", monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'top';
    const labelEvery = Math.max(1, Math.floor(n / 30));
    chapterData.forEach((ch, i) => {
        if (i % labelEvery !== 0 && i !== n - 1) return;
        const x = xPos(i);
        ctx.fillStyle = 'rgba(136,136,160,0.4)';
        ctx.fillText(ch.chapter, x, h - MARGIN.bottom + 8);
        // Tick
        ctx.beginPath(); ctx.moveTo(x, h - MARGIN.bottom); ctx.lineTo(x, h - MARGIN.bottom + 4);
        ctx.strokeStyle = 'rgba(42,45,58,0.6)'; ctx.lineWidth = 1; ctx.stroke();
    });

    // ── Draw emotion areas ──
    DIMS.forEach((dim, di) => {
        if (!state.dimVisible[di]) return;
        const color = DIM_COLORS[di];
        const points = chapterData.map((ch, i) => ({ x: xPos(i), y: yPos(ch[dim] || 0) }));

        // Area fill
        ctx.beginPath();
        ctx.moveTo(points[0].x, yPos(0));
        points.forEach((p, i) => {
            if (i === 0) { ctx.lineTo(p.x, p.y); return; }
            const prev = points[i - 1];
            const cpx = (prev.x + p.x) / 2;
            ctx.bezierCurveTo(cpx, prev.y, cpx, p.y, p.x, p.y);
        });
        ctx.lineTo(points[points.length - 1].x, yPos(0));
        ctx.closePath();
        ctx.fillStyle = hexToRGBA(color, 0.08);
        ctx.fill();

        // Line
        ctx.beginPath();
        points.forEach((p, i) => {
            if (i === 0) { ctx.moveTo(p.x, p.y); return; }
            const prev = points[i - 1];
            const cpx = (prev.x + p.x) / 2;
            ctx.bezierCurveTo(cpx, prev.y, cpx, p.y, p.x, p.y);
        });
        ctx.strokeStyle = color;
        ctx.lineWidth = 2;
        ctx.globalAlpha = 0.8;
        ctx.stroke();
        ctx.globalAlpha = 1;

        // Data points
        points.forEach((p, i) => {
            const isHovered = state.hoveredIdx === i;
            const r = isHovered ? 6 : 3;
            ctx.beginPath(); ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
            ctx.fillStyle = color;
            ctx.globalAlpha = isHovered ? 1 : 0.6;
            ctx.fill();
            ctx.globalAlpha = 1;
        });
    });

    // ── Hover highlight column ──
    if (state.hoveredIdx >= 0 && state.hoveredIdx < n) {
        const x = xPos(state.hoveredIdx);
        ctx.beginPath(); ctx.moveTo(x, MARGIN.top); ctx.lineTo(x, h - MARGIN.bottom);
        ctx.strokeStyle = 'rgba(232,232,240,0.15)'; ctx.lineWidth = 1; ctx.stroke();
    }

    // Store hit zones
    chapterData.forEach((ch, i) => {
        ch._x = xPos(i);
        ch._hitLeft = xPos(i) - xStep / 2;
        ch._hitRight = xPos(i) + xStep / 2;
    });
}

// ══════════════════════════════════════════════════
// HIT TEST
// ══════════════════════════════════════════════════
function hitTest(mx) {
    for (let i = 0; i < chapterData.length; i++) {
        const ch = chapterData[i];
        if (mx >= ch._hitLeft && mx <= ch._hitRight) return i;
    }
    return -1;
}

// ══════════════════════════════════════════════════
// TOOLTIP
// ══════════════════════════════════════════════════
function showTooltip(idx, clientX, clientY) {
    const ch = chapterData[idx];
    $ttChapter.textContent = '第 ' + ch.chapter + ' 章';
    $ttTitle.textContent = ch.title || '';
    $ttBars.innerHTML = '';
    DIMS.forEach((dim, di) => {
        if (!state.dimVisible[di]) return;
        const val = ch[dim] || 0;
        const bar = document.createElement('div');
        bar.className = 'tooltip-bar';
        bar.innerHTML =
            '<div class="tooltip-bar-label">' + (DIM_LABELS[di] || dim) + '</div>' +
            '<div class="tooltip-bar-fill" style="width:' + (val * 80) + 'px;background:' + DIM_COLORS[di] + '"></div>' +
            '<div class="tooltip-bar-label">' + val.toFixed(2) + '</div>';
        $ttBars.appendChild(bar);
    });
    $tooltip.classList.add('visible');
    let tx = clientX + 16; let ty = clientY - 10;
    if (tx + 300 > window.innerWidth) tx = clientX - 310;
    if (ty < 10) ty = 10;
    $tooltip.style.left = tx + 'px'; $tooltip.style.top = ty + 'px';
}

function hideTooltip() { $tooltip.classList.remove('visible'); }

// ══════════════════════════════════════════════════
// DETAIL PANEL
// ══════════════════════════════════════════════════
function showDetail(idx) {
    const ch = chapterData[idx];
    state.selectedIdx = idx;
    $detailTitle.textContent = ch.title || '第 ' + ch.chapter + ' 章';
    $detailChNum.textContent = 'Chapter ' + ch.chapter;
    $detailBars.innerHTML = '';
    DIMS.forEach((dim, di) => {
        const val = ch[dim] || 0;
        const row = document.createElement('div');
        row.className = 'emotion-row';
        row.innerHTML =
            '<div class="emotion-label" style="color:' + DIM_COLORS[di] + '">' + (DIM_LABELS[di] || dim) + '</div>' +
            '<div class="emotion-track"><div class="emotion-fill" style="width:' + (val * 100) + '%;background:' + DIM_COLORS[di] + '"></div></div>' +
            '<div class="emotion-val">' + val.toFixed(2) + '</div>';
        $detailBars.appendChild(row);
    });
    $detailOverlay.classList.add('visible');
    render();
}

function closeDetail() { $detailOverlay.classList.remove('visible'); state.selectedIdx = -1; render(); }
$detailOverlay.addEventListener('click', (e) => { if (e.target === $detailOverlay) closeDetail(); });

// ══════════════════════════════════════════════════
// MOUSE INTERACTIONS
// ══════════════════════════════════════════════════
$chartArea.addEventListener('mousemove', (e) => {
    const rect = $chartArea.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const idx = hitTest(mx);
    if (idx !== state.hoveredIdx) {
        state.hoveredIdx = idx;
        render();
    }
    if (idx >= 0) {
        showTooltip(idx, e.clientX, e.clientY);
        $chartArea.style.cursor = 'pointer';
    } else {
        hideTooltip();
        $chartArea.style.cursor = 'default';
    }
});

$chartArea.addEventListener('mouseleave', () => {
    state.hoveredIdx = -1; hideTooltip(); render();
});

$chartArea.addEventListener('click', (e) => {
    const rect = $chartArea.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const idx = hitTest(mx);
    if (idx >= 0) showDetail(idx);
});

document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeDetail(); });

// ══════════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════════
function render() { drawChart(); }

let resizeTimer;
window.addEventListener('resize', () => { clearTimeout(resizeTimer); resizeTimer = setTimeout(() => { initHero(); render(); }, 100); });

// ══════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════
document.fonts.ready.then(() => {
    buildControls();
    initHero();
    render();
});
</script>
</body>
</html>
