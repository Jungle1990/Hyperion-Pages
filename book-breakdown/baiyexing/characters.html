<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>白夜行 人物关系 / Character Relationships</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;700&display=swap');

:root {
    --bg: #0f1117;
    --card: #1a1d27;
    --card-hover: #222636;
    --accent: #6c63ff;
    --accent2: #ff6b6b;
    --accent3: #4ecdc4;
    --accent4: #ffe66d;
    --text: #e8e8f0;
    --text-dim: #8888a0;
    --border: #2a2d3a;
    --glow: rgba(108,99,255,0.15);
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html, body {
    width: 100%;
    overflow-x: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans SC', sans-serif;
    line-height: 1.6;
}

/* ---- Hero Section ---- */
.hero {
    height: 30vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    position: relative;
    overflow: hidden;
    background: linear-gradient(180deg, rgba(108,99,255,0.08) 0%, transparent 100%);
}

.hero::before {
    content: '';
    position: absolute;
    width: 500px;
    height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(108,99,255,0.12) 0%, transparent 70%);
    top: -200px;
    left: 50%;
    transform: translateX(-50%);
    animation: heroPulse 6s ease-in-out infinite;
}

.hero::after {
    content: '';
    position: absolute;
    width: 300px;
    height: 300px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,230,109,0.08) 0%, transparent 70%);
    bottom: -100px;
    right: 10%;
    animation: heroPulse2 8s ease-in-out infinite;
}

@keyframes heroPulse {
    0%, 100% { transform: translateX(-50%) scale(1); opacity: 0.6; }
    50% { transform: translateX(-50%) scale(1.15); opacity: 1; }
}

@keyframes heroPulse2 {
    0%, 100% { transform: scale(1); opacity: 0.4; }
    50% { transform: scale(1.2); opacity: 0.7; }
}

.hero h1 {
    font-size: 2.4rem;
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent4) 0%, var(--accent) 50%, var(--accent3) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    position: relative;
    z-index: 1;
}

.hero .subtitle {
    font-size: 1rem;
    color: var(--text-dim);
    margin-top: 0.5rem;
    font-weight: 300;
    position: relative;
    z-index: 1;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 2px;
}

.hero .book-info {
    font-size: 0.85rem;
    color: var(--text-dim);
    margin-top: 0.3rem;
    position: relative;
    z-index: 1;
    opacity: 0.7;
}

.back-link {
    position: absolute;
    top: 1.2rem;
    left: 1.5rem;
    color: var(--text-dim);
    text-decoration: none;
    font-size: 0.9rem;
    transition: color 0.3s;
    z-index: 10;
}

.back-link:hover {
    color: var(--accent);
}

/* ---- Stats Bar ---- */
.stats-bar {
    display: flex;
    justify-content: center;
    gap: 2rem;
    padding: 0.6rem 1.5rem;
    background: rgba(26, 29, 39, 0.6);
    border-bottom: 1px solid var(--border);
}

.stat-item {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.78rem;
    color: var(--text-dim);
}

.stat-value {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 0.9rem;
}

/* ---- Controls Bar ---- */
.controls-bar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(15, 17, 23, 0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0.8rem 1.5rem;
    display: flex;
    flex-wrap: wrap;
    gap: 1rem;
    align-items: center;
}

.control-section {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    flex-wrap: wrap;
}

.control-label {
    font-size: 0.78rem;
    color: var(--text-dim);
    font-weight: 500;
    white-space: nowrap;
    font-family: 'JetBrains Mono', monospace;
}

.group-btn {
    padding: 0.3rem 0.7rem;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--card);
    color: var(--text);
    font-size: 0.78rem;
    cursor: pointer;
    transition: all 0.25s ease;
    font-family: 'Noto Sans SC', sans-serif;
    display: flex;
    align-items: center;
    gap: 0.3rem;
}

.group-btn .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    display: inline-block;
    transition: transform 0.2s;
}

.group-btn.active {
    border-color: var(--accent);
    background: rgba(108, 99, 255, 0.15);
}

.group-btn.active .dot {
    transform: scale(1.3);
}

.group-btn:hover {
    background: var(--card-hover);
    transform: translateY(-1px);
}

.rel-checkbox {
    display: flex;
    align-items: center;
    gap: 0.3rem;
    font-size: 0.78rem;
    cursor: pointer;
    user-select: none;
    transition: opacity 0.2s;
}

.rel-checkbox:hover {
    opacity: 0.85;
}

.rel-checkbox input[type="checkbox"] {
    appearance: none;
    width: 14px;
    height: 14px;
    border: 1px solid var(--border);
    border-radius: 3px;
    background: var(--card);
    cursor: pointer;
    position: relative;
    flex-shrink: 0;
    transition: all 0.2s;
}

.rel-checkbox input[type="checkbox"]:checked {
    background: var(--accent);
    border-color: var(--accent);
}

.rel-checkbox input[type="checkbox"]:checked::after {
    content: '';
    position: absolute;
    left: 3px;
    top: 1px;
    width: 5px;
    height: 8px;
    border: solid var(--bg);
    border-width: 0 2px 2px 0;
    transform: rotate(45deg);
}

.reveal-btn {
    padding: 0.35rem 0.8rem;
    border: 1px solid var(--accent4);
    border-radius: 4px;
    background: transparent;
    color: var(--accent4);
    font-size: 0.78rem;
    cursor: pointer;
    transition: all 0.3s;
    font-family: 'Noto Sans SC', sans-serif;
    position: relative;
    overflow: hidden;
}

.reveal-btn::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,230,109,0.15), transparent);
    transition: left 0.5s;
}

.reveal-btn:hover::before {
    left: 100%;
}

.reveal-btn.active {
    background: rgba(255, 230, 109, 0.18);
    box-shadow: 0 0 12px rgba(255, 230, 109, 0.15);
}

.reveal-btn:hover {
    background: rgba(255, 230, 109, 0.1);
}

.controls-divider {
    width: 1px;
    height: 24px;
    background: var(--border);
    flex-shrink: 0;
}

/* ---- Canvas Area ---- */
.canvas-container {
    position: relative;
    width: 100%;
    height: 65vh;
    min-height: 500px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
}

.canvas-container canvas {
    display: block;
    width: 100%;
    height: 100%;
    cursor: grab;
}

.canvas-container canvas.dragging {
    cursor: grabbing;
}

/* ---- Tooltip ---- */
.tooltip {
    position: fixed;
    pointer-events: none;
    background: rgba(26, 29, 39, 0.96);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.7rem 1rem;
    z-index: 200;
    display: none;
    max-width: 300px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.5);
    backdrop-filter: blur(8px);
}

.tooltip .tt-name {
    font-size: 0.95rem;
    font-weight: 700;
    color: var(--text);
}

.tooltip .tt-en {
    font-size: 0.72rem;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    margin-bottom: 0.2rem;
}

.tooltip .tt-group {
    display: inline-block;
    font-size: 0.65rem;
    padding: 0.1rem 0.4rem;
    border-radius: 3px;
    font-family: 'JetBrains Mono', monospace;
    margin-bottom: 0.3rem;
}

.tooltip .tt-desc {
    font-size: 0.78rem;
    color: var(--text-dim);
    margin-top: 0.3rem;
    line-height: 1.5;
}

/* ---- Detail Panel ---- */
.detail-panel {
    position: fixed;
    right: -360px;
    top: 0;
    width: 340px;
    height: 100vh;
    background: rgba(26, 29, 39, 0.97);
    border-left: 1px solid var(--border);
    z-index: 150;
    padding: 1.5rem;
    overflow-y: auto;
    transition: right 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: -4px 0 30px rgba(0,0,0,0.4);
    backdrop-filter: blur(12px);
}

.detail-panel.open {
    right: 0;
}

.detail-close {
    position: absolute;
    top: 1rem;
    right: 1rem;
    width: 28px;
    height: 28px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--card);
    color: var(--text-dim);
    font-size: 1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
}

.detail-close:hover {
    background: var(--accent2);
    color: var(--text);
    border-color: var(--accent2);
}

.detail-avatar {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.5rem;
    font-weight: 700;
    margin-bottom: 1rem;
    border: 2px solid transparent;
    transition: border-color 0.3s;
}

.detail-name {
    font-size: 1.4rem;
    font-weight: 700;
}

.detail-en {
    font-size: 0.85rem;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    margin-bottom: 0.3rem;
}

.detail-group-tag {
    display: inline-block;
    padding: 0.15rem 0.5rem;
    border-radius: 3px;
    font-size: 0.72rem;
    font-family: 'JetBrains Mono', monospace;
    margin-bottom: 0.8rem;
}

.detail-desc {
    font-size: 0.85rem;
    color: var(--text-dim);
    line-height: 1.7;
    margin-bottom: 1.2rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid var(--border);
}

.detail-connections-title {
    font-size: 0.82rem;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 0.6rem;
}

.detail-conn-item {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.45rem 0.4rem;
    font-size: 0.8rem;
    border-bottom: 1px solid rgba(42, 45, 58, 0.5);
    border-radius: 4px;
    transition: background 0.2s;
    cursor: default;
}

.detail-conn-item:hover {
    background: rgba(108, 99, 255, 0.06);
}

.detail-conn-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
}

.detail-conn-name {
    color: var(--text);
    font-weight: 500;
}

.detail-conn-rel {
    color: var(--text-dim);
    font-size: 0.72rem;
    font-family: 'JetBrains Mono', monospace;
    margin-left: auto;
}

.detail-conn-type-line {
    width: 16px;
    height: 2px;
    flex-shrink: 0;
}

/* ---- Keyboard hint ---- */
.keyboard-hint {
    position: fixed;
    bottom: 1rem;
    left: 1rem;
    font-size: 0.7rem;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    opacity: 0.5;
    z-index: 50;
}

.keyboard-hint kbd {
    display: inline-block;
    padding: 0.1rem 0.35rem;
    border: 1px solid var(--border);
    border-radius: 3px;
    background: var(--card);
    font-size: 0.65rem;
    margin: 0 0.1rem;
}

/* ---- Legend ---- */
.legend {
    background: var(--card);
    border-top: 1px solid var(--border);
    padding: 1.2rem 1.5rem;
    display: flex;
    flex-wrap: wrap;
    gap: 2rem;
    justify-content: center;
}

.legend-section {
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
}

.legend-title {
    font-size: 0.72rem;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 0.2rem;
}

.legend-items {
    display: flex;
    flex-wrap: wrap;
    gap: 0.8rem;
}

.legend-item {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.78rem;
}

.legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
}

.legend-line {
    width: 24px;
    height: 2px;
    position: relative;
}

.legend-line.dashed {
    background: repeating-linear-gradient(90deg, var(--accent4) 0, var(--accent4) 4px, transparent 4px, transparent 8px);
}

.legend-line.solid {
    background: var(--accent3);
}

.legend-line.dotted {
    background: repeating-linear-gradient(90deg, var(--accent2) 0, var(--accent2) 2px, transparent 2px, transparent 5px);
}

.legend-line.dashdot {
    background: repeating-linear-gradient(90deg, var(--accent) 0, var(--accent) 6px, transparent 6px, transparent 9px, var(--accent) 9px, var(--accent) 11px, transparent 11px, transparent 14px);
}

.legend-line.thin-red {
    background: var(--accent2);
    height: 1px;
}

.legend-line.gray {
    background: #666;
}

/* ---- Scrollbar ---- */
::-webkit-scrollbar {
    width: 6px;
}

::-webkit-scrollbar-track {
    background: var(--bg);
}

::-webkit-scrollbar-thumb {
    background: var(--border);
    border-radius: 3px;
}

::-webkit-scrollbar-thumb:hover {
    background: var(--text-dim);
}

/* ---- Responsive ---- */
@media (max-width: 768px) {
    .hero { height: 25vh; }
    .hero h1 { font-size: 1.6rem; }
    .hero .subtitle { font-size: 0.8rem; }
    .controls-bar { padding: 0.6rem 0.8rem; gap: 0.5rem; }
    .detail-panel { width: 100%; right: -100%; }
    .canvas-container { height: 55vh; min-height: 380px; }
    .stats-bar { gap: 1rem; flex-wrap: wrap; }
    .keyboard-hint { display: none; }
    .controls-divider { display: none; }
}

@media (max-width: 480px) {
    .hero h1 { font-size: 1.3rem; }
    .controls-bar { padding: 0.4rem 0.5rem; }
    .group-btn { padding: 0.2rem 0.5rem; font-size: 0.7rem; }
}
</style>
</head>

            particles.push({

    function updateAndDrawParticles() {
        ctx.save();
        particles.forEach(p => {
            p.x += p.vx;
            p.y += p.vy;
            if (p.x < 0) p.x = canvasW;
            if (p.x > canvasW) p.x = 0;
            if (p.y < 0) p.y = canvasH;
            if (p.y > canvasH) p.y = 0;

            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(108, 99, 255, ${p.alpha})`;
            ctx.fill();
        });

        // Draw faint connections between close particles
        for (let i = 0; i < particles.length; i++) {
            for (let j = i + 1; j < particles.length; j++) {
                const dx = particles[i].x - particles[j].x;
                const dy = particles[i].y - particles[j].y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 120) {
                    ctx.beginPath();
                    ctx.moveTo(particles[i].x, particles[i].y);
                    ctx.lineTo(particles[j].x, particles[j].y);
                    ctx.strokeStyle = `rgba(108, 99, 255, ${0.04 * (1 - dist / 120)})`;
                    ctx.lineWidth = 0.5;
                    ctx.stroke();
                }
            }
        }
        ctx.restore();
    }

    // ========== INIT NODES ==========
    function initNodes() {
        const cw = canvas.clientWidth;
        const ch = canvas.clientHeight;

        // Distribute groups evenly in a circle around the center
        const groupKeys = Object.keys(groupConfig);
        const groupPositions = {};
        const centerX = cw * 0.5;
        const centerY = cw > 0 ? ch * 0.48 : ch * 0.5;
        const spreadRadius = Math.min(cw, ch) * 0.28;

        groupKeys.forEach((key, i) => {
            const angle = (2 * Math.PI * i / groupKeys.length) - Math.PI / 2;
            groupPositions[key] = {
                x: centerX + Math.cos(angle) * spreadRadius,
                y: centerY + Math.sin(angle) * spreadRadius,
            };
        });

        nodes = characters.map((c) => {
            const gp = groupPositions[c.group] || { x: centerX, y: centerY };
            const spread = 90;
            return {
                ...c,
                x: gp.x + (Math.random() - 0.5) * spread,
                y: gp.y + (Math.random() - 0.5) * spread,
                vx: 0,
                vy: 0,
            };
        });
    }

    // ========== FORCE SIMULATION ==========
    function runForceSimulation(iterations) {
        const nodeMap = {};
        nodes.forEach(n => nodeMap[n.id] = n);
        const cw = canvas.clientWidth;
        const ch = canvas.clientHeight;
        const cx = cw / 2;
        const cy = ch / 2;

        for (let iter = 0; iter < iterations; iter++) {
            const alpha = 1 - iter / iterations;
            const repulsionStrength = 9000 * alpha;
            const attractionStrength = 0.007 * alpha;
            const gravityStrength = 0.018 * alpha;

            // Repulsion between all nodes
            for (let i = 0; i < nodes.length; i++) {
                for (let j = i + 1; j < nodes.length; j++) {
                    const a = nodes[i], b = nodes[j];
                    let dx = b.x - a.x;
                    let dy = b.y - a.y;
                    let dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 1) dist = 1;
                    // Stronger repulsion for same-group nodes to spread them
                    const groupMul = (a.group === b.group) ? 1.3 : 1.0;
                    const force = (repulsionStrength * groupMul) / (dist * dist);
                    const fx = (dx / dist) * force;
                    const fy = (dy / dist) * force;
                    a.vx -= fx;
                    a.vy -= fy;
                    b.vx += fx;
                    b.vy += fy;
                }
            }

            // Attraction along edges
            edges.forEach(e => {
                const a = nodeMap[e.from];
                const b = nodeMap[e.to];
                if (!a || !b) return;
                let dx = b.x - a.x;
                let dy = b.y - a.y;
                let dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 1) dist = 1;
                const idealDist = (a.group === b.group) ? 90 : 170;
                const force = (dist - idealDist) * attractionStrength;
                const fx = (dx / dist) * force;
                const fy = (dy / dist) * force;
                a.vx += fx;
                a.vy += fy;
                b.vx -= fx;
                b.vy -= fy;
            });

            // Gravity toward center
            nodes.forEach(n => {
                n.vx += (cx - n.x) * gravityStrength;
                n.vy += (cy - n.y) * gravityStrength;
            });

            // Apply velocities with damping
            const damping = 0.82;
            nodes.forEach(n => {
                n.vx *= damping;
                n.vy *= damping;
                n.x += n.vx;
                n.y += n.vy;
                // Keep inside bounds with padding
                const pad = 50;
                n.x = Math.max(pad, Math.min(cw - pad, n.x));
                n.y = Math.max(pad, Math.min(ch - pad, n.y));
            });
        }
    }

    // ========== RESIZE ==========
    function resizeCanvas() {
        const container = canvas.parentElement;

        canvasW = container.clientWidth;

        canvas.width = canvasW * dpr;
        canvas.height = canvasH * dpr;
        canvas.style.width = canvasW + 'px';
        canvas.style.height = canvasH + 'px';
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

        if (e.type === 'secret-alliance' && !showSecretAlliance) return false;
        if (e.type !== 'secret-alliance' && !activeRelTypes.has(e.type)) return false;
        const nm = getNodeMap();
        const from = nm[e.from], to = nm[e.to];
        if (!from || !to) return false;
        return isNodeVisible(from) && isNodeVisible(to);

    function isConnected(nodeId, edge) {

        let r = parseInt(hex.slice(1, 3), 16);
        let g = parseInt(hex.slice(3, 5), 16);
        let b = parseInt(hex.slice(5, 7), 16);
        r = Math.min(255, r + amt);
        g = Math.min(255, g + amt);
        b = Math.min(255, b + amt);
        return '#' + [r, g, b].map(v => v.toString(16).padStart(2, '0')).join('');

    function hexToRgba(hex, a) {
        const r = parseInt(hex.slice(1, 3), 16);
        const g = parseInt(hex.slice(3, 5), 16);
        const b = parseInt(hex.slice(5, 7), 16);

    function computeCurveOffset(edgeIdx) {
        const key = [edges[edgeIdx].from, edges[edgeIdx].to].sort().join('|');
        const total = edgePairCount[key];
        if (total <= 1) return 0;
        const idx = edgePairIndex[edgeIdx];
        // Spread parallel edges: -30, +30, -60, +60, ...
        const side = (idx % 2 === 0) ? 1 : -1;
        const level = Math.floor(idx / 2) + 1;
        return side * level * 30;
    }

    function drawEdge(edgeIdx, nm, alpha) {
        const e = edges[edgeIdx];
        const from = nm[e.from], to = nm[e.to];
        if (!from || !to) return;
        const cfg = edgeTypeConfig[e.type];
        if (!cfg) return;

        const curveOffset = computeCurveOffset(edgeIdx);

        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.lineWidth = cfg.width;

        // For secret-alliance, animate a pulsing glow
        if (e.type === 'secret-alliance') {
            const pulse = 0.5 + 0.5 * Math.sin(animTime * 0.03);
            ctx.strokeStyle = hexToRgba(cfg.color, 0.3 + 0.4 * pulse);
            ctx.lineWidth = cfg.width + pulse * 1.5;
            ctx.shadowColor = cfg.color;
            ctx.shadowBlur = 8 + pulse * 8;
        } else {
            ctx.strokeStyle = cfg.color;
        }

        if (cfg.dash.length > 0) {
            ctx.setLineDash(cfg.dash);
        } else {
            ctx.setLineDash([]);
        }

        ctx.beginPath();
        if (curveOffset === 0) {
            // Straight line
            ctx.moveTo(from.x, from.y);
            ctx.lineTo(to.x, to.y);
        } else {
            // Curved line using quadratic bezier
            const mx = (from.x + to.x) / 2;
            const my = (from.y + to.y) / 2;
            const dx = to.x - from.x;
            const dy = to.y - from.y;
            const len = Math.sqrt(dx * dx + dy * dy) || 1;
            // Perpendicular direction
            const nx = -dy / len;
            const ny = dx / len;
            const cpx = mx + nx * curveOffset;
            const cpy = my + ny * curveOffset;
            ctx.moveTo(from.x, from.y);
            ctx.quadraticCurveTo(cpx, cpy, to.x, to.y);
        }

                const dy = to.y - from.y;
                const len = Math.sqrt(dx * dx + dy * dy) || 1;
                const nx = -dy / len;
                const ny = dx / len;
                const cpx = mx + nx * curveOffset;
                const cpy = my + ny * curveOffset;
                // Tangent at t=1 for quadratic bezier: 2(1-t)(cp - from) + 2t(to - cp) at t=1 => 2(to - cp)
                const tx = to.x - cpx;
                const ty = to.y - cpy;
                angle = Math.atan2(ty, tx);
            }
            const arrowLen = 9;
            const targetR = to.radius + 5;
            ax = to.x - Math.cos(angle) * targetR;
            ay = to.y - Math.sin(angle) * targetR;
            ctx.setLineDash([]);
            ctx.lineWidth = cfg.width;
            ctx.beginPath();
            ctx.moveTo(ax, ay);
            ctx.lineTo(ax - arrowLen * Math.cos(angle - 0.35), ay - arrowLen * Math.sin(angle - 0.35));
            ctx.moveTo(ax, ay);
            ctx.lineTo(ax - arrowLen * Math.cos(angle + 0.35), ay - arrowLen * Math.sin(angle + 0.35));
            ctx.stroke();
        }

        ctx.restore();
    }

    // ========== DRAW EDGE LABEL ==========
    function drawEdgeLabel(edgeIdx, nm) {
        const e = edges[edgeIdx];
        const from = nm[e.from], to = nm[e.to];
        if (!from || !to) return;

        const curveOffset = computeCurveOffset(edgeIdx);
        let mx, my;
        if (curveOffset === 0) {
            mx = (from.x + to.x) / 2;
            my = (from.y + to.y) / 2;
        } else {
            // Midpoint on the quadratic bezier at t=0.5
            const midx = (from.x + to.x) / 2;
            const midy = (from.y + to.y) / 2;
            const dx = to.x - from.x;
            const dy = to.y - from.y;
            const len = Math.sqrt(dx * dx + dy * dy) || 1;
            const nx = -dy / len;
            const ny = dx / len;
            const cpx = midx + nx * curveOffset;
            const cpy = midy + ny * curveOffset;
            // Bezier at t=0.5: B(0.5) = 0.25*from + 0.5*cp + 0.25*to
            mx = 0.25 * from.x + 0.5 * cpx + 0.25 * to.x;
            my = 0.25 * from.y + 0.5 * cpy + 0.25 * to.y;
        }

        ctx.save();
        ctx.font = "11px 'Noto Sans SC', sans-serif";
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';

        const textW = ctx.measureText(e.label).width;
        const padX = 5, padY = 4;

        // Background pill
        ctx.fillStyle = 'rgba(15,17,23,0.85)';
        const rr = 4;
        const bx = mx - textW / 2 - padX;
        const by = my - 8 - padY;
        const bw = textW + padX * 2;
        const bh = 16 + padY * 2;
        ctx.beginPath();
        ctx.moveTo(bx + rr, by);
        ctx.lineTo(bx + bw - rr, by);
        ctx.arcTo(bx + bw, by, bx + bw, by + rr, rr);
        ctx.lineTo(bx + bw, by + bh - rr);
        ctx.arcTo(bx + bw, by + bh, bx + bw - rr, by + bh, rr);
        ctx.lineTo(bx + rr, by + bh);
        ctx.arcTo(bx, by + bh, bx, by + bh - rr, rr);
        ctx.lineTo(bx, by + rr);
        ctx.arcTo(bx, by, bx + rr, by, rr);
        ctx.closePath();
        ctx.fill();

        // Border
        ctx.strokeStyle = edgeTypeConfig[e.type].color + '44';
        ctx.lineWidth = 0.5;
        ctx.stroke();

        // Text
        ctx.fillStyle = edgeTypeConfig[e.type].color;
        ctx.globalAlpha = 0.95;
        ctx.fillText(e.label, mx, my);

        ctx.restore();
    }

    // ========== DRAW NODE ==========
    function drawNode(n, alpha, highlight) {
        const color = groupConfig[n.group].color;
        ctx.save();
        ctx.globalAlpha = alpha;

        // Outer glow
        const glowR = highlight ? n.radius * 2.4 : n.radius * 1.6;
        const glow = ctx.createRadialGradient(n.x, n.y, n.radius * 0.2, n.x, n.y, glowR);
        glow.addColorStop(0, color + (highlight ? '55' : '28'));
        glow.addColorStop(1, color + '00');
        ctx.fillStyle = glow;
        ctx.beginPath();
        ctx.arc(n.x, n.y, glowR, 0, Math.PI * 2);
        ctx.fill();

        // Main circle with gradient
        const r = highlight ? n.radius * 1.15 : n.radius;
        const grad = ctx.createRadialGradient(
            n.x - r * 0.25, n.y - r * 0.25, 0,
            n.x, n.y, r
        );
        grad.addColorStop(0, lightenColor(color, 40));
        grad.addColorStop(0.7, color);
        grad.addColorStop(1, lightenColor(color, -20));
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(n.x, n.y, r, 0, Math.PI * 2);
        ctx.fill();

        // White highlight crescent
        ctx.globalAlpha = alpha * 0.15;
        ctx.fillStyle = '#ffffff';
        ctx.beginPath();
        ctx.arc(n.x - r * 0.15, n.y - r * 0.15, r * 0.7, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = alpha;

        // Border ring
        if (highlight) {
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 2.5;
            ctx.beginPath();
            ctx.arc(n.x, n.y, r + 1, 0, Math.PI * 2);
            ctx.stroke();
        } else {
            ctx.strokeStyle = color + '66';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.arc(n.x, n.y, r, 0, Math.PI * 2);
            ctx.stroke();
        }

        // Character initial inside the node
        ctx.font = `700 ${Math.max(10, r * 0.65)}px 'Noto Sans SC', sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = 'rgba(15,17,23,0.7)';
        ctx.fillText(n.name.charAt(n.name.length - 1), n.x, n.y + 1);

        // Label below node
        const fontSize = n.radius >= 22 ? 13 : (n.radius >= 18 ? 12 : 11);
        ctx.font = `500 ${fontSize}px 'Noto Sans SC', sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'top';
        ctx.fillStyle = '#e8e8f0';
        ctx.globalAlpha = alpha * 0.92;

        // Text shadow for readability
        ctx.shadowColor = 'rgba(0,0,0,0.8)';
        ctx.shadowBlur = 4;
        ctx.fillText(n.name, n.x, n.y + r + 6);
        ctx.shadowColor = 'transparent';
        ctx.shadowBlur = 0;

        ctx.restore();
    }

    // ========== MAIN DRAW LOOP ==========
    function draw() {
        animTime++;
        ctx.clearRect(0, 0, canvasW, canvasH);

        // Background particles
        updateAndDrawParticles();

        const nm = getNodeMap();

        // Draw edges
        edges.forEach((e, idx) => {
            if (!isEdgeVisible(e)) return;
            let alpha = 0.6;
            if (focusedNode) {
                alpha = isConnected(focusedNode, e) ? 0.95 : 0.04;
            }
            drawEdge(idx, nm, alpha);
        });

        // Edge labels when focused
        if (focusedNode) {
            edges.forEach((e, idx) => {
                if (!isEdgeVisible(e)) return;
                if (!isConnected(focusedNode, e)) return;
                drawEdgeLabel(idx, nm);
            });
        }

        // Draw nodes (dim last, bright on top)
        const sortedNodes = [...nodes].sort((a, b) => {
            if (!isNodeVisible(a)) return -1;
            if (!isNodeVisible(b)) return 1;
            if (focusedNode) {
                const aConn = a.id === focusedNode || edges.some(e => isEdgeVisible(e) && isConnected(focusedNode, e) && (e.from === a.id || e.to === a.id));
                const bConn = b.id === focusedNode || edges.some(e => isEdgeVisible(e) && isConnected(focusedNode, e) && (e.from === b.id || e.to === b.id));
                if (aConn && !bConn) return 1;
                if (!aConn && bConn) return -1;
            }
            return 0;
        });

        sortedNodes.forEach(n => {
            if (!isNodeVisible(n)) return;
            let alpha = 1;
            let highlight = false;
            if (focusedNode) {
                if (n.id === focusedNode) {
                    highlight = true;
                } else {
                    const connected = edges.some(e =>
                        isEdgeVisible(e) && isConnected(focusedNode, e) && (e.from === n.id || e.to === n.id)
                    );
                    if (!connected) alpha = 0.08;
                    else highlight = true;
                }
            }
            if (hoveredNode === n.id && !focusedNode) {
                highlight = true;
            }
            drawNode(n, alpha, highlight);
        });

        requestAnimationFrame(draw);
    }

    // ========== HIT TEST ==========
    function hitTest(mx, my) {
        // Check in reverse so topmost nodes are hit first
        for (let i = nodes.length - 1; i >= 0; i--) {
            const n = nodes[i];
            if (!isNodeVisible(n)) continue;
            const dx = mx - n.x, dy = my - n.y;
            const hitR = n.radius + 5;
            if (dx * dx + dy * dy < hitR * hitR) {
                return n;
            }
        }
        return null;
    }

    function getCanvasPos(e) {
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return {
            x: clientX - rect.left,
            y: clientY - rect.top,
        };
    }

    // ========== TOOLTIP ==========
    function showTooltip(node, clientX, clientY) {
        const color = groupConfig[node.group].color;
        tooltip.querySelector('.tt-name').textContent = node.name;
        tooltip.querySelector('.tt-en').textContent = node.en;
        const groupEl = tooltip.querySelector('.tt-group');
        groupEl.textContent = groupConfig[node.group].label;
        groupEl.style.background = color + '22';
        groupEl.style.color = color;
        tooltip.querySelector('.tt-desc').textContent = node.desc;
        tooltip.style.display = 'block';

        const tw = tooltip.offsetWidth;
        const th = tooltip.offsetHeight;
        let tx = clientX + 16;
        let ty = clientY + 16;
        if (tx + tw > window.innerWidth - 12) tx = clientX - tw - 12;
        if (ty + th > window.innerHeight - 12) ty = clientY - th - 12;
        tooltip.style.left = tx + 'px';
        tooltip.style.top = ty + 'px';
    }

    function hideTooltip() {
        tooltip.style.display = 'none';
    }

    // ========== DETAIL PANEL ==========
    function showDetail(node) {
        const color = groupConfig[node.group].color;
        const avatar = document.getElementById('detailAvatar');
        avatar.style.background = color + '22';
        avatar.style.color = color;
        avatar.style.borderColor = color;
        avatar.textContent = node.name.charAt(0);

        document.getElementById('detailName').textContent = node.name;
        document.getElementById('detailEn').textContent = node.en;

        const tag = document.getElementById('detailGroup');
        tag.textContent = groupConfig[node.group].label;
        tag.style.background = color + '22';
        tag.style.color = color;

        document.getElementById('detailDesc').textContent = node.desc;

        // Build connections list
        const connDiv = document.getElementById('detailConnections');
        connDiv.innerHTML = '';
        const nm = getNodeMap();

        edges.forEach(e => {
            if (e.from !== node.id && e.to !== node.id) return;
            if (e.type === 'secret-alliance' && !showSecretAlliance) return;
            const otherId = e.from === node.id ? e.to : e.from;
            const other = nm[otherId];
            if (!other) return;

            const item = document.createElement('div');
            item.className = 'detail-conn-item';

            // Color dot
            const dot = document.createElement('span');
            dot.className = 'detail-conn-dot';
            dot.style.background = groupConfig[other.group].color;

            // Type indicator line
            const typeLine = document.createElement('span');
            typeLine.className = 'detail-conn-type-line';
            const cfg = edgeTypeConfig[e.type];
            typeLine.style.background = cfg.color;

            // Name
            const nameSpan = document.createElement('span');
            nameSpan.className = 'detail-conn-name';
            nameSpan.textContent = other.name;

            // Relationship label
            const relSpan = document.createElement('span');
            relSpan.className = 'detail-conn-rel';
            relSpan.textContent = e.label;

            item.appendChild(dot);
            item.appendChild(typeLine);
            item.appendChild(nameSpan);
            item.appendChild(relSpan);
            connDiv.appendChild(item);
        });

        detailPanel.classList.add('open');
    }

    function hideDetail() {
        detailPanel.classList.remove('open');
    }

    // ========== MOUSE EVENTS ==========
    canvas.addEventListener('mousedown', function(e) {
        const pos = getCanvasPos(e);
        const node = hitTest(pos.x, pos.y);
        if (node) {
            dragging = node;
            hasDragged = false;
            dragOffX = pos.x - node.x;
            dragOffY = pos.y - node.y;
            canvas.classList.add('dragging');
        }
    });

    canvas.addEventListener('mousemove', function(e) {
        const pos = getCanvasPos(e);
        if (dragging) {
            hasDragged = true;
            dragging.x = pos.x - dragOffX;
            dragging.y = pos.y - dragOffY;
            // Keep in bounds
            dragging.x = Math.max(dragging.radius, Math.min(canvasW - dragging.radius, dragging.x));
            dragging.y = Math.max(dragging.radius, Math.min(canvasH - dragging.radius, dragging.y));
            return;
        }
        const node = hitTest(pos.x, pos.y);
        if (node) {
            hoveredNode = node.id;
            canvas.style.cursor = 'pointer';
            showTooltip(node, e.clientX, e.clientY);
        } else {
            hoveredNode = null;
            canvas.style.cursor = 'grab';
            hideTooltip();
        }
    });

    canvas.addEventListener('mouseup', function() {
        if (dragging) {
            canvas.classList.remove('dragging');
            if (!hasDragged) {
                // This was a click, not a drag
                focusedNode = dragging.id;
                showDetail(dragging);
            }
            dragging = null;
            return;
        }
    });

    canvas.addEventListener('click', function(e) {
        if (hasDragged) { hasDragged = false; return; }
        const pos = getCanvasPos(e);
        const node = hitTest(pos.x, pos.y);
        if (node) {
            focusedNode = node.id;
            showDetail(node);
        } else {
            focusedNode = null;
            hideDetail();
        }
    });

    canvas.addEventListener('mouseleave', function() {
        hoveredNode = null;
        hideTooltip();
    });

    // ========== TOUCH EVENTS ==========
    let touchMoved = false;

    canvas.addEventListener('touchstart', function(e) {
        e.preventDefault();
        touchMoved = false;
        const touch = e.touches[0];
        const rect = canvas.getBoundingClientRect();
        const pos = { x: touch.clientX - rect.left, y: touch.clientY - rect.top };
        const node = hitTest(pos.x, pos.y);
        if (node) {
            dragging = node;
            dragOffX = pos.x - node.x;
            dragOffY = pos.y - node.y;
        }
    }, { passive: false });

    canvas.addEventListener('touchmove', function(e) {
        e.preventDefault();
        touchMoved = true;
        if (!dragging) return;
        const touch = e.touches[0];
        const rect = canvas.getBoundingClientRect();
        dragging.x = touch.clientX - rect.left - dragOffX;
        dragging.y = touch.clientY - rect.top - dragOffY;
        // Keep in bounds
        dragging.x = Math.max(dragging.radius, Math.min(canvasW - dragging.radius, dragging.x));
        dragging.y = Math.max(dragging.radius, Math.min(canvasH - dragging.radius, dragging.y));
    }, { passive: false });

    canvas.addEventListener('touchend', function(e) {
        e.preventDefault();
        if (!touchMoved && dragging) {
            focusedNode = dragging.id;
            showDetail(dragging);
        } else if (!touchMoved && !dragging) {
            focusedNode = null;
            hideDetail();
        }
        dragging = null;
    }, { passive: false });

    // ========== KEYBOARD ==========
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
            focusedNode = null;
            hideDetail();
        }
        if (e.key === 'r' || e.key === 'R') {
            if (document.activeElement && document.activeElement.tagName === 'INPUT') return;
            showSecretAlliance = !showSecretAlliance;
            const btn = document.getElementById('revealBtn');
            btn.classList.toggle('active', showSecretAlliance);
            btn.textContent = showSecretAlliance ? '隐藏秘密关联' : '揭示隐藏关联';
        }
    });

    // ========== CONTROLS ==========
    document.querySelectorAll('.group-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            const g = this.dataset.group;
            if (this.classList.contains('active')) {
                this.classList.remove('active');
                activeGroups.delete(g);
            } else {
                this.classList.add('active');
                activeGroups.add(g);
            }
            // Clear focus if focused node is now hidden
            if (focusedNode) {
                const fn = nodes.find(n => n.id === focusedNode);
                if (fn && !activeGroups.has(fn.group)) {
                    focusedNode = null;
                    hideDetail();
                }
            }
            updateStats();
        });
    });

    document.querySelectorAll('.rel-checkbox input').forEach(cb => {
        cb.addEventListener('change', function() {
            const rel = this.dataset.rel;
            if (this.checked) activeRelTypes.add(rel);
            else activeRelTypes.delete(rel);
        });
    });

    document.getElementById('revealBtn').addEventListener('click', function() {
        showSecretAlliance = !showSecretAlliance;
        this.classList.toggle('active', showSecretAlliance);
        this.textContent = showSecretAlliance ? '隐藏秘密关联' : '揭示隐藏关联';
    });

    document.getElementById('detailClose').addEventListener('click', function() {
        focusedNode = null;
        hideDetail();
    });

    // ========== INIT ==========
    function init() {
        resizeCanvas();
        initNodes();
        initParticles();
        runForceSimulation(200);
        updateStats();
        draw();
    }

    // Wait for fonts before first canvas draw
    if (document.fonts && document.fonts.ready) {
        document.fonts.ready.then(init);
    } else {
        window.addEventListener('load', init);
    }

    // Resize handler with debounce
    let resizeTimer;
    window.addEventListener('resize', function() {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(function() {
            resizeCanvas();
        }, 150);
    });

})();
</script>

</body>
</html>
