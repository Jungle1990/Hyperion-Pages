<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
    --bg: #0f1117; --card: #1a1d27; --card-hover: #222636;
    --accent: #6c63ff; --accent2: #ff6b6b; --accent3: #4ecdc4; --accent4: #ffe66d;
    --text: #e8e8f0; --text-dim: #8888a0; --border: #2a2d3a; --glow: rgba(108,99,255,0.15);
}

html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'Noto Sans SC', sans-serif; }
.app { display: flex; flex-direction: column; height: 100vh; width: 100vw; }

/* ── Hero ── */
.hero {
    height: 18vh; min-height: 130px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
    background: linear-gradient(180deg, #13151f 0%, var(--bg) 100%);
}
.hero canvas { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }
.hero-content { position: relative; z-index: 1; text-align: center; }
.hero h1 {
    font-size: clamp(1.4rem, 3vw, 2.2rem); font-weight: 700;
    background: linear-gradient(135deg, var(--accent3) 0%, var(--accent4) 50%, var(--accent3) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.hero .subtitle { margin-top: 6px; font-size: clamp(0.8rem, 1.4vw, 1rem); color: var(--text-dim); font-weight: 300; }
.back-link { position: absolute; top: 16px; left: 20px; color: var(--text-dim); text-decoration: none; font-size: 0.85rem; z-index: 2; transition: color 0.2s; }
.back-link:hover { color: var(--accent3); }

/* ── Controls ── */
.controls {
    position: sticky; top: 0; z-index: 20;
    display: flex; align-items: center; gap: 14px; padding: 8px 20px;
    background: rgba(15,17,23,0.92); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border); flex-wrap: wrap;
}
.controls-group { display: flex; align-items: center; gap: 6px; }
.controls-label { font-size: 0.75rem; color: var(--text-dim); font-family: 'JetBrains Mono', monospace; white-space: nowrap; margin-right: 4px; }
.char-filter-btn {
    padding: 3px 8px; border-radius: 10px; border: 1.5px solid var(--border);
    background: transparent; color: var(--text-dim); font-family: 'Noto Sans SC', sans-serif;
    font-size: 0.72rem; cursor: pointer; transition: all 0.2s;
}
.char-filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.range-label { font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; color: var(--text-dim); min-width: 50px; }

/* ── Map area ── */
.map-area { flex: 1; position: relative; overflow: hidden; }
.map-area canvas { position: absolute; top: 0; left: 0; }

/* ── Tooltip ── */
.tooltip {
    position: fixed; z-index: 30; background: var(--card); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 14px; max-width: 280px; pointer-events: none;
    opacity: 0; transition: opacity 0.15s; box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}
.tooltip.visible { opacity: 1; }
.tooltip-name { font-size: 0.85rem; font-weight: 700; margin-bottom: 2px; }
.tooltip-name-en { font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; color: var(--text-dim); margin-bottom: 6px; }
.tooltip-events { font-size: 0.78rem; color: var(--text-dim); line-height: 1.5; }

/* ── Detail panel ── */
.detail-overlay { position: fixed; inset: 0; z-index: 50; background: rgba(0,0,0,0.55); display: none; align-items: flex-end; justify-content: center; }
.detail-overlay.visible { display: flex; }
.detail-panel {
    width: 100%; max-width: 640px; max-height: 55vh;
    background: var(--card); border-top: 2px solid var(--accent3);
    border-radius: 16px 16px 0 0; padding: 24px 28px 32px; overflow-y: auto;
    animation: slideUp 0.3s ease-out;
}
@keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.detail-close { position: absolute; top: 12px; right: 16px; background: none; border: none; color: var(--text-dim); font-size: 1.4rem; cursor: pointer; }
.detail-close:hover { color: var(--accent2); }
.detail-loc-name { font-size: 1.2rem; font-weight: 700; margin-bottom: 4px; }
.detail-loc-en { font-size: 0.82rem; color: var(--text-dim); margin-bottom: 14px; }
.detail-event-list { display: flex; flex-direction: column; gap: 8px; }
.detail-event { display: flex; gap: 10px; padding: 8px; border-radius: 8px; background: rgba(255,255,255,0.03); }
.detail-event-ch { font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; color: var(--accent); min-width: 36px; padding-top: 2px; }
.detail-event-desc { font-size: 0.82rem; color: var(--text); line-height: 1.5; }

/* ── Legend ── */
.legend-bar {
    position: absolute; bottom: 16px; left: 16px; z-index: 10;
    display: flex; flex-direction: column; gap: 4px; padding: 10px 14px;
    background: rgba(26,29,39,0.9); border: 1px solid var(--border); border-radius: 8px;
    font-size: 0.7rem; color: var(--text-dim); font-family: 'JetBrains Mono', monospace;
}
.legend-row { display: flex; align-items: center; gap: 6px; }
.legend-circle { width: 10px; height: 10px; border-radius: 50%; }
.legend-line { width: 20px; height: 0; border-top: 2px dashed; }

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>

    "radius": 15

const groupConfig = {
  "core": {
    "color": "#ffe66d",
    "label": "核心"
  },
  "investigator": {
    "color": "#6c63ff",
    "label": "调查者"
  },
  "family": {
    "color": "#4ecdc4",
    "label": "亲属"
  },
  "accomplice": {
    "color": "#ff8fab",
    "label": "共犯"
  },
  "victim": {
    "color": "#ff6b6b",
    "label": "受害者"
  },
  "other": {
    "color": "#8888a0",
    "label": "其他"
  }
};


// ══════════════════════════════════════════════════
// CONFIG
// ══════════════════════════════════════════════════
const locations = spatial.locations;
const movements = spatial.movements || [];
const charMap = {};
if (typeof characters !== 'undefined') characters.forEach(c => { charMap[c.id] = c; });
const gConfig = (typeof groupConfig !== 'undefined') ? groupConfig : {};

let state = {
    selectedLocation: null,
    hoveredLocation: null,
    charFilter: null, // null = show all
    maxChapter: parseInt(document.getElementById('chapterRange').max) || 120,
    chapterCutoff: parseInt(document.getElementById('chapterRange').max) || 120,
    animFrame: null,
    movementProgress: 0,
};

// ══════════════════════════════════════════════════
// DOM REFS
// ══════════════════════════════════════════════════
const $hero = document.getElementById('heroCanvas');
const $map = document.getElementById('mapCanvas');
const $mapArea = document.getElementById('mapArea');
const $tooltip = document.getElementById('tooltip');
const $ttName = document.getElementById('ttName');
const $ttNameEn = document.getElementById('ttNameEn');
const $ttEvents = document.getElementById('ttEvents');
const $detailOverlay = document.getElementById('detailOverlay');
const $detailName = document.getElementById('detailName');
const $detailNameEn = document.getElementById('detailNameEn');
const $detailEvents = document.getElementById('detailEvents');
const $chapterRange = document.getElementById('chapterRange');
const $chapterLabel = document.getElementById('chapterLabel');

// ══════════════════════════════════════════════════
// UTILITY
// ══════════════════════════════════════════════════
function dpr() { return window.devicePixelRatio || 1; }
function sizeCanvas(canvas, w, h) {
    const r = dpr(); canvas.width = w * r; canvas.height = h * r;
    canvas.style.width = w + 'px'; canvas.style.height = h + 'px';
    const ctx = canvas.getContext('2d');
    ctx.setTransform(r, 0, 0, r, 0, 0); return ctx;
}
function hexToRGBA(hex, alpha) {
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return 'rgba(' + r + ',' + g + ',' + b + ',' + alpha + ')';
}

// Set chapter range max from data
const maxCh = Math.max(...movements.map(m => m.chapter || 1), ...locations.flatMap(l => (l.events || []).map(e => e.chapter || 1)), 1);
$chapterRange.max = maxCh;
$chapterRange.value = maxCh;
state.maxChapter = maxCh;
state.chapterCutoff = maxCh;
$chapterLabel.textContent = '1–' + maxCh;

// ══════════════════════════════════════════════════
// BUILD CONTROLS
// ══════════════════════════════════════════════════
function buildCharFilters() {
    const wrap = document.getElementById('charFilters');
    wrap.style.display = 'flex'; wrap.style.gap = '4px'; wrap.style.flexWrap = 'wrap';

    // "All" button
    const allBtn = document.createElement('button');
    allBtn.className = 'char-filter-btn active'; allBtn.textContent = '全部';
    allBtn.addEventListener('click', () => {
        state.charFilter = null;
        document.querySelectorAll('.char-filter-btn').forEach(b => b.classList.remove('active'));
        allBtn.classList.add('active');
        render();
    });
    wrap.appendChild(allBtn);

    // Key characters from movements
    const charIds = [...new Set(movements.map(m => m.character))];
    charIds.slice(0, 8).forEach(id => {
        const c = charMap[id];
        if (!c) return;
        const btn = document.createElement('button');
        btn.className = 'char-filter-btn';
        btn.textContent = c.name;
        const groupColor = (gConfig[c.group] || {}).color || '#8888a0';
        btn.style.borderColor = groupColor;
        btn.addEventListener('click', () => {
            state.charFilter = id;
            document.querySelectorAll('.char-filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            render();
        });
        wrap.appendChild(btn);
    });
}

$chapterRange.addEventListener('input', () => {
    state.chapterCutoff = parseInt($chapterRange.value);
    $chapterLabel.textContent = '1–' + state.chapterCutoff;
    render();
});

// ══════════════════════════════════════════════════
// HERO PARTICLES
// ══════════════════════════════════════════════════
function initHero() {
    const heroSection = document.querySelector('.hero');
    const w = heroSection.clientWidth; const h = heroSection.clientHeight;
    const ctx = sizeCanvas($hero, w, h);
    const particles = [];
    for (let i = 0; i < 40; i++) {
        particles.push({
            x: Math.random() * w, y: Math.random() * h,
            r: Math.random() * 1.5 + 0.5, vx: (Math.random() - 0.5) * 0.2, vy: (Math.random() - 0.5) * 0.15,
            alpha: Math.random() * 0.3 + 0.1,
            color: ['#4ecdc4','#ffe66d','#6c63ff','#ff6b6b'][Math.floor(Math.random() * 4)],
        });
    }
    function draw() {
        ctx.clearRect(0, 0, w, h);
        particles.forEach(p => {
            p.x += p.vx; p.y += p.vy;
            if (p.x < 0) p.x = w; if (p.x > w) p.x = 0;
            if (p.y < 0) p.y = h; if (p.y > h) p.y = 0;
            ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
            ctx.fillStyle = p.color; ctx.globalAlpha = p.alpha; ctx.fill();
        });
        ctx.globalAlpha = 1;
        requestAnimationFrame(draw);
    }
    draw();
}

// ══════════════════════════════════════════════════
// MAP DRAWING
// ══════════════════════════════════════════════════
function drawMap() {
    const w = $mapArea.clientWidth; const h = $mapArea.clientHeight;
    const ctx = sizeCanvas($map, w, h);
    ctx.clearRect(0, 0, w, h);

    // Filter movements by chapter cutoff and character
    const filteredMovements = movements.filter(m => {
        if (m.chapter > state.chapterCutoff) return false;
        if (state.charFilter && m.character !== state.charFilter) return false;
        return true;
    });

    // Count events per location for sizing
    const locEventCount = {};
    locations.forEach(loc => {
        const events = (loc.events || []).filter(e => (e.chapter || 0) <= state.chapterCutoff);
        locEventCount[loc.id] = events.length;
    });

    // Build location lookup
    const locMap = {};
    locations.forEach(loc => { locMap[loc.id] = loc; });

    // ── Draw movement paths ──
    filteredMovements.forEach(m => {
        const fromLoc = locMap[m.from];
        const toLoc = locMap[m.to];
        if (!fromLoc || !toLoc) return;
        const fx = fromLoc.x * w; const fy = fromLoc.y * h;
        const tx = toLoc.x * w; const ty = toLoc.y * h;
        const c = charMap[m.character];
        const groupColor = c ? (gConfig[c.group] || {}).color || '#8888a0' : '#8888a0';

        ctx.beginPath();
        const midX = (fx + tx) / 2 + (Math.random() - 0.5) * 30;
        const midY = (fy + ty) / 2 - 20;
        ctx.moveTo(fx, fy);
        ctx.quadraticCurveTo(midX, midY, tx, ty);
        ctx.strokeStyle = groupColor;
        ctx.globalAlpha = 0.15;
        ctx.lineWidth = 1.5;
        ctx.setLineDash([4, 4]);
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.globalAlpha = 1;

        // Arrow head
        const angle = Math.atan2(ty - midY, tx - midX);
        ctx.beginPath();
        ctx.moveTo(tx, ty);
        ctx.lineTo(tx - 8 * Math.cos(angle - 0.3), ty - 8 * Math.sin(angle - 0.3));
        ctx.lineTo(tx - 8 * Math.cos(angle + 0.3), ty - 8 * Math.sin(angle + 0.3));
        ctx.closePath();
        ctx.fillStyle = groupColor;
        ctx.globalAlpha = 0.25;
        ctx.fill();
        ctx.globalAlpha = 1;
    });

    // ── Draw locations ──
    locations.forEach(loc => {
        const x = loc.x * w;
        const y = loc.y * h;
        const evCount = locEventCount[loc.id] || 0;
        const baseR = loc.radius || 30;
        const r = baseR + evCount * 2;
        const color = loc.color || '#4ecdc4';
        const isHovered = state.hoveredLocation === loc.id;
        const isSelected = state.selectedLocation === loc.id;

        // Glow
        const grd = ctx.createRadialGradient(x, y, 0, x, y, r * 2);
        grd.addColorStop(0, hexToRGBA(color, isHovered || isSelected ? 0.2 : 0.08));
        grd.addColorStop(1, hexToRGBA(color, 0));
        ctx.beginPath(); ctx.arc(x, y, r * 2, 0, Math.PI * 2);
        ctx.fillStyle = grd; ctx.fill();

        // Circle
        ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fillStyle = hexToRGBA(color, isHovered || isSelected ? 0.3 : 0.12);
        ctx.fill();
        ctx.strokeStyle = hexToRGBA(color, isHovered || isSelected ? 0.8 : 0.4);
        ctx.lineWidth = isHovered || isSelected ? 2 : 1;
        ctx.stroke();

        // Label
        ctx.font = (isHovered || isSelected ? '700' : '500') + ' 13px "Noto Sans SC", sans-serif';
        ctx.fillStyle = isHovered || isSelected ? '#fff' : 'rgba(232,232,240,0.8)';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(loc.name, x, y - r - 12);

        // Event count badge
        if (evCount > 0) {
            ctx.font = '9px "JetBrains Mono", monospace';
            ctx.fillStyle = 'rgba(136,136,160,0.5)';
            ctx.fillText(evCount + ' events', x, y + r + 14);
        }

        // Sub-locations
        if (loc.subLocations) {
            loc.subLocations.forEach(sub => {
                const sx = sub.x * w; const sy = sub.y * h;
                ctx.beginPath(); ctx.arc(sx, sy, 6, 0, Math.PI * 2);
                ctx.fillStyle = hexToRGBA(color, 0.25); ctx.fill();
                ctx.font = '10px "Noto Sans SC", sans-serif';
                ctx.fillStyle = 'rgba(232,232,240,0.5)';
                ctx.textAlign = 'center'; ctx.textBaseline = 'top';
                ctx.fillText(sub.name, sx, sy + 10);
            });
        }

        // Store hit data
        loc._x = x; loc._y = y; loc._r = r;
    });
}

// ══════════════════════════════════════════════════
// HIT TEST
// ══════════════════════════════════════════════════
function hitTestLoc(mx, my) {
    for (const loc of locations) {
        if (loc._x === undefined) continue;
        const dx = mx - loc._x; const dy = my - loc._y;
        if (Math.sqrt(dx * dx + dy * dy) < loc._r + 10) return loc;
    }
    return null;
}

// ══════════════════════════════════════════════════
// INTERACTIONS
// ══════════════════════════════════════════════════
$mapArea.addEventListener('mousemove', (e) => {
    const rect = $mapArea.getBoundingClientRect();
    const mx = e.clientX - rect.left; const my = e.clientY - rect.top;
    const hit = hitTestLoc(mx, my);
    const newHovered = hit ? hit.id : null;
    if (newHovered !== state.hoveredLocation) {
        state.hoveredLocation = newHovered;
        render();
    }
    if (hit) {
        $ttName.textContent = hit.name;
        $ttNameEn.textContent = hit.nameEn || '';
        const evCount = (hit.events || []).filter(ev => (ev.chapter || 0) <= state.chapterCutoff).length;
        $ttEvents.textContent = evCount + ' 个事件发生于此';
        $tooltip.classList.add('visible');
        $tooltip.style.left = (e.clientX + 16) + 'px'; $tooltip.style.top = (e.clientY - 10) + 'px';
        $mapArea.style.cursor = 'pointer';
    } else {
        $tooltip.classList.remove('visible');
        $mapArea.style.cursor = 'default';
    }
});

$mapArea.addEventListener('mouseleave', () => {
    state.hoveredLocation = null; $tooltip.classList.remove('visible'); render();
});

$mapArea.addEventListener('click', (e) => {
    const rect = $mapArea.getBoundingClientRect();
    const hit = hitTestLoc(e.clientX - rect.left, e.clientY - rect.top);
    if (hit) showDetail(hit);
});

function showDetail(loc) {
    state.selectedLocation = loc.id;
    $detailName.textContent = loc.name;
    $detailNameEn.textContent = loc.nameEn || '';
    $detailEvents.innerHTML = '';
    const events = (loc.events || []).filter(ev => (ev.chapter || 0) <= state.chapterCutoff);
    events.sort((a, b) => (a.chapter || 0) - (b.chapter || 0));
    events.forEach(ev => {
        const row = document.createElement('div');
        row.className = 'detail-event';
        row.innerHTML = '<div class="detail-event-ch">Ch.' + (ev.chapter || '?') + '</div><div class="detail-event-desc">' + (ev.desc || '') + '</div>';
        $detailEvents.appendChild(row);
    });
    $detailOverlay.classList.add('visible');
    render();
}

function closeDetail() { $detailOverlay.classList.remove('visible'); state.selectedLocation = null; render(); }
$detailOverlay.addEventListener('click', (e) => { if (e.target === $detailOverlay) closeDetail(); });
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeDetail(); });

// ══════════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════════
function render() { drawMap(); }

let resizeTimer;
window.addEventListener('resize', () => { clearTimeout(resizeTimer); resizeTimer = setTimeout(() => { initHero(); render(); }, 100); });

document.fonts.ready.then(() => {
    buildCharFilters();
    initHero();
    render();
});
</script>
