*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body { font-family: var(--font-sans); background: var(--bg); color: var(--text); line-height: 1.8; overflow-x: hidden; }
::selection { background: var(--accent); color: #fff; }

/* ── Hero ── */
.hero { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 2rem; position: relative; overflow: hidden; }
.hero::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at 30% 20%, rgba(var(--accent-rgb),0.08) 0%, transparent 50%), radial-gradient(ellipse at 70% 80%, rgba(var(--accent2-rgb),0.06) 0%, transparent 50%); pointer-events: none; }
.hero-icon { font-size: 6rem; margin-bottom: 1.5rem; animation: float 4s ease-in-out infinite; filter: drop-shadow(0 0 30px rgba(var(--accent-rgb),0.3)); }
@keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
.hero h1 { font-size: clamp(3rem, 8vw, 5rem); font-weight: 900; letter-spacing: 0.1em; background: linear-gradient(135deg, #fff 0%, var(--accent) 50%, var(--accent3) 100%); background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: shimmer 4s ease-in-out infinite; margin-bottom: 0.3rem; }
@keyframes shimmer { 0%, 100% { background-position: 0% center; } 50% { background-position: 200% center; } }
.hero-en { font-size: 1.3rem; color: var(--text-dim); font-weight: 300; margin-bottom: 0.5rem; }
.hero-author { font-size: 1rem; color: var(--accent3); font-weight: 400; }
.hero-method { display: inline-block; margin-top: 1.5rem; padding: 0.5rem 1.5rem; border: 1px solid var(--accent); border-radius: 2rem; font-family: var(--font-mono); font-size: 0.85rem; color: var(--accent); letter-spacing: 2px; }

/* Stats */
.stats { display: flex; justify-content: center; gap: 3rem; margin-top: 2rem; }
.stat { text-align: center; }
.stat-num { font-size: 2.5rem; font-weight: 900; color: var(--accent4); font-family: var(--font-mono); }
.stat-label { font-size: 0.8rem; color: var(--text-dim); letter-spacing: 1px; }

.scroll-hint { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); animation: bounce 2s infinite; }
@keyframes bounce { 0%, 100% { transform: translateX(-50%) translateY(0); } 50% { transform: translateX(-50%) translateY(10px); } }
.scroll-hint span { display: block; width: 2px; height: 40px; background: linear-gradient(to bottom, var(--accent), transparent); margin: 0 auto 8px; }
.scroll-hint small { font-size: 0.75rem; color: var(--text-dim); letter-spacing: 2px; }

/* ── Container ── */
.container { max-width: 900px; margin: 0 auto; padding: 0 24px; }

/* ── Part Header ── */
.part-header { margin: 4rem 0 2rem; }
.part-badge { display: inline-block; font-family: var(--font-mono); font-size: 0.75rem; color: var(--accent); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 8px; }
.part-title { font-size: 1.5rem; font-weight: 700; }

/* ── Chapter Cards ── */
.chapter-grid { display: grid; gap: 16px; margin-bottom: 2rem; }
.chapter-card { display: flex; align-items: center; gap: 20px; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px 24px; text-decoration: none; color: var(--text); transition: all 0.3s; }
.chapter-card:hover { border-color: var(--accent); transform: translateY(-3px); box-shadow: 0 8px 30px var(--glow); }
.ch-icon { font-size: 2rem; flex-shrink: 0; }
.ch-num { font-family: var(--font-mono); font-size: 0.8rem; color: var(--accent); letter-spacing: 2px; margin-bottom: 2px; }
.ch-title { font-weight: 600; font-size: 1.05rem; margin-bottom: 2px; }
.ch-title-en { font-size: 0.8rem; color: var(--text-dim); }
.ch-arrow { margin-left: auto; color: var(--accent); font-size: 1.2rem; opacity: 0; transition: opacity 0.3s; }
.chapter-card:hover .ch-arrow { opacity: 1; }

/* ── Footer ── */
.footer { text-align: center; padding: 4rem 0; color: var(--text-dim); font-size: 0.8rem; border-top: 1px solid var(--border); margin-top: 4rem; }

/* ── Tool Links ── */
.tool-links { display: flex; justify-content: center; gap: 12px; margin-top: 2rem; flex-wrap: wrap; }
.tool-link { display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px; border: 1px solid var(--border); border-radius: 2rem; text-decoration: none; color: var(--text-dim); font-size: 0.85rem; transition: all 0.3s; }
.tool-link:hover { border-color: var(--accent); color: var(--text); transform: translateY(-2px); }
.tool-link-icon { font-size: 1.1rem; }

/* ── Fade-in ── */
.fade-in { opacity: 0; transform: translateY(30px); transition: opacity 0.7s ease, transform 0.7s ease; }
.fade-in.visible { opacity: 1; transform: translateY(0); }

@media (max-width: 768px) {

<script>
(function() {
  var KEY = 'hyperion-theme';
  var toggle = document.getElementById('themeToggle');
  var icon = document.getElementById('themeIcon');

  function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    icon.textContent = theme === 'light' ? '\u{1F319}' : '\u{2600}\u{FE0F}';
    localStorage.setItem(KEY, theme);
    window.dispatchEvent(new CustomEvent('themechange', { detail: { theme: theme } }));
  }

  var saved = localStorage.getItem(KEY);
  if (saved) {
    applyTheme(saved);
  } else {
    icon.textContent = '\u{2600}\u{FE0F}';
  }

  toggle.addEventListener('click', function() {
    var current = document.documentElement.getAttribute('data-theme');
    applyTheme(current === 'light' ? 'dark' : 'light');
  });

  // Utility for canvas code: read theme-aware CSS var values
  window.getThemeRGB = function(varName) {
    return getComputedStyle(document.documentElement).getPropertyValue(varName).trim();
  };
})();
