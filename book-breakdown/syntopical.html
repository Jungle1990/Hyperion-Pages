<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Syntopical Reading · 主题阅读 | Book Breakdown</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap');

:root {
    --bg: #0f1117;
    --card: #1a1d27;
    --card-hover: #222636;
    --accent: #6c63ff;
    --accent2: #ff6b6b;
    --accent3: #4ecdc4;
    --accent4: #ffe66d;
    --text: #e8e8f0;
    --text-dim: #8888a0;
    --border: #2a2d3a;
    --glow: rgba(108, 99, 255, 0.15);
    --radius: 14px;
    --font-sans: 'Noto Sans SC', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body { font-family: var(--font-sans); background: var(--bg); color: var(--text); line-height: 1.8; overflow-x: hidden; }
::selection { background: var(--accent); color: #fff; }

/* ── Hero ── */
.hero { min-height: 60vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 3rem 2rem; position: relative; overflow: hidden; }
.hero::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at 30% 20%, rgba(108,99,255,0.08) 0%, transparent 50%), radial-gradient(ellipse at 70% 80%, rgba(78,205,196,0.06) 0%, transparent 50%); pointer-events: none; }
.hero-icon { font-size: 5rem; margin-bottom: 1.5rem; animation: float 4s ease-in-out infinite; filter: drop-shadow(0 0 30px rgba(108,99,255,0.3)); }
@keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
.hero h1 { font-size: clamp(2rem, 6vw, 3.5rem); font-weight: 900; letter-spacing: 0.05em; background: linear-gradient(135deg, #fff 0%, var(--accent3) 50%, var(--accent) 100%); background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: shimmer 4s ease-in-out infinite; margin-bottom: 0.3rem; }
@keyframes shimmer { 0%, 100% { background-position: 0% center; } 50% { background-position: 200% center; } }
.hero-sub { font-size: 1.1rem; color: var(--text-dim); font-weight: 300; max-width: 600px; }
.hero-badge { display: inline-block; margin-top: 1.5rem; padding: 0.5rem 1.5rem; border: 1px solid var(--accent3); border-radius: 2rem; font-family: var(--font-mono); font-size: 0.85rem; color: var(--accent3); letter-spacing: 2px; }

/* ── Container ── */
.container { max-width: 1000px; margin: 0 auto; padding: 0 24px; }

/* ── Section Header ── */
.section-header { margin: 3rem 0 1.5rem; }
.section-badge { display: inline-block; font-family: var(--font-mono); font-size: 0.75rem; color: var(--accent); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 8px; }
.section-title { font-size: 1.4rem; font-weight: 700; }

/* ── Book Cards Row ── */
.books-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 16px; margin-bottom: 2rem; }
.book-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; text-align: center; transition: all 0.3s; text-decoration: none; color: var(--text); }
.book-card:hover { border-color: var(--accent); transform: translateY(-3px); box-shadow: 0 8px 30px var(--glow); }
.book-icon { font-size: 2.5rem; margin-bottom: 12px; }
.book-title { font-weight: 700; font-size: 1.1rem; margin-bottom: 4px; }
.book-title-en { font-size: 0.8rem; color: var(--text-dim); margin-bottom: 8px; }
.book-author { font-size: 0.8rem; color: var(--accent3); }

/* ── Topic Clusters ── */
.topic-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 20px; transition: all 0.3s; }
.topic-card:hover { border-color: var(--accent); }
.topic-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
.topic-name { font-weight: 700; font-size: 1.1rem; }
.topic-agreement { font-family: var(--font-mono); font-size: 0.75rem; padding: 2px 10px; border-radius: 4px; letter-spacing: 1px; }
.topic-agreement.agree { background: rgba(78,205,196,0.15); color: var(--accent3); }
.topic-agreement.partial { background: rgba(255,230,109,0.15); color: var(--accent4); }
.topic-agreement.diverge { background: rgba(255,107,107,0.15); color: var(--accent2); }
.topic-perspectives { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 16px; }
.perspective { padding: 16px; border-radius: 10px; background: rgba(255,255,255,0.02); border: 1px solid var(--border); }
.perspective-source { font-family: var(--font-mono); font-size: 0.75rem; letter-spacing: 1px; margin-bottom: 6px; }
.perspective-source.book-a { color: var(--accent); }
.perspective-source.book-b { color: var(--accent3); }
.perspective-source.book-c { color: var(--accent4); }
.perspective-text { font-size: 0.9rem; color: var(--text-dim); line-height: 1.7; }
.perspective-ref { font-family: var(--font-mono); font-size: 0.75rem; color: var(--text-dim); margin-top: 8px; opacity: 0.6; }

/* ── Divergence Cards ── */
.divergence-card { background: var(--card); border-left: 4px solid var(--accent2); border-radius: 0 var(--radius) var(--radius) 0; padding: 24px; margin-bottom: 16px; }
.divergence-topic { font-weight: 600; font-size: 1rem; margin-bottom: 12px; }
.divergence-views { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 12px; }
.divergence-view { padding: 12px; border-radius: 8px; background: rgba(255,255,255,0.02); }
.divergence-label { font-family: var(--font-mono); font-size: 0.7rem; letter-spacing: 2px; margin-bottom: 4px; }
.divergence-text { font-size: 0.9rem; color: var(--text-dim); }

/* ── Footer ── */
.footer { text-align: center; padding: 4rem 0; color: var(--text-dim); font-size: 0.8rem; border-top: 1px solid var(--border); margin-top: 4rem; }

/* ── Fade-in ── */
.fade-in { opacity: 0; transform: translateY(30px); transition: opacity 0.7s ease, transform 0.7s ease; }
.fade-in.visible { opacity: 1; transform: translateY(0); }

@media (max-width: 768px) {
    .books-row { grid-template-columns: 1fr; }
    .topic-perspectives { grid-template-columns: 1fr; }
    .divergence-views { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<section class="hero">
    <div class="hero-icon">🕸️</div>
    <h1>Syntopical Reading · 主题阅读</h1>
    <div class="hero-sub">跨越多本书，围绕同一主题构建理解</div>
    <div class="hero-badge">CROSS-BOOK ANALYSIS</div>
</section>

<div class="container" id="content"></div>

<div class="footer">
    Book Breakdown · Syntopical Reading
</div>

<script>
const syntopicalData = {
  "books": [
    {
      "slug": "ruhe-xuexi",
      "icon": "🧠",
      "title": "如何学习",
      "titleEn": "How We Learn",
      "author": "Benedict Carey"
    },
    {
      "slug": "ruhe-yuedu",
      "icon": "📚",
      "title": "如何阅读一本书",
      "titleEn": "How to Read a Book",
      "author": "Mortimer J. Adler & Charles Van Doren"
    }
  ],
  "topics": [
    {
      "name": "主动参与 · Active Engagement",
      "agreement": "agree",
      "perspectives": [
        {
          "book": "如何学习",
          "text": "学习不是被动吸收，而是主动建构。大脑通过提取练习（retrieval practice）强化记忆，主动回忆远比重读有效。",
          "ref": "Ch.4 — Testing Effect"
        },
        {
          "book": "如何阅读一本书",
          "text": "阅读是一种主动的活动，读者必须主动提出问题并尝试回答。被动接收文字不等于真正的阅读。",
          "ref": "Ch.1 — The Activity and Art of Reading"
        }
      ]
    },
    {
      "name": "层次与阶段 · Levels and Stages",
      "agreement": "agree",
      "perspectives": [
        {
          "book": "如何学习",
          "text": "学习分为编码（encoding）、巩固（consolidation）和提取（retrieval）三个阶段，每个阶段有不同的优化策略。",
          "ref": "Ch.1-3 — Memory Architecture"
        },
        {
          "book": "如何阅读一本书",
          "text": "阅读分为四个递进层次：基础阅读、检视阅读、分析阅读和主题阅读，每个层次包含前一个层次的技能。",
          "ref": "Ch.2 — The Levels of Reading"
        }
      ]
    },
    {
      "name": "遗忘的价值 · The Value of Forgetting",
      "agreement": "partial",
      "perspectives": [
        {
          "book": "如何学习",
          "text": "遗忘不是学习的敌人，而是学习的盟友。遗忘使再学习更深入（间隔效应），部分遗忘后的提取比从不遗忘更能强化记忆。",
          "ref": "Ch.2 — The Power of Forgetting"
        },
        {
          "book": "如何阅读一本书",
          "text": "强调笔记和标记作为对抗遗忘的工具，但未将遗忘视为积极因素，更倾向于通过系统性方法防止遗忘。",
          "ref": "Ch.5 — How to Be a Demanding Reader"
        }
      ]
    },
    {
      "name": "测试与自我评估 · Testing and Self-Assessment",
      "agreement": "agree",
      "perspectives": [
        {
          "book": "如何学习",
          "text": "考试是最强大的学习工具之一（测试效应）。预考（pre-testing）即使答错也能增强后续学习。",
          "ref": "Ch.4 — The Hidden Value of Ignorance"
        },
        {
          "book": "如何阅读一本书",
          "text": "读者必须用四个核心问题不断自我检测：这本书在说什么？怎么说的？说得对吗？与我有什么关系？",
          "ref": "Ch.5 — The Four Questions"
        }
      ]
    },
    {
      "name": "结构化方法 · Structured Approaches",
      "agreement": "agree",
      "perspectives": [
        {
          "book": "如何学习",
          "text": "交错练习（interleaving）比集中练习更有效。混合不同类型的问题或技能可以提高辨别力和迁移能力。",
          "ref": "Ch.5 — The Mixed-Up Advantage"
        },
        {
          "book": "如何阅读一本书",
          "text": "分析阅读提供系统性的15条规则，主题阅读要求在多本书之间建立中立术语和命题框架。有结构的方法优于随意阅读。",
          "ref": "Ch.7-11 — Analytical Reading Rules"
        }
      ]
    },
    {
      "name": "元认知 · Metacognition",
      "agreement": "agree",
      "perspectives": [
        {
          "book": "如何学习",
          "text": "学习者常高估自己的掌握程度（流畅性幻觉）。感觉困难的学习方式（合意困难, desirable difficulty）往往更有效。",
          "ref": "Ch.3-4 — Fluency Illusion"
        },
        {
          "book": "如何阅读一本书",
          "text": "好的读者清楚知道自己在哪个阅读层次上操作，能判断自己是否真正理解了还是只是在浏览文字。自我要求的读者是有意识的读者。",
          "ref": "Ch.5 — Self-Demanding Reader"
        }
      ]
    },
    {
      "name": "环境与情境 · Context and Environment",
      "agreement": "partial",
      "perspectives": [
        {
          "book": "如何学习",
          "text": "变换学习环境可以增强记忆（情境依赖记忆）。在不同地点学习同一内容比在同一地点反复学习效果更好。",
          "ref": "Ch.1 — Context and Learning"
        },
        {
          "book": "如何阅读一本书",
          "text": "未专门讨论物理环境对阅读的影响，更关注认知策略和心智准备。隐含假设是良好的方法论可以超越环境因素。",
          "ref": "General approach"
        }
      ]
    }
  ],
  "divergences": [
    {
      "topic": "对「重复」的态度",
      "views": [
        {
          "book": "如何学习",
          "text": "单纯重新阅读或重复复习效果很差，是常见的学习幻觉来源。间隔和交错比简单重复更有效。"
        },
        {
          "book": "如何阅读一本书",
          "text": "伟大的书值得反复阅读，每次重读都能获得新理解。重新阅读是深度理解的必要手段。"
        }
      ]
    },
    {
      "topic": "科学实证 vs 人文传统",
      "views": [
        {
          "book": "如何学习",
          "text": "以认知科学实验为基础，每个建议都有对照实验支持。强调可测量、可复制的学习效果。"
        },
        {
          "book": "如何阅读一本书",
          "text": "植根于古典人文教育传统（trivium），方法论来自修辞学和逻辑学，强调批判性思维和智慧发展。"
        }
      ]
    },
    {
      "topic": "学习目标的定义",
      "views": [
        {
          "book": "如何学习",
          "text": "侧重记忆保持和技能掌握，关注如何把信息高效存入长期记忆，以可测试的表现为目标。"
        },
        {
          "book": "如何阅读一本书",
          "text": "追求理解力的增长和心智的成长，最高境界是与伟大心灵的对话，目标超越信息记忆。"
        }
      ]
    }
  ]
};

(function() {
    const container = document.getElementById('content');
    if (typeof syntopicalData === 'undefined' || !syntopicalData) return;

    const data = syntopicalData;
    const bookColors = ['book-a', 'book-b', 'book-c'];
    let html = '';

    // Books row
    if (data.books && data.books.length) {
        html += `
        <div class="section-header fade-in">
            <div class="section-badge">COMPARED BOOKS</div>
            <div class="section-title">参与对比的书目</div>
        </div>
        <div class="books-row">`;
        data.books.forEach(book => {
            const href = book.slug ? `${book.slug}/index.html` : '#';
            html += `
            <a class="book-card fade-in" href="${href}">
                <div class="book-icon">${book.icon || '📖'}</div>
                <div class="book-title">${book.title}</div>
                <div class="book-title-en">${book.titleEn || ''}</div>
                <div class="book-author">${book.author || ''}</div>
            </a>`;
        });
        html += '</div>';
    }

    // Topic clusters
    if (data.topics && data.topics.length) {
        html += `
        <div class="section-header fade-in">
            <div class="section-badge">TOPIC CLUSTERS</div>
            <div class="section-title">主题聚类 · 不同作者的观点</div>
        </div>`;
        data.topics.forEach(topic => {
            const agreementClass = topic.agreement === 'agree' ? 'agree' : topic.agreement === 'partial' ? 'partial' : 'diverge';
            const agreementLabel = topic.agreement === 'agree' ? 'CONSENSUS' : topic.agreement === 'partial' ? 'PARTIAL' : 'DIVERGENT';
            html += `
            <div class="topic-card fade-in">
                <div class="topic-header">
                    <div class="topic-name">${topic.name}</div>
                    <span class="topic-agreement ${agreementClass}">${agreementLabel}</span>
                </div>
                <div class="topic-perspectives">`;
            (topic.perspectives || []).forEach((p, pi) => {
                html += `
                <div class="perspective">
                    <div class="perspective-source ${bookColors[pi % bookColors.length]}">${p.book || ''}</div>
                    <div class="perspective-text">${p.text}</div>
                    ${p.ref ? `<div class="perspective-ref">${p.ref}</div>` : ''}
                </div>`;
            });
            html += '</div></div>';
        });
    }

    // Points of divergence
    if (data.divergences && data.divergences.length) {
        html += `
        <div class="section-header fade-in">
            <div class="section-badge">POINTS OF DIVERGENCE</div>
            <div class="section-title">分歧之处</div>
        </div>`;
        data.divergences.forEach(d => {
            html += `
            <div class="divergence-card fade-in">
                <div class="divergence-topic">${d.topic}</div>
                <div class="divergence-views">`;
            (d.views || []).forEach((v, vi) => {
                html += `
                <div class="divergence-view">
                    <div class="divergence-label" style="color:var(--${vi === 0 ? 'accent' : vi === 1 ? 'accent3' : 'accent4'})">${v.book || ''}</div>
                    <div class="divergence-text">${v.text}</div>
                </div>`;
            });
            html += '</div></div>';
        });
    }

    container.innerHTML = html;

    // Observe fade-ins
    const observer = new IntersectionObserver(entries => {
        entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); } });
    }, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });
    container.querySelectorAll('.fade-in').forEach(el => observer.observe(el));
})();
</script>
</body>
</html>
