<style>
:root {
  --bg: #0f1117;
  --card: #1a1d27;
  --card-hover: #222636;
  --accent: #6c63ff;
  --accent2: #ff6b6b;
  --accent3: #4ecdc4;
  --accent4: #ffe66d;
  --text: #e8e8f0;
  --text-dim: #8888a0;
  --border: #2a2d3a;
  --glow: rgba(var(--accent-rgb), 0.15);
  --font-sans: 'Noto Sans SC', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  --radius: 14px;
  --success: #34d399;
}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;

}
::selection { background: var(--accent); color: #fff; }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ─── Progress Bar ─── */
#progressBar {
  position: fixed;
  top: 0;
  left: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--accent), var(--accent3));
  width: 0%;
  z-index: 100;
  transition: width 0.1s linear;
}

/* ─── Hero (compact) ─── */
.hero {
  padding: 6rem 2rem 3rem;
  text-align: center;
  position: relative;
}
.hero-icon {
  font-size: 4rem;
  margin-bottom: 1rem;

  filter: drop-shadow(0 0 20px var(--glow));
}
.hero h1 {
  font-size: 2.5rem;
  font-weight: 700;
  background: linear-gradient(135deg, var(--accent), var(--accent3));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 0.2rem;
}
.hero-zh {
  font-size: 1.2rem;
  color: var(--text-dim);
  font-weight: 300;
  margin-bottom: 0.8rem;
}
.hero-desc {

  font-family: var(--font-mono);
  margin-bottom: 1.5rem;
}
.hero-stats {
  display: flex;
  justify-content: center;
  gap: 0.75rem;
  flex-wrap: wrap;
  margin-bottom: 1.5rem;
}
.back-link {

  text-decoration: none;
  font-size: 0.85rem;
  font-family: var(--font-mono);
  transition: color 0.3s ease;
}
.back-link:hover { color: var(--accent); }

/* ─── Container ─── */
.container {
  max-width: 900px;
  margin: 0 auto;
  padding: 0 2rem 4rem;
}

/* ─── Controls ─── */
.controls {
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 1rem;
  margin-bottom: 1.5rem;
  padding: 1rem 0;
  border-bottom: 1px solid var(--border);
}
.control-group {
  display: flex;
  align-items: center;
  gap: 0.5rem;
}
.control-label {
  font-size: 0.75rem;
  color: var(--text-dim);
  font-family: var(--font-mono);
  text-transform: uppercase;
  letter-spacing: 1px;
}
.ctrl-btn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-dim);
  font-family: var(--font-mono);
  font-size: 0.75rem;
  padding: 0.3rem 0.7rem;
  border-radius: 0.5rem;
  cursor: pointer;
  transition: all 0.2s ease;
}
.ctrl-btn:hover {
  border-color: var(--accent);
  color: var(--text);
}
.ctrl-btn.active {
  background: rgba(var(--accent-rgb), 0.15);
  border-color: var(--accent);
  color: var(--accent);
}
.expand-all-btn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-dim);
  font-family: var(--font-mono);
  font-size: 0.75rem;
  padding: 0.3rem 0.7rem;
  border-radius: 0.5rem;
  cursor: pointer;
  transition: all 0.2s ease;
}
.expand-all-btn:hover {

  color: var(--accent3);
}

/* ─── Badge System ─── */
.badge {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  padding: 0.15rem 0.55rem;
  border-radius: 1rem;
  letter-spacing: 0.5px;
  white-space: nowrap;
}
.badge--time {
  background: rgba(var(--accent-rgb), 0.15);
  color: var(--accent);
  border: 1px solid rgba(var(--accent-rgb), 0.3);
}
.badge--space {
  background: rgba(var(--accent3-rgb), 0.1);

}

}

  border: 1px solid rgba(var(--text-dim-rgb), 0.2);
}

.algo-card {

}
.algo-card:hover {

}
.algo-card.expanded-l1 {

.algo-header {

.algo-header:hover {

.algo-title-group {

}
.algo-name {

}

}
.algo-oneliner {

}
.algo-badges {

}
.algo-chevron {

  transition: transform 0.3s ease;
  flex-shrink: 0;
}
.algo-card.expanded-l1 .algo-chevron {

}

.algo-detail {

.algo-detail-inner {

.detail-section {

.detail-section:last-child { margin-bottom: 0; }
.detail-section h3 {

  font-weight: 700;
  color: var(--accent3);
  text-transform: uppercase;
  letter-spacing: 1px;

  font-family: var(--font-mono);
}
.detail-section p {
  font-size: 0.9rem;
  line-height: 1.7;
  color: var(--text);
}
.detail-section ul {
  list-style: none;
  padding: 0;
}
.detail-section ul li {
  font-size: 0.85rem;
  color: var(--text);
  padding: 0.25rem 0;
  padding-left: 1.2rem;
  position: relative;
}
.detail-section ul li::before {
  content: '›';
  position: absolute;
  left: 0;
  color: var(--accent);
  font-weight: 700;
}
.insight-box {
  background: rgba(var(--accent-rgb), 0.08);
  border-left: 3px solid var(--accent);
  padding: 0.8rem 1rem;
  border-radius: 0 8px 8px 0;
  font-size: 0.9rem;
  line-height: 1.6;
}
.insight-box-zh {
  color: var(--text-dim);
  font-size: 0.8rem;
  margin-top: 0.3rem;
}

/* ─── Code Block ─── */
.code-block {
  background: var(--code-bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1.25rem;
  font-family: var(--font-mono);
  font-size: 0.8rem;
  color: var(--text-dim);
  overflow-x: auto;
  white-space: pre;
  line-height: 1.7;
  position: relative;
}
.code-block::before {
  content: 'Python';
  position: absolute;
  top: 8px;
  right: 12px;
  font-size: 0.65rem;
  color: var(--text-dim);
  letter-spacing: 1.5px;
  text-transform: uppercase;
}
.code-keyword { color: var(--accent); }
.code-string { color: var(--accent3); }
.code-comment { color: #5a5a7a; font-style: italic; }
.code-number { color: var(--accent4); }
.code-func { color: var(--accent2); }
.code-builtin { color: #c792ea; }

/* ─── Complexity Table ─── */
.complexity-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.8rem;
  font-family: var(--font-mono);
}
.complexity-table th {
  color: var(--text-dim);
  font-weight: 400;
  text-align: left;
  padding: 0.4rem 0.8rem;
  border-bottom: 1px solid var(--border);
  text-transform: uppercase;
  letter-spacing: 1px;
  font-size: 0.7rem;
}
.complexity-table td {
  padding: 0.4rem 0.8rem;
  border-bottom: 1px solid rgba(var(--border-rgb), 0.5);
}
.complexity-table tr:last-child td { border-bottom: none; }

/* ─── Deep Dive Button ─── */
.deep-dive-btn {
  display: block;
  width: 100%;
  background: rgba(var(--accent-rgb), 0.06);
  border: 1px dashed rgba(var(--accent-rgb), 0.3);
  color: var(--accent);
  font-family: var(--font-mono);
  font-size: 0.8rem;
  padding: 0.6rem;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.2s ease;
  margin-top: 1rem;
}
.deep-dive-btn:hover {
  background: rgba(var(--accent-rgb), 0.12);
  border-color: var(--accent);
}

/* ─── Deep Dive (Level 2) ─── */
.algo-deep-dive {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.5s cubic-bezier(0.4, 0, 0.2, 1);
}
.algo-deep-dive-inner {
  padding-top: 1rem;
}
.variation-list, .related-list, .app-list {
  display: grid;
  gap: 0.4rem;
}
.variation-item, .related-item, .app-item {
  font-size: 0.85rem;
  padding: 0.4rem 0.8rem;
  background: rgba(var(--accent-rgb), 0.04);
  border-radius: 6px;
  border-left: 2px solid var(--accent);
}
.related-item { border-left-color: var(--accent3); }
.app-item { border-left-color: var(--accent4); }
.vs-box {
  background: rgba(var(--accent2-rgb), 0.06);
  border-left: 3px solid var(--accent2);
  padding: 0.8rem 1rem;
  border-radius: 0 8px 8px 0;
  font-size: 0.85rem;
  line-height: 1.6;
}
.walkthrough-block {
  background: var(--code-bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem;
  font-family: var(--font-mono);
  font-size: 0.78rem;
  color: var(--text-dim);
  white-space: pre-wrap;
  line-height: 1.6;
}

/* ─── Navigation ─── */
.nav-footer {
  display: flex;
  justify-content: space-between;
  align-items: stretch;
  gap: 1rem;
  margin-top: 3rem;
  padding-top: 2rem;
  border-top: 1px solid var(--border);
}
.nav-btn {
  display: flex;
  flex-direction: column;
  gap: 0.2rem;
  text-decoration: none;
  color: var(--text);
  padding: 0.8rem 1.2rem;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  transition: all 0.3s ease;
  min-width: 0;
}
.nav-btn:hover {
  border-color: var(--accent);
  box-shadow: 0 4px 15px var(--glow);
}
.nav-prev { align-items: flex-start; }
.nav-next { align-items: flex-end; }
.nav-label {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  color: var(--text-dim);
  letter-spacing: 1px;
}
.nav-title {
  font-size: 0.9rem;
  font-weight: 500;
}
.nav-placeholder { flex: 1; }

/* ─── Coming Soon (category page) ─── */
.coming-soon-container {
  text-align: center;
  padding: 4rem 2rem;
}
.coming-soon-msg {

.planned-list {

}
.planned-list li {
  padding: 0.5rem 0;
  font-size: 0.9rem;

  align-items: center;
  gap: 0.5rem;
}
.planned-check {
  width: 16px;
  height: 16px;
  border: 1.5px solid var(--border);
  border-radius: 4px;
  flex-shrink: 0;
}

/* ─── Footer ─── */
.footer {
  text-align: center;
  padding: 3rem 2rem;
  color: var(--text-dim);
  font-size: 0.8rem;
  border-top: 1px solid var(--border);
}

/* ─── Fade-in ─── */
.fade-in {
  opacity: 0;
  transform: translateY(20px);
  transition: opacity 0.6s ease, transform 0.6s ease;
}
.fade-in.visible {
  opacity: 1;
  transform: translateY(0);
}

@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

/* ─── Responsive ─── */
@media (max-width: 768px) {
  .hero { padding: 4rem 1.5rem 2rem; }

/* ── Light theme overrides ── */
[data-theme="light"] {

const categoryMeta = {

const algorithms = [
  {
    "id": "kruskal-mst",
    "name": "Kruskal's Algorithm",
    "nameZh": "Kruskal 最小生成树算法",
    "difficulty": "medium",
    "source": "algs4",
    "sourceChapter": "4.3",
    "oneLiner": "Build MST by greedily adding the smallest edge that doesn't form a cycle",
    "oneLinerZh": "贪心地添加不形成环的最小边来构建最小生成树",
    "complexity": {
      "time": {
        "best": "O(E log E)",
        "average": "O(E log E)",
        "worst": "O(E log E)"

      "space": "O(V)"
    },
    "problemDefinition": "Given an edge-weighted connected undirected graph G with V vertices and E edges, find a minimum spanning tree (MST) — a subset of V-1 edges that connects all vertices with minimum total weight.",
    "problemDefinitionZh": "给定一个有 V 个顶点和 E 条边的边加权连通无向图 G，找到一棵最小生成树（MST）——由 V-1 条边组成的子集，以最小总权重连接所有顶点。",
    "whenToUse": [

// ─── Python Syntax Highlighting (lightweight) ─────────────────────────────
function highlightPython(code) {
  // Escape HTML
  let s = code.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  // Comments
  s = s.replace(/(#.*?)$/gm, '<span class="code-comment">$1</span>');
  // Triple-quoted strings
  s = s.replace(/("""[\s\S]*?"""|'''[\s\S]*?''')/g, '<span class="code-string">$1</span>');
  // Strings
  s = s.replace(/("(?:[^"\\]|\\.)*"|'(?:[^'\\]|\\.)*')/g, '<span class="code-string">$1</span>');
  // Keywords
  const kws = ['def','class','return','if','elif','else','for','while','in','not','and','or','is','None','True','False','import','from','as','with','try','except','finally','raise','yield','lambda','pass','break','continue','assert','global','nonlocal'];
  const kwRe = new RegExp('\\b(' + kws.join('|') + ')\\b', 'g');
  s = s.replace(kwRe, '<span class="code-keyword">$1</span>');
  // Built-in functions
  const builtins = ['len','range','print','int','float','str','list','dict','set','tuple','sorted','enumerate','zip','map','filter','isinstance','type','super','min','max','sum','abs','any','all','reversed','iter','next','hash','id','open','input'];
  const biRe = new RegExp('\\b(' + builtins.join('|') + ')(?=\\()', 'g');
  s = s.replace(biRe, '<span class="code-builtin">$1</span>');
  // Function definitions
  s = s.replace(/(?<=def\s+)(\w+)/g, '<span class="code-func">$1</span>');
  // Numbers
  s = s.replace(/\b(\d+\.?\d*)\b/g, '<span class="code-number">$1</span>');
  return s;
}

                <p>${dd.explanation}</p>
              </div>
              ${dd.walkthrough ? `<div class="detail-section"><h3>Step-by-Step Walkthrough</h3><div class="walkthrough-block">${dd.walkthrough}</div></div>` : ''}
              ${variationsHtml ? `<div class="detail-section"><h3>Variations & Optimizations</h3><div class="variation-list">${variationsHtml}</div></div>` : ''}
              ${relatedHtml ? `<div class="detail-section"><h3>Related Problems</h3><div class="related-list">${relatedHtml}</div></div>` : ''}
              ${appsHtml ? `<div class="detail-section"><h3>Real-World Applications</h3><div class="app-list">${appsHtml}</div></div>` : ''}
              ${dd.vsAlternatives ? `<div class="detail-section"><h3>Comparison with Alternatives</h3><div class="vs-box">${dd.vsAlternatives}</div></div>` : ''}
            </div>
          </div>` : ''}
        </div>
      </div>`;

    algoListEl.appendChild(card);
  });
}

// ─── Expand / Collapse ────────────────────────────────────────────────────
function toggleL1(headerEl) {
  const card = headerEl.closest('.algo-card');
  const detail = card.querySelector('.algo-detail');
  const isOpen = card.classList.contains('expanded-l1');

  if (isOpen) {
    if (card.classList.contains('expanded-l2')) {
      const btn = card.querySelector('.deep-dive-btn');
      if (btn) toggleL2(btn);
    }
    detail.style.maxHeight = '0';
    card.classList.remove('expanded-l1');
  } else {
    detail.style.maxHeight = detail.scrollHeight + 'px';
    card.classList.add('expanded-l1');
  }
}

function toggleL2(btnEl) {
  const card = btnEl.closest('.algo-card');
  const deepDive = card.querySelector('.algo-deep-dive');
  const detail = card.querySelector('.algo-detail');
  const isOpen = card.classList.contains('expanded-l2');

  if (isOpen) {
    deepDive.style.maxHeight = '0';
    card.classList.remove('expanded-l2');
    btnEl.textContent = 'Deep Dive ▾';
  } else {
    deepDive.style.maxHeight = deepDive.scrollHeight + 'px';
    card.classList.add('expanded-l2');
    btnEl.textContent = 'Deep Dive ▴';
    // Recalculate parent
    setTimeout(() => { detail.style.maxHeight = detail.scrollHeight + 'px'; }, 10);
  }
}

function toggleExpandAll() {
  const btn = document.getElementById('expandAllBtn');
  const cards = document.querySelectorAll('.algo-card');
  allExpanded = !allExpanded;

  cards.forEach(card => {
    if (card.style.display === 'none') return;
    const detail = card.querySelector('.algo-detail');
    if (allExpanded) {
      detail.style.maxHeight = detail.scrollHeight + 'px';
      card.classList.add('expanded-l1');
    } else {
      if (card.classList.contains('expanded-l2')) {
        const ddBtn = card.querySelector('.deep-dive-btn');
        if (ddBtn) toggleL2(ddBtn);
      }
      detail.style.maxHeight = '0';
      card.classList.remove('expanded-l1');
    }
  });
  btn.textContent = allExpanded ? 'Collapse All' : 'Expand All';
}

// ─── Sort / Filter ────────────────────────────────────────────────────────
function sortBy(mode, btnEl) {
  document.querySelectorAll('[data-sort]').forEach(b => b.classList.remove('active'));
  btnEl.classList.add('active');

  const list = document.getElementById('algoList');
  const cards = Array.from(list.querySelectorAll('.algo-card'));
  const diffOrder = { easy: 0, medium: 1, hard: 2 };

  cards.sort((a, b) => {
    if (mode === 'difficulty') return (diffOrder[a.dataset.difficulty] || 0) - (diffOrder[b.dataset.difficulty] || 0);
    if (mode === 'complexity') return parseInt(a.dataset.complexityRank) - parseInt(b.dataset.complexityRank);
    return parseInt(a.dataset.defaultOrder) - parseInt(b.dataset.defaultOrder);
  });
  cards.forEach(c => list.appendChild(c));
}

function filterBy(difficulty, btnEl) {
  document.querySelectorAll('[data-filter]').forEach(b => b.classList.remove('active'));
  btnEl.classList.add('active');

  document.querySelectorAll('.algo-card').forEach(card => {
    card.style.display = (difficulty === 'all' || card.dataset.difficulty === difficulty) ? '' : 'none';
  });
}

// ─── Progress Bar ─────────────────────────────────────────────────────────
window.addEventListener('scroll', () => {
  const h = document.documentElement;
  const pct = (h.scrollTop / (h.scrollHeight - h.clientHeight)) * 100;
  document.getElementById('progressBar').style.width = Math.min(pct, 100) + '%';
});

// ─── Fade-in Observer ─────────────────────────────────────────────────────
const observer = new IntersectionObserver(entries => {
  entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); } });
}, { threshold: 0.05 });
document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));

// ─── URL Hash Support ─────────────────────────────────────────────────────
function handleHash() {
  const hash = window.location.hash.slice(1);
  if (!hash) return;
  const card = document.getElementById(hash);
  if (!card) return;
  setTimeout(() => {
    card.scrollIntoView({ behavior: 'smooth', block: 'center' });
    const header = card.querySelector('.algo-header');
    if (header && !card.classList.contains('expanded-l1')) toggleL1(header);
  }, 300);
}
window.addEventListener('hashchange', handleHash);
handleHash();
</script>
<!-- Theme Toggle -->
<button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
  <span class="theme-toggle-icon" id="themeIcon"></span>
</button>
<style>
.theme-toggle {
  position: fixed;
  top: 1rem;
  right: 1rem;
  z-index: 9999;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--card);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.1rem;
  transition: all 0.3s;
  opacity: 0.7;
  padding: 0;
  line-height: 1;
}
.theme-toggle:hover {
  opacity: 1;
  transform: scale(1.1);
  border-color: var(--accent);
  box-shadow: 0 0 12px var(--glow);
}
</style>
<script>
(function() {
  var KEY = 'hyperion-theme';
  var toggle = document.getElementById('themeToggle');
  var icon = document.getElementById('themeIcon');

  function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    icon.textContent = theme === 'light' ? '\u{1F319}' : '\u{2600}\u{FE0F}';
    localStorage.setItem(KEY, theme);
    window.dispatchEvent(new CustomEvent('themechange', { detail: { theme: theme } }));
  }

  var saved = localStorage.getItem(KEY);
  if (saved) {
    applyTheme(saved);
  } else {
    icon.textContent = '\u{2600}\u{FE0F}';
  }

  toggle.addEventListener('click', function() {
    var current = document.documentElement.getAttribute('data-theme');
    applyTheme(current === 'light' ? 'dark' : 'light');
  });

  // Utility for canvas code: read theme-aware CSS var values
  window.getThemeRGB = function(varName) {
    return getComputedStyle(document.documentElement).getPropertyValue(varName).trim();
  };
})();
</script>
