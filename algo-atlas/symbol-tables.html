<style>
:root {
  --bg: #0f1117;
  --card: #1a1d27;
  --card-hover: #222636;
  --accent: #6c63ff;
  --accent2: #ff6b6b;
  --accent3: #4ecdc4;
  --accent4: #ffe66d;
  --text: #e8e8f0;
  --text-dim: #8888a0;
  --border: #2a2d3a;
  --glow: rgba(108, 99, 255, 0.15);
  --font-sans: 'Noto Sans SC', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  --radius: 14px;
  --success: #34d399;
}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
}
::selection { background: var(--accent); color: #fff; }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ─── Progress Bar ─── */
#progressBar {
  position: fixed;
  top: 0;
  left: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--accent), var(--accent3));
  width: 0%;
  z-index: 100;
  transition: width 0.1s linear;
}

/* ─── Hero (compact) ─── */
.hero {
  padding: 6rem 2rem 3rem;
  text-align: center;
  position: relative;
}
.hero-icon {
  font-size: 4rem;
  margin-bottom: 1rem;
  animation: float 3s ease-in-out infinite;
  filter: drop-shadow(0 0 20px var(--glow));
}
.hero h1 {
  font-size: 2.5rem;
  font-weight: 700;
  background: linear-gradient(135deg, var(--accent), var(--accent3));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 0.2rem;
}
.hero-zh {
  font-size: 1.2rem;
  color: var(--text-dim);
  font-weight: 300;
  margin-bottom: 0.8rem;
}
.hero-desc {
  font-size: 1rem;
  color: var(--accent3);
  font-family: var(--font-mono);
  margin-bottom: 1.5rem;
}
.hero-stats {
  display: flex;
  justify-content: center;
  gap: 0.75rem;
  flex-wrap: wrap;
  margin-bottom: 1.5rem;
}
.back-link {
  color: var(--text-dim);
  text-decoration: none;
  font-size: 0.85rem;
  font-family: var(--font-mono);
  transition: color 0.3s ease;
}
.back-link:hover { color: var(--accent); }

/* ─── Container ─── */
.container {
  max-width: 900px;
  margin: 0 auto;
  padding: 0 2rem 4rem;
}

/* ─── Controls ─── */
.controls {
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 1rem;
  margin-bottom: 1.5rem;
  padding: 1rem 0;
  border-bottom: 1px solid var(--border);
}
.control-group {
  display: flex;
  align-items: center;
  gap: 0.5rem;
}
.control-label {
  font-size: 0.75rem;
  color: var(--text-dim);
  font-family: var(--font-mono);
  text-transform: uppercase;
  letter-spacing: 1px;
}
.ctrl-btn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-dim);
  font-family: var(--font-mono);
  font-size: 0.75rem;
  padding: 0.3rem 0.7rem;
  border-radius: 0.5rem;
  cursor: pointer;
  transition: all 0.2s ease;
}
.ctrl-btn:hover {
  border-color: var(--accent);
  color: var(--text);
}
.ctrl-btn.active {
  background: rgba(108, 99, 255, 0.15);
  border-color: var(--accent);
  color: var(--accent);
}
.expand-all-btn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-dim);
  font-family: var(--font-mono);
  font-size: 0.75rem;
  padding: 0.3rem 0.7rem;
  border-radius: 0.5rem;
  cursor: pointer;
  transition: all 0.2s ease;
}
.expand-all-btn:hover {
  border-color: var(--accent3);
  color: var(--accent3);
}

/* ─── Badge System ─── */
.badge {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  padding: 0.15rem 0.55rem;
  border-radius: 1rem;
  letter-spacing: 0.5px;
  white-space: nowrap;
}
.badge--time {
  background: rgba(108, 99, 255, 0.15);
  color: var(--accent);
  border: 1px solid rgba(108, 99, 255, 0.3);
}
.badge--space {
  background: rgba(78, 205, 196, 0.1);
  color: var(--accent3);
  border: 1px solid rgba(78, 205, 196, 0.2);
}
.badge--easy {
  background: rgba(78, 205, 196, 0.15);
  color: var(--accent3);
  border: 1px solid rgba(78, 205, 196, 0.3);
}
.badge--medium {
  background: rgba(255, 230, 109, 0.15);
  color: var(--accent4);
  border: 1px solid rgba(255, 230, 109, 0.3);
}
.badge--hard {
  background: rgba(255, 107, 107, 0.15);
  color: var(--accent2);
  border: 1px solid rgba(255, 107, 107, 0.3);
}
.badge--source {
  background: rgba(136, 136, 160, 0.1);
  color: var(--text-dim);
  border: 1px solid rgba(136, 136, 160, 0.2);
}

/* ─── Algorithm Card ─── */
.algo-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 0.75rem;
  transition: border-color 0.3s ease, box-shadow 0.3s ease;
  overflow: hidden;
}
.algo-card:hover {
  border-color: rgba(108, 99, 255, 0.3);
}
.algo-card.expanded-l1 {
  border-color: var(--accent);
  box-shadow: 0 4px 20px var(--glow);
}

/* ─── Algo Header (Level 0 — always visible) ─── */
.algo-header {
  display: flex;
  align-items: center;
  gap: 1rem;
  padding: 1rem 1.25rem;
  cursor: pointer;
  user-select: none;
  transition: background 0.2s ease;
}
.algo-header:hover {
  background: var(--card-hover);
}
.algo-title-group {
  flex-shrink: 0;
  min-width: 0;
}
.algo-name {
  font-size: 1rem;
  font-weight: 700;
}
.algo-name-zh {
  font-size: 0.8rem;
  color: var(--text-dim);
}
.algo-oneliner {
  flex: 1;
  font-size: 0.8rem;
  color: var(--text-dim);
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.algo-badges {
  display: flex;
  gap: 0.4rem;
  flex-shrink: 0;
}
.algo-chevron {
  font-size: 1rem;
  color: var(--text-dim);
  transition: transform 0.3s ease;
  flex-shrink: 0;
}
.algo-card.expanded-l1 .algo-chevron {
  transform: rotate(180deg);
}

/* ─── Algo Detail (Level 1 — expand on click) ─── */
.algo-detail {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.5s cubic-bezier(0.4, 0, 0.2, 1);
}
.algo-detail-inner {
  padding: 0 1.25rem 1.25rem;
}
.detail-section {
  margin-bottom: 1.25rem;
}
.detail-section:last-child { margin-bottom: 0; }
.detail-section h3 {
  font-size: 0.85rem;
  font-weight: 700;
  color: var(--accent3);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 0.5rem;
  font-family: var(--font-mono);
}
.detail-section p {
  font-size: 0.9rem;
  line-height: 1.7;
  color: var(--text);
}
.detail-section ul {
  list-style: none;
  padding: 0;
}
.detail-section ul li {
  font-size: 0.85rem;
  color: var(--text);
  padding: 0.25rem 0;
  padding-left: 1.2rem;
  position: relative;
}
.detail-section ul li::before {
  content: '›';
  position: absolute;
  left: 0;
  color: var(--accent);
  font-weight: 700;
}
.insight-box {
  background: rgba(108, 99, 255, 0.08);
  border-left: 3px solid var(--accent);
  padding: 0.8rem 1rem;
  border-radius: 0 8px 8px 0;
  font-size: 0.9rem;
  line-height: 1.6;
}
.insight-box-zh {
  color: var(--text-dim);
  font-size: 0.8rem;
  margin-top: 0.3rem;
}

/* ─── Code Block ─── */
.code-block {
  background: #12141c;
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1.25rem;
  font-family: var(--font-mono);
  font-size: 0.8rem;
  color: #c0c0d8;
  overflow-x: auto;
  white-space: pre;
  line-height: 1.7;
  position: relative;
}
.code-block::before {
  content: 'Python';
  position: absolute;
  top: 8px;
  right: 12px;
  font-size: 0.65rem;
  color: var(--text-dim);
  letter-spacing: 1.5px;
  text-transform: uppercase;
}
.code-keyword { color: var(--accent); }
.code-string { color: var(--accent3); }
.code-comment { color: #5a5a7a; font-style: italic; }
.code-number { color: var(--accent4); }
.code-func { color: var(--accent2); }
.code-builtin { color: #c792ea; }

/* ─── Complexity Table ─── */
.complexity-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.8rem;
  font-family: var(--font-mono);
}
.complexity-table th {
  color: var(--text-dim);
  font-weight: 400;
  text-align: left;
  padding: 0.4rem 0.8rem;
  border-bottom: 1px solid var(--border);
  text-transform: uppercase;
  letter-spacing: 1px;
  font-size: 0.7rem;
}
.complexity-table td {
  padding: 0.4rem 0.8rem;
  border-bottom: 1px solid rgba(42, 45, 58, 0.5);
}
.complexity-table tr:last-child td { border-bottom: none; }

/* ─── Deep Dive Button ─── */
.deep-dive-btn {
  display: block;
  width: 100%;
  background: rgba(108, 99, 255, 0.06);
  border: 1px dashed rgba(108, 99, 255, 0.3);
  color: var(--accent);
  font-family: var(--font-mono);
  font-size: 0.8rem;
  padding: 0.6rem;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.2s ease;
  margin-top: 1rem;
}
.deep-dive-btn:hover {
  background: rgba(108, 99, 255, 0.12);
  border-color: var(--accent);
}

/* ─── Deep Dive (Level 2) ─── */
.algo-deep-dive {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.5s cubic-bezier(0.4, 0, 0.2, 1);
}
.algo-deep-dive-inner {
  padding-top: 1rem;
}
.variation-list, .related-list, .app-list {
  display: grid;
  gap: 0.4rem;
}
.variation-item, .related-item, .app-item {
  font-size: 0.85rem;
  padding: 0.4rem 0.8rem;
  background: rgba(108, 99, 255, 0.04);
  border-radius: 6px;
  border-left: 2px solid var(--accent);
}
.related-item { border-left-color: var(--accent3); }
.app-item { border-left-color: var(--accent4); }
.vs-box {
  background: rgba(255, 107, 107, 0.06);
  border-left: 3px solid var(--accent2);
  padding: 0.8rem 1rem;
  border-radius: 0 8px 8px 0;
  font-size: 0.85rem;
  line-height: 1.6;
}
.walkthrough-block {
  background: #12141c;
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem;
  font-family: var(--font-mono);
  font-size: 0.78rem;
  color: #c0c0d8;
  white-space: pre-wrap;
  line-height: 1.6;
}

/* ─── Navigation ─── */
.nav-footer {
  display: flex;
  justify-content: space-between;
  align-items: stretch;
  gap: 1rem;
  margin-top: 3rem;
  padding-top: 2rem;
  border-top: 1px solid var(--border);
}
.nav-btn {
  display: flex;
  flex-direction: column;
  gap: 0.2rem;
  text-decoration: none;
  color: var(--text);
  padding: 0.8rem 1.2rem;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  transition: all 0.3s ease;
  min-width: 0;
}
.nav-btn:hover {
  border-color: var(--accent);
  box-shadow: 0 4px 15px var(--glow);
}
.nav-prev { align-items: flex-start; }
.nav-next { align-items: flex-end; }
.nav-label {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  color: var(--text-dim);
  letter-spacing: 1px;
}
.nav-title {
  font-size: 0.9rem;
  font-weight: 500;
}
.nav-placeholder { flex: 1; }

/* ─── Coming Soon (category page) ─── */
.coming-soon-container {
  text-align: center;
  padding: 4rem 2rem;
}
.coming-soon-msg {
  font-size: 1.1rem;
  color: var(--text-dim);
  margin-bottom: 1rem;
}
.coming-soon-msg-zh {
  font-size: 0.95rem;
  color: var(--text-dim);
  margin-bottom: 2rem;
}
.planned-list {
  list-style: none;
  padding: 0;
  max-width: 400px;
  margin: 0 auto;
}
.planned-list li {
  padding: 0.5rem 0;
  font-size: 0.9rem;
  color: var(--text-dim);
  border-bottom: 1px dashed var(--border);
  display: flex;
  align-items: center;
  gap: 0.5rem;
}
.planned-check {
  width: 16px;
  height: 16px;
  border: 1.5px solid var(--border);
  border-radius: 4px;
  flex-shrink: 0;
}

/* ─── Footer ─── */
.footer {
  text-align: center;
  padding: 3rem 2rem;
  color: var(--text-dim);
  font-size: 0.8rem;
  border-top: 1px solid var(--border);
}

/* ─── Fade-in ─── */
.fade-in {
  opacity: 0;
  transform: translateY(20px);
  transition: opacity 0.6s ease, transform 0.6s ease;
}
.fade-in.visible {
  opacity: 1;
  transform: translateY(0);
}

@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

/* ─── Responsive ─── */
@media (max-width: 768px) {
  .hero { padding: 4rem 1.5rem 2rem; }
  .hero h1 { font-size: 1.8rem; }
  .algo-header { flex-wrap: wrap; gap: 0.5rem; }
  .algo-oneliner { display: none; }
  .controls { flex-direction: column; align-items: flex-start; }
  .nav-footer { flex-direction: column; }
}
</style>

<script>
const categoryMeta = {
  "id": "symbol-tables",
  "name": "Symbol Tables & Hashing",
  "nameZh": "符号表与散列",
  "icon": "🗂️",
  "description": "Key-value abstractions from linear to constant-time lookup",
  "descriptionZh": "从线性到常数时间的键值查找抽象",

  "status": "active",

  "algoCount": 6
};

const algorithms = [
  {
    "id": "sequential-search",
    "name": "Sequential Search (Unordered Linked List)",
    "nameZh": "顺序查找（无序链表）",
    "difficulty": "easy",
    "source": "algs4",
    "sourceChapter": "3.1",
    "oneLiner": "Search a key-value store by scanning every node in a linked list",
    "oneLinerZh": "通过扫描链表中每个节点来查找键值对",
    "complexity": {
      "time": {
        "best": "O(1)",
        "average": "O(N)",
        "worst": "O(N)"
      },
      "space": "O(N)"
    },
    "problemDefinition": "Maintain an unordered collection of key-value pairs supporting put(key, val) and get(key) operations. Keys are unique — putting a duplicate key updates the value. This is the simplest symbol table implementation: a linked list where each node holds a key-value pair.",
    "problemDefinitionZh": "维护一个无序键值对集合，支持 put(key, val) 和 get(key) 操作。键唯一——插入重复键时更新值。这是最简单的符号表实现：链表中每个节点保存一个键值对。",
    "whenToUse": [
      "Very small tables (N < 20) where simplicity matters more than speed",
      "Prototyping — correctness baseline before optimizing with BST or hash table",
      "Keys have no natural ordering (cannot use binary search or BST comparisons)",
      "Insert-heavy workload where search is rare"
    ],
    "keyInsight": "Sequential search is the brute-force baseline: scan every key until a match is found. For N keys, a successful search examines N/2 keys on average, and an unsuccessful search examines all N. Every faster symbol table is measured against this O(N) baseline.",
    "keyInsightZh": "顺序查找是暴力基线：逐一扫描每个键直到找到匹配。对于 N 个键，成功查找平均检查 N/2 个键，失败查找检查全部 N 个。所有更快的符号表都以这个 O(N) 基线为参照。",
    "implementation": "class SequentialSearchST:\n    \"\"\"Symbol table via unordered linked list.\"\"\"\n\n    class _Node:\n        def __init__(self, key, val, next_node=None):\n            self.key = key\n            self.val = val\n            self.next = next_node\n\n    def __init__(self):\n        self._first = None\n        self._n = 0\n\n    def get(self, key):\n        \"\"\"Return value for key, or None if not found.\"\"\"\n        node = self._first\n        while node is not None:\n            if node.key == key:\n                return node.val\n            node = node.next\n        return None\n\n    def put(self, key, val):\n        \"\"\"Insert key-value pair; update val if key exists.\"\"\"\n        node = self._first\n        while node is not None:\n            if node.key == key:\n                node.val = val\n                return\n            node = node.next\n        self._first = self._Node(key, val, self._first)\n        self._n += 1\n\n    def __len__(self):\n        return self._n\n\n    def keys(self):\n        result = []\n        node = self._first\n        while node is not None:\n            result.append(node.key)\n            node = node.next\n        return result",
    "deepDive": {
      "explanation": "Sequential search maintains a singly-linked list of key-value nodes. On get(key), we walk the list from the head comparing each node's key to the target. On put(key, val), we first walk the list looking for a matching key to update; if not found, we prepend a new node at the head. This gives O(1) insertion for new keys but O(N) search for both put (duplicate check) and get.",
      "walkthrough": "Operations: put(S,0), put(E,1), put(A,2), put(R,3), get(E)\n\nput(S,0): list empty → head = [S:0]\nput(E,1): scan [S:0], no match → head = [E:1] → [S:0]\nput(A,2): scan [E:1] → [S:0], no match → head = [A:2] → [E:1] → [S:0]\nput(R,3): scan 3 nodes, no match → head = [R:3] → [A:2] → [E:1] → [S:0]\nget(E): scan [R:3] → [A:2] → [E:1] found → return 1 ✓ (3 compares)",
      "variations": [
        "Move-to-front heuristic — on access, move the found node to head for cache locality",
        "Ordered linked list — keep keys sorted for faster unsuccessful search (stop early) but O(N) still",
        "Self-organizing list with frequency counters — move frequently accessed keys toward front"
      ],
      "relatedProblems": [
        "Design HashMap (LeetCode 706)",
        "Two Sum (LeetCode 1) — brute-force uses sequential scan",
        "First Unique Character in a String (LeetCode 387)"
      ],
      "realWorldApps": [
        "Python dict before hash table optimization (conceptual baseline)",
        "Small configuration stores (e.g., HTTP headers with few entries)",
        "Compiler symbol tables for very small scopes (a few local variables)",

h all keys into a new table of size new_m.\"\"\"\n        new_st = LinearProbingHashST(new_m)\n        for i in range(self._m):\n            if self._keys[i] is not None:\n                new_st.put(self._keys[i], self._vals[i])\n        self._m = new_st._m\n        self._keys = new_st._keys\n        self._vals = new_st._vals\n\n    def __len__(self):\n        return self._n",

const isComingSoon = false;

// ─── Python Syntax Highlighting (lightweight) ─────────────────────────────
function highlightPython(code) {
  // Escape HTML
  let s = code.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  // Comments
  s = s.replace(/(#.*?)$/gm, '<span class="code-comment">$1</span>');
  // Triple-quoted strings
  s = s.replace(/("""[\s\S]*?"""|'''[\s\S]*?''')/g, '<span class="code-string">$1</span>');
  // Strings
  s = s.replace(/("(?:[^"\\]|\\.)*"|'(?:[^'\\]|\\.)*')/g, '<span class="code-string">$1</span>');
  // Keywords
  const kws = ['def','class','return','if','elif','else','for','while','in','not','and','or','is','None','True','False','import','from','as','with','try','except','finally','raise','yield','lambda','pass','break','continue','assert','global','nonlocal'];
  const kwRe = new RegExp('\\b(' + kws.join('|') + ')\\b', 'g');
  s = s.replace(kwRe, '<span class="code-keyword">$1</span>');
  // Built-in functions
  const builtins = ['len','range','print','int','float','str','list','dict','set','tuple','sorted','enumerate','zip','map','filter','isinstance','type','super','min','max','sum','abs','any','all','reversed','iter','next','hash','id','open','input'];
  const biRe = new RegExp('\\b(' + builtins.join('|') + ')(?=\\()', 'g');
  s = s.replace(biRe, '<span class="code-builtin">$1</span>');
  // Function definitions
  s = s.replace(/(?<=def\s+)(\w+)/g, '<span class="code-func">$1</span>');
  // Numbers
  s = s.replace(/\b(\d+\.?\d*)\b/g, '<span class="code-number">$1</span>');
  return s;
}

// ─── Render ─────────────────────────────────────────────────────────────────
const algoListEl = document.getElementById('algoList');
const controlsEl = document.getElementById('controls');
let allExpanded = false;

if (isComingSoon) {

  algoListEl.innerHTML = `
    <div class="coming-soon-container">
      <div class="coming-soon-msg">${comingSoonMessage}</div>
      <div class="coming-soon-msg-zh">${comingSoonMessageZh}</div>
      <ul class="planned-list">
        ${plannedAlgorithms.map(a => `<li><span class="planned-check"></span>${a}</li>`).join('')}
      </ul>
    </div>`;
} else {
  // Hero stats
  const heroStatsEl = document.getElementById('heroStats');
  const difficulties = [...new Set(algorithms.map(a => a.difficulty))];
  heroStatsEl.innerHTML = `
    <span class="badge badge--time">${algorithms.length} algorithms</span>

  algorithms.forEach((algo, i) => {

    card.className = 'algo-card fade-in';
    card.dataset.id = algo.id;
    card.dataset.difficulty = algo.difficulty;
    card.dataset.complexityRank = algo.complexityRank;
    card.dataset.defaultOrder = algo.defaultOrder;
    card.id = algo.id;

    const worstTime = algo.complexity?.time?.worst || '';
    const codeHtml = highlightPython(algo.implementation || '');

    const whenToUseHtml = (algo.whenToUse || []).map(w => `<li>${w}</li>`).join('');

    const complexityHtml = `
      <table class="complexity-table">

              ${dd.vsAlternatives ? `<div class="detail-section"><h3>Comparison with Alternatives</h3><div class="vs-box">${dd.vsAlternatives}</div></div>` : ''}

// ─── Expand / Collapse ────────────────────────────────────────────────────
function toggleL1(headerEl) {
  const card = headerEl.closest('.algo-card');
  const detail = card.querySelector('.algo-detail');
  const isOpen = card.classList.contains('expanded-l1');

  if (isOpen) {
    if (card.classList.contains('expanded-l2')) {
      const btn = card.querySelector('.deep-dive-btn');
      if (btn) toggleL2(btn);
    }
    detail.style.maxHeight = '0';
    card.classList.remove('expanded-l1');
  } else {
    detail.style.maxHeight = detail.scrollHeight + 'px';
    card.classList.add('expanded-l1');
  }
}

function toggleL2(btnEl) {
  const card = btnEl.closest('.algo-card');
  const deepDive = card.querySelector('.algo-deep-dive');
  const detail = card.querySelector('.algo-detail');
  const isOpen = card.classList.contains('expanded-l2');

  if (isOpen) {
    deepDive.style.maxHeight = '0';
    card.classList.remove('expanded-l2');
    btnEl.textContent = 'Deep Dive ▾';
  } else {
    deepDive.style.maxHeight = deepDive.scrollHeight + 'px';
    card.classList.add('expanded-l2');
    btnEl.textContent = 'Deep Dive ▴';
    // Recalculate parent
    setTimeout(() => { detail.style.maxHeight = detail.scrollHeight + 'px'; }, 10);
  }
}

function toggleExpandAll() {
  const btn = document.getElementById('expandAllBtn');
  const cards = document.querySelectorAll('.algo-card');
  allExpanded = !allExpanded;

  cards.forEach(card => {
    if (card.style.display === 'none') return;
    const detail = card.querySelector('.algo-detail');
    if (allExpanded) {
      detail.style.maxHeight = detail.scrollHeight + 'px';
      card.classList.add('expanded-l1');
    } else {
      if (card.classList.contains('expanded-l2')) {
        const ddBtn = card.querySelector('.deep-dive-btn');
        if (ddBtn) toggleL2(ddBtn);
      }
      detail.style.maxHeight = '0';
      card.classList.remove('expanded-l1');
    }
  });
  btn.textContent = allExpanded ? 'Collapse All' : 'Expand All';
}

// ─── Sort / Filter ────────────────────────────────────────────────────────
function sortBy(mode, btnEl) {
  document.querySelectorAll('[data-sort]').forEach(b => b.classList.remove('active'));
  btnEl.classList.add('active');

  const list = document.getElementById('algoList');
  const cards = Array.from(list.querySelectorAll('.algo-card'));
  const diffOrder = { easy: 0, medium: 1, hard: 2 };

  cards.sort((a, b) => {
    if (mode === 'difficulty') return (diffOrder[a.dataset.difficulty] || 0) - (diffOrder[b.dataset.difficulty] || 0);
    if (mode === 'complexity') return parseInt(a.dataset.complexityRank) - parseInt(b.dataset.complexityRank);
    return parseInt(a.dataset.defaultOrder) - parseInt(b.dataset.defaultOrder);
  });
  cards.forEach(c => list.appendChild(c));
}

function filterBy(difficulty, btnEl) {
  document.querySelectorAll('[data-filter]').forEach(b => b.classList.remove('active'));
  btnEl.classList.add('active');

  document.querySelectorAll('.algo-card').forEach(card => {
    card.style.display = (difficulty === 'all' || card.dataset.difficulty === difficulty) ? '' : 'none';
  });
}

// ─── Progress Bar ─────────────────────────────────────────────────────────
window.addEventListener('scroll', () => {
  const h = document.documentElement;
  const pct = (h.scrollTop / (h.scrollHeight - h.clientHeight)) * 100;
  document.getElementById('progressBar').style.width = Math.min(pct, 100) + '%';
});

// ─── Fade-in Observer ─────────────────────────────────────────────────────
const observer = new IntersectionObserver(entries => {
  entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); } });
}, { threshold: 0.05 });
document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));

// ─── URL Hash Support ─────────────────────────────────────────────────────
function handleHash() {
  const hash = window.location.hash.slice(1);
  if (!hash) return;
  const card = document.getElementById(hash);
  if (!card) return;
  setTimeout(() => {
    card.scrollIntoView({ behavior: 'smooth', block: 'center' });
    const header = card.querySelector('.algo-header');
    if (header && !card.classList.contains('expanded-l1')) toggleL1(header);
  }, 300);
}
window.addEventListener('hashchange', handleHash);
handleHash();
