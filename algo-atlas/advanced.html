<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced · 高级专题 | Algo Atlas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f1117;
  --card: #1a1d27;
  --card-hover: #222636;
  --accent: #6c63ff;
  --accent2: #ff6b6b;
  --accent3: #4ecdc4;
  --accent4: #ffe66d;
  --text: #e8e8f0;
  --text-dim: #8888a0;
  --border: #2a2d3a;
  --glow: rgba(var(--accent-rgb), 0.15);
  --font-sans: 'Noto Sans SC', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  --radius: 14px;
  --success: #34d399;
}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
}
::selection { background: var(--accent); color: #fff; }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ─── Progress Bar ─── */
#progressBar {
  position: fixed;
  top: 0;
  left: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--accent), var(--accent3));
  width: 0%;
  z-index: 100;
  transition: width 0.1s linear;
}

/* ─── Hero (compact) ─── */
.hero {
  padding: 6rem 2rem 3rem;
  text-align: center;
  position: relative;
}
.hero-icon {
  font-size: 4rem;
  margin-bottom: 1rem;
  animation: float 3s ease-in-out infinite;
  filter: drop-shadow(0 0 20px var(--glow));
}
.hero h1 {
  font-size: 2.5rem;
  font-weight: 700;
  background: linear-gradient(135deg, var(--accent), var(--accent3));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 0.2rem;
}
.hero-zh {
  font-size: 1.2rem;
  color: var(--text-dim);
  font-weight: 300;
  margin-bottom: 0.8rem;
}
.hero-desc {
  font-size: 1rem;
  color: var(--accent3);
  font-family: var(--font-mono);
  margin-bottom: 1.5rem;
}
.hero-stats {
  display: flex;
  justify-content: center;
  gap: 0.75rem;
  flex-wrap: wrap;
  margin-bottom: 1.5rem;
}
/* ── Fixed Nav ── */
.fixed-nav { position: fixed; top: 0; left: 0; right: 0; z-index: 9998; padding: 0.6rem 1.5rem; font-size: 0.8rem; display: flex; align-items: center; gap: 0.4rem; background: rgba(var(--bg-rgb),0.85); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border-bottom: 1px solid transparent; transition: border-color 0.3s; }
.fixed-nav.scrolled { border-bottom-color: var(--border); }
.fixed-nav a { color: var(--text-dim); text-decoration: none; transition: color 0.3s; }
.fixed-nav a:hover { color: var(--accent); }
.fixed-nav .sep { color: var(--text-dim); margin: 0 0.15rem; }

/* ─── Container ─── */
.container {
  max-width: 900px;
  margin: 0 auto;
  padding: 0 2rem 4rem;
}

/* ─── Controls ─── */
.controls {
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 1rem;
  margin-bottom: 1.5rem;
  padding: 1rem 0;
  border-bottom: 1px solid var(--border);
}
.control-group {
  display: flex;
  align-items: center;
  gap: 0.5rem;
}
.control-label {
  font-size: 0.75rem;
  color: var(--text-dim);
  font-family: var(--font-mono);
  text-transform: uppercase;
  letter-spacing: 1px;
}
.ctrl-btn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-dim);
  font-family: var(--font-mono);
  font-size: 0.75rem;
  padding: 0.3rem 0.7rem;
  border-radius: 0.5rem;
  cursor: pointer;
  transition: all 0.2s ease;
}
.ctrl-btn:hover {
  border-color: var(--accent);
  color: var(--text);
}
.ctrl-btn.active {
  background: rgba(var(--accent-rgb), 0.15);
  border-color: var(--accent);
  color: var(--accent);
}
.expand-all-btn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-dim);
  font-family: var(--font-mono);
  font-size: 0.75rem;
  padding: 0.3rem 0.7rem;
  border-radius: 0.5rem;
  cursor: pointer;
  transition: all 0.2s ease;
}
.expand-all-btn:hover {
  border-color: var(--accent3);
  color: var(--accent3);
}

/* ─── Badge System ─── */
.badge {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  padding: 0.15rem 0.55rem;
  border-radius: 1rem;
  letter-spacing: 0.5px;
  white-space: nowrap;
}
.badge--time {
  background: rgba(var(--accent-rgb), 0.15);
  color: var(--accent);
  border: 1px solid rgba(var(--accent-rgb), 0.3);
}
.badge--space {
  background: rgba(var(--accent3-rgb), 0.1);
  color: var(--accent3);
  border: 1px solid rgba(var(--accent3-rgb), 0.2);
}
.badge--easy {
  background: rgba(var(--accent3-rgb), 0.15);
  color: var(--accent3);
  border: 1px solid rgba(var(--accent3-rgb), 0.3);
}
.badge--medium {
  background: rgba(var(--accent4-rgb), 0.15);
  color: var(--accent4);
  border: 1px solid rgba(var(--accent4-rgb), 0.3);
}
.badge--hard {
  background: rgba(var(--accent2-rgb), 0.15);
  color: var(--accent2);
  border: 1px solid rgba(var(--accent2-rgb), 0.3);
}
.badge--source {
  background: rgba(var(--text-dim-rgb), 0.1);
  color: var(--text-dim);
  border: 1px solid rgba(var(--text-dim-rgb), 0.2);
}

/* ─── Algorithm Card ─── */
.algo-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 0.75rem;
  transition: border-color 0.3s ease, box-shadow 0.3s ease;
  overflow: hidden;
}
.algo-card:hover {
  border-color: rgba(var(--accent-rgb), 0.3);
}
.algo-card.expanded-l1 {
  border-color: var(--accent);
  box-shadow: 0 4px 20px var(--glow);
}

/* ─── Algo Header (Level 0 — always visible) ─── */
.algo-header {
  display: flex;
  align-items: center;
  gap: 1rem;
  padding: 1rem 1.25rem;
  cursor: pointer;
  user-select: none;
  transition: background 0.2s ease;
}
.algo-header:hover {
  background: var(--card-hover);
}
.algo-title-group {
  flex-shrink: 0;
  min-width: 0;
}
.algo-name {
  font-size: 1rem;
  font-weight: 700;
}
.algo-name-zh {
  font-size: 0.8rem;
  color: var(--text-dim);
}
.algo-oneliner {
  flex: 1;
  font-size: 0.8rem;
  color: var(--text-dim);
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.algo-badges {
  display: flex;
  gap: 0.4rem;
  flex-shrink: 0;
}
.algo-chevron {
  font-size: 1rem;
  color: var(--text-dim);
  transition: transform 0.3s ease;
  flex-shrink: 0;
}
.algo-card.expanded-l1 .algo-chevron {
  transform: rotate(180deg);
}

/* ─── Algo Detail (Level 1 — expand on click) ─── */
.algo-detail {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.5s cubic-bezier(0.4, 0, 0.2, 1);
}
.algo-detail-inner {
  padding: 0 1.25rem 1.25rem;
}
.detail-section {
  margin-bottom: 1.25rem;
}
.detail-section:last-child { margin-bottom: 0; }
.detail-section h3 {
  font-size: 0.85rem;
  font-weight: 700;
  color: var(--accent3);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 0.5rem;
  font-family: var(--font-mono);
}
.detail-section p {
  font-size: 0.9rem;
  line-height: 1.7;
  color: var(--text);
}
.detail-section ul {
  list-style: none;
  padding: 0;
}
.detail-section ul li {
  font-size: 0.85rem;
  color: var(--text);
  padding: 0.25rem 0;
  padding-left: 1.2rem;
  position: relative;
}
.detail-section ul li::before {
  content: '›';
  position: absolute;
  left: 0;
  color: var(--accent);
  font-weight: 700;
}
.insight-box {
  background: rgba(var(--accent-rgb), 0.08);
  border-left: 3px solid var(--accent);
  padding: 0.8rem 1rem;
  border-radius: 0 8px 8px 0;
  font-size: 0.9rem;
  line-height: 1.6;
}
.insight-box-zh {
  color: var(--text-dim);
  font-size: 0.8rem;
  margin-top: 0.3rem;
}

/* ─── Code Block ─── */
.code-block {
  background: var(--code-bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1.25rem;
  font-family: var(--font-mono);
  font-size: 0.8rem;
  color: var(--text-dim);
  overflow-x: auto;
  white-space: pre;
  line-height: 1.7;
  position: relative;
}
.code-block::before {
  content: 'Python';
  position: absolute;
  top: 8px;
  right: 12px;
  font-size: 0.65rem;
  color: var(--text-dim);
  letter-spacing: 1.5px;
  text-transform: uppercase;
}
.code-keyword { color: var(--accent); }
.code-string { color: var(--accent3); }
.code-comment { color: #5a5a7a; font-style: italic; }
.code-number { color: var(--accent4); }
.code-func { color: var(--accent2); }
.code-builtin { color: #c792ea; }

/* ─── Complexity Table ─── */
.complexity-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.8rem;
  font-family: var(--font-mono);
}
.complexity-table th {
  color: var(--text-dim);
  font-weight: 400;
  text-align: left;
  padding: 0.4rem 0.8rem;
  border-bottom: 1px solid var(--border);
  text-transform: uppercase;
  letter-spacing: 1px;
  font-size: 0.7rem;
}
.complexity-table td {
  padding: 0.4rem 0.8rem;
  border-bottom: 1px solid rgba(var(--border-rgb), 0.5);
}
.complexity-table tr:last-child td { border-bottom: none; }

/* ─── Deep Dive Button ─── */
.deep-dive-btn {
  display: block;
  width: 100%;
  background: rgba(var(--accent-rgb), 0.06);
  border: 1px dashed rgba(var(--accent-rgb), 0.3);
  color: var(--accent);
  font-family: var(--font-mono);
  font-size: 0.8rem;
  padding: 0.6rem;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.2s ease;
  margin-top: 1rem;
}
.deep-dive-btn:hover {
  background: rgba(var(--accent-rgb), 0.12);
  border-color: var(--accent);
}

/* ─── Deep Dive (Level 2) ─── */
.algo-deep-dive {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.5s cubic-bezier(0.4, 0, 0.2, 1);
}
.algo-deep-dive-inner {
  padding-top: 1rem;
}
.variation-list, .related-list, .app-list {
  display: grid;
  gap: 0.4rem;
}
.variation-item, .related-item, .app-item {
  font-size: 0.85rem;
  padding: 0.4rem 0.8rem;
  background: rgba(var(--accent-rgb), 0.04);
  border-radius: 6px;
  border-left: 2px solid var(--accent);
}
.related-item { border-left-color: var(--accent3); }
.app-item { border-left-color: var(--accent4); }
.vs-box {
  background: rgba(var(--accent2-rgb), 0.06);
  border-left: 3px solid var(--accent2);
  padding: 0.8rem 1rem;
  border-radius: 0 8px 8px 0;
  font-size: 0.85rem;
  line-height: 1.6;
}
.walkthrough-block {
  background: var(--code-bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem;
  font-family: var(--font-mono);
  font-size: 0.78rem;
  color: var(--text-dim);
  white-space: pre-wrap;
  line-height: 1.6;
}

/* ─── Navigation ─── */
.nav-footer {
  display: flex;
  justify-content: space-between;
  align-items: stretch;
  gap: 1rem;
  margin-top: 3rem;
  padding-top: 2rem;
  border-top: 1px solid var(--border);
}
.nav-btn {
  display: flex;
  flex-direction: column;
  gap: 0.2rem;
  text-decoration: none;
  color: var(--text);
  padding: 0.8rem 1.2rem;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  transition: all 0.3s ease;
  min-width: 0;
}
.nav-btn:hover {
  border-color: var(--accent);
  box-shadow: 0 4px 15px var(--glow);
}
.nav-prev { align-items: flex-start; }
.nav-next { align-items: flex-end; }
.nav-label {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  color: var(--text-dim);
  letter-spacing: 1px;
}
.nav-title {
  font-size: 0.9rem;
  font-weight: 500;
}
.nav-placeholder { flex: 1; }

/* ─── Coming Soon (category page) ─── */
.coming-soon-container {
  text-align: center;
  padding: 4rem 2rem;
}
.coming-soon-msg {
  font-size: 1.1rem;
  color: var(--text-dim);
  margin-bottom: 1rem;
}
.coming-soon-msg-zh {
  font-size: 0.95rem;
  color: var(--text-dim);
  margin-bottom: 2rem;
}
.planned-list {
  list-style: none;
  padding: 0;
  max-width: 400px;
  margin: 0 auto;
}
.planned-list li {
  padding: 0.5rem 0;
  font-size: 0.9rem;
  color: var(--text-dim);
  border-bottom: 1px dashed var(--border);
  display: flex;
  align-items: center;
  gap: 0.5rem;
}
.planned-check {
  width: 16px;
  height: 16px;
  border: 1.5px solid var(--border);
  border-radius: 4px;
  flex-shrink: 0;
}

/* ─── Footer ─── */
.footer {
  text-align: center;
  padding: 3rem 2rem;
  color: var(--text-dim);
  font-size: 0.8rem;
  border-top: 1px solid var(--border);
}

/* ─── Fade-in ─── */
.fade-in {
  opacity: 0;
  transform: translateY(20px);
  transition: opacity 0.6s ease, transform 0.6s ease;
}
.fade-in.visible {
  opacity: 1;
  transform: translateY(0);
}

@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

/* ─── Responsive ─── */
@media (max-width: 768px) {
  .hero { padding: 4rem 1.5rem 2rem; }
  .hero h1 { font-size: 1.8rem; }
  .algo-header { flex-wrap: wrap; gap: 0.5rem; }
  .algo-oneliner { display: none; }
  .controls { flex-direction: column; align-items: flex-start; }
  .nav-footer { flex-direction: column; }
}
/* ── RGB triplet defaults (dark) ── */
:root {
  --bg-rgb: 15,17,23;
  --card-rgb: 26,29,39;
  --card-hover-rgb: 34,38,54;
  --text-rgb: 232,232,240;
  --text-dim-rgb: 136,136,160;
  --border-rgb: 42,45,58;
  --accent-rgb: 108,99,255;
  --accent2-rgb: 255,107,107;
  --accent3-rgb: 78,205,196;
  --accent4-rgb: 255,230,109;
  --bg-hero: #13151f;
  --code-bg: #12141c;
  --code-border: #1e2030;
}

/* ── Light theme overrides ── */
[data-theme="light"] {
  --bg: #f5f5f7;
  --card: #ffffff;
  --card-hover: #f0f0f5;
  --accent: #5b52e6;
  --accent2: #e55d5d;
  --accent3: #3cb8b0;
  --accent4: #c49800;
  --text: #1a1a2e;
  --text-dim: #6e6e82;
  --border: #dcdce5;
  --glow: rgba(91,82,230,0.10);
  --success: #059669;
  --warning: #b45309;
  --danger: #dc2626;

  --bg-rgb: 245,245,247;
  --card-rgb: 255,255,255;
  --card-hover-rgb: 240,240,245;
  --text-rgb: 26,26,46;
  --text-dim-rgb: 110,110,130;
  --border-rgb: 220,220,229;
  --accent-rgb: 91,82,230;
  --accent2-rgb: 229,93,93;
  --accent3-rgb: 60,184,176;
  --accent4-rgb: 196,152,0;
  --bg-hero: #e8e8ed;
  --code-bg: #f0f0f5;
  --code-border: #dcdce5;
}

</style>
</head>

<nav class="fixed-nav" id="fixedNav">

<button class="theme-toggle" id="themeToggle" aria-label="Toggle theme"><span class="theme-toggle-icon" id="themeIcon"></span></button>
</nav>

<section class="hero">
  <div class="hero-icon">🔬</div>
  <h1>Advanced</h1>
  <div class="hero-zh">高级专题</div>

</section>

<div class="container">

      <span class="control-label">Sort</span>
      <button class="ctrl-btn active" data-sort="default" onclick="sortBy('default', this)">Default</button>
      <button class="ctrl-btn" data-sort="difficulty" onclick="sortBy('difficulty', this)">Difficulty</button>
      <button class="ctrl-btn" data-sort="complexity" onclick="sortBy('complexity', this)">Complexity</button>
    </div>
    <div class="control-group">

      <button class="ctrl-btn active" data-filter="all" onclick="filterBy('all', this)">All</button>

<script>
const categoryMeta = {
  "id": "advanced",
  "name": "Advanced",
  "nameZh": "高级专题",
  "icon": "🔬",
  "description": "Union-Find, regex engines, compression, and more",
  "descriptionZh": "并查集、正则引擎、压缩等高级话题",
  "dataFile": "advanced.json",
  "outputFile": "advanced.html",
  "status": "active",
  "order": 11,
  "algoCount": 4
};

const algorithms = [
  {
    "id": "union-find",
    "name": "Union-Find (Weighted Quick Union + Path Compression)",
    "nameZh": "并查集（加权快速合并 + 路径压缩）",
    "difficulty": "medium",
    "source": "algs4",
    "sourceChapter": "1.5",
    "oneLiner": "Maintain dynamic connectivity with near-constant amortized operations",
    "oneLinerZh": "以接近常数的均摊时间维护动态连通性",
    "complexity": {
      "time": {
        "best": "O(1)",
        "average": "O(α(N))",
        "worst": "O(α(N))"
      },
      "space": "O(N)"
    },
    "problemDefinition": "Given N objects, support two operations: union(p, q) connects objects p and q, and find(p, q) determines whether p and q are in the same connected component. Process M operations on N objects efficiently.",
    "problemDefinitionZh": "给定 N 个对象，支持两种操作：union(p, q) 连接对象 p 和 q，find(p, q) 判断 p 和 q 是否在同一连通分量中。高效处理 N 个对象上的 M 次操作。",
    "whenToUse": [
      "Dynamic connectivity — are two nodes connected?",
      "Kruskal's MST algorithm — cycle detection during edge selection",
      "Percolation and grid connectivity problems",
      "Equivalence class merging (e.g., accounts merge, friend circles)"
    ],
    "keyInsight": "Two optimizations make the naive tree-based approach nearly optimal: (1) weighted union always attaches the smaller tree under the larger one, guaranteeing tree height <= lg N; (2) path compression flattens the tree during find by pointing every examined node directly to the root. Together they yield amortized O(alpha(N)) per operation, where alpha is the inverse Ackermann function — effectively constant for any practical N.",
    "keyInsightZh": "两项优化使朴素树结构趋近最优：(1) 加权合并总是将较小的树挂在较大树下，保证树高 <= lg N；(2) 路径压缩在 find 过程中将每个访问的节点直接指向根。二者结合得到均摊 O(α(N)) 的操作复杂度，其中 α 是反阿克曼函数——对任何实际 N 都可视为常数。",
    "implementation": "class UnionFind:\n    \"\"\"Weighted Quick Union with Path Compression.\"\"\"\n\n    def __init__(self, n: int):\n        self.parent = list(range(n))\n        self.size = [1] * n\n        self.count = n  # number of components\n\n    def find(self, p: int) -> int:\n        \"\"\"Follow parent pointers to root, compressing path.\"\"\"\n        root = p\n        while root != self.parent[root]:\n            root = self.parent[root]\n        # path compression: point every node on path to root\n        while p != root:\n            next_p = self.parent[p]\n            self.parent[p] = root\n            p = next_p\n        return root\n\n    def union(self, p: int, q: int) -> None:\n        \"\"\"Merge components containing p and q.\"\"\"\n        root_p = self.find(p)\n        root_q = self.find(q)\n        if root_p == root_q:\n            return\n        # weighted: attach smaller tree under larger tree\n        if self.size[root_p] < self.size[root_q]:\n            self.parent[root_p] = root_q\n            self.size[root_q] += self.size[root_p]\n        else:\n            self.parent[root_q] = root_p\n            self.size[root_p] += self.size[root_q]\n        self.count -= 1\n\n    def connected(self, p: int, q: int) -> bool:\n        return self.find(p) == self.find(q)",
    "deepDive": {
      "explanation": "Union-Find represents each connected component as a tree. Each element stores a pointer to its parent; a root points to itself. find(p) chases parent pointers to the root. union(p, q) links one root under the other. Without optimizations, trees can degenerate to linked lists (height N). Weighted union keeps trees balanced by always making the smaller tree a subtree of the larger one — this bounds height to lg N. Path compression goes further: during find, every node on the path is re-parented directly to the root, flattening the tree for future queries. The combination yields amortized alpha(N) per operation, proven by Tarjan (1975). alpha(N) <= 4 for N up to 2^(2^(2^(2^16))), so it is effectively constant.",

    "implementation": "from collections import defaultdict, deque\n\n\nclass NFA:\n    \"\"\"NFA-based regex matching (supports . * | and parentheses).\"\"\"\n\n    def __init__(self, pattern: str):\n        self.pattern = pattern\n        self.m = len(pattern)\n        # epsilon-transition digraph\n        self.graph = defaultdict(list)  # state -> [state]\n        self._build()\n\n    def _build(self):\n        \"\"\"Build epsilon-transition graph using Thompson's construction.\"\"\"\n        ops = []  # stack for ( and |\n        m = self.m\n        for i in range(m):\n            lp = i\n            if self.pattern[i] == '(' or self.pattern[i] == '|':\n                ops.append(i)\n            elif self.pattern[i] == ')':\n                ors = []\n                while ops and self.pattern[ops[-1]] == '|':\n                    ors.append(ops.pop())\n                lp = ops.pop()  # matching '('\n                for or_idx in ors:\n                    # epsilon from '(' to char after '|'\n                    self.graph[lp].append(or_idx + 1)\n                    # epsilon from '|' to ')'\n                    self.graph[or_idx].append(i)\n            # closure: look-ahead for *\n            if i < m - 1 and self.pattern[i + 1] == '*':\n                self.graph[lp].append(i + 1)\n                self.graph[i + 1].append(lp)\n            if self.pattern[i] in ('(', ')', '*'):\n                self.graph[i].append(i + 1)\n\n    def _reachable(self, states: set) -> set:\n        \"\"\"Find all states reachable via epsilon transitions (BFS).\"\"\"\n        visited = set(states)\n        queue = deque(states)\n        while queue:\n            s = queue.popleft()\n            for ns in self.graph[s]:\n                if ns not in visited:\n                    visited.add(ns)\n                    queue.append(ns)\n        return visited\n\n    def matches(self, text: str) -> bool:\n        \"\"\"Return True if text matches the pattern entirely.\"\"\"\n        # start: all states reachable from state 0 via epsilon\n        states = self._reachable({0})\n        for ch in text:\n            # match transitions\n            match_states = set()\n            for s in states:\n                if s < self.m:\n                    if self.pattern[s] == ch or self.pattern[s] == '.':\n                        match_states.add(s + 1)\n            # follow epsilon transitions\n            states = self._reachable(match_states)\n        return self.m in states\n\n\ndef regex_match(pattern: str, text: str) -> bool:\n    \"\"\"Check if text matches the given regex pattern.\"\"\"\n    nfa = NFA(pattern)\n    return nfa.matches(text)",

    "keyInsightZh": "霍夫曼贪心算法：反复将频率最低的两个节点合并为一个新内部节点，其频率为两者之和。这从底向上构建一棵二叉字典树。高频字符靠近根（短编码），低频字符在远离根的叶子（长编码）。Shannon 证明了没有前缀码能做得更好——霍夫曼编码实现了逐符号编码的最优平均码长。",
    "implementation": "import heapq\nfrom collections import Counter\n\n\nclass HuffmanNode:\n    \"\"\"A node in the Huffman trie.\"\"\"\n    def __init__(self, char, freq, left=None, right=None):\n        self.char = char\n        self.freq = freq\n        self.left = left\n        self.right = right\n\n    def is_leaf(self):\n        return self.left is None and self.right is None\n\n    def __lt__(self, other):\n        return self.freq < other.freq\n\n\ndef build_trie(freq: dict) -> HuffmanNode:\n    \"\"\"Build Huffman trie from character frequencies.\"\"\"\n    pq = [HuffmanNode(ch, f) for ch, f in freq.items()]\n    heapq.heapify(pq)\n    while len(pq) > 1:\n        left = heapq.heappop(pq)\n        right = heapq.heappop(pq)\n        parent = HuffmanNode(None, left.freq + right.freq, left, right)\n        heapq.heappush(pq, parent)\n    return pq[0]\n\n\ndef build_code_table(node: HuffmanNode, prefix: str = '',\n                     table: dict = None) -> dict:\n    \"\"\"Traverse trie to build code table mapping char -> bit string.\"\"\"\n    if table is None:\n        table = {}\n    if node.is_leaf():\n        table[node.char] = prefix if prefix else '0'\n        return table\n    build_code_table(node.left, prefix + '0', table)\n    build_code_table(node.right, prefix + '1', table)\n    return table\n\n\ndef huffman_compress(text: str) -> tuple:\n    \"\"\"Compress text using Huffman coding.\n    Returns (encoded_bits: str, trie_root: HuffmanNode).\n    \"\"\"\n    freq = Counter(text)\n    root = build_trie(freq)\n    code_table = build_code_table(root)\n    encoded = ''.join(code_table[ch] for ch in text)\n    return encoded, root\n\n\ndef huffman_expand(bits: str, root: HuffmanNode) -> str:\n    \"\"\"Expand Huffman-encoded bits using the trie.\"\"\"\n    result = []\n    node = root\n    for bit in bits:\n        node = node.left if bit == '0' else node.right\n        if node.is_leaf():\n            result.append(node.char)\n            node = root\n    return ''.join(result)",
    "deepDive": {
      "explanation": "Huffman coding exploits non-uniform character frequencies. The algorithm: (1) count frequency of each character in the input, (2) create a leaf node for each character, (3) insert all nodes into a min-priority queue keyed by frequency, (4) while more than one node remains: extract the two minimum-frequency nodes, create a new internal node with these as children and frequency = sum, insert back, (5) the last remaining node is the root of the Huffman trie. To encode: traverse trie from root to each leaf, going left = 0, right = 1, building a code table. To decode: walk the trie bit-by-bit from the root; when a leaf is reached, output its character and restart from root. The prefix-free property is guaranteed by the trie structure: characters are only at leaves.",

    "implementation": "def lzw_compress(text: str, code_width: int = 12) -> list:\n    \"\"\"Compress text using LZW. Returns list of integer codewords.\n    code_width: bit width of output codes (max 2^code_width entries).\n    \"\"\"\n    max_codes = 1 << code_width  # e.g., 4096 for 12-bit\n    # initialize dictionary with single-char entries\n    dictionary = {chr(i): i for i in range(256)}\n    next_code = 256\n    result = []\n    w = ''\n    for ch in text:\n        wc = w + ch\n        if wc in dictionary:\n            w = wc\n        else:\n            result.append(dictionary[w])\n            if next_code < max_codes:\n                dictionary[wc] = next_code\n                next_code += 1\n            w = ch\n    if w:\n        result.append(dictionary[w])\n    return result\n\n\ndef lzw_expand(codes: list, code_width: int = 12) -> str:\n    \"\"\"Expand LZW-compressed codewords back to original text.\"\"\"\n    max_codes = 1 << code_width\n    # initialize dictionary: code -> string\n    dictionary = {i: chr(i) for i in range(256)}\n    next_code = 256\n    result = []\n    w = chr(codes[0])\n    result.append(w)\n    for code in codes[1:]:\n        if code in dictionary:\n            entry = dictionary[code]\n        elif code == next_code:\n            # special case: codeword not yet in decoder's dictionary\n            entry = w + w[0]\n        else:\n            raise ValueError(f'Bad compressed code: {code}')\n        result.append(entry)\n        if next_code < max_codes:\n            dictionary[next_code] = w + entry[0]\n            next_code += 1\n        w = entry\n    return ''.join(result)",

      "walkthrough": "Text: ABABABABAB (N=10)\n\nCompress:\nDict starts with A=65, B=66, ...\nw='', ch='A': wc='A' in dict -> w='A'\nch='B': wc='AB' not in dict -> output 65(A), add AB=256, w='B'\nch='A': wc='BA' not in dict -> output 66(B), add BA=257, w='A'\nch='B': wc='AB' in dict -> w='AB'\nch='A': wc='ABA' not in dict -> output 256(AB), add ABA=258, w='A'\nch='B': wc='AB' in dict -> w='AB'\nch='A': wc='ABA' in dict -> w='ABA'\nch='B': wc='ABAB' not in dict -> output 258(ABA), add ABAB=259, w='B'\nEnd: output 66(B)\n\nResult: [65, 66, 256, 258, 66] = 5 codes for 10 chars\n\nExpand reconstructs: A B AB ABA B = ABABABABAB",

        "Variable-width LZW — start with 9-bit codes, grow to 12+ as dictionary fills",
        "LZW with dictionary reset — clear dictionary when it fills up and rebuild"
      ],
      "relatedProblems": [
        "String Compression (LeetCode 443) — run-length encoding variant",
        "Encode and Decode Strings (LeetCode 271)",
        "Design a compression algorithm — system design interview topic",
        "Longest duplicate substring (LeetCode 1044) — related dictionary concept"
      ],
      "realWorldApps": [
        "GIF image format — uses LZW for lossless image compression",
        "Unix compress utility — one of the earliest LZW implementations",
        "TIFF image format — optional LZW compression for raster images",
        "PDF 1.0-1.2 — used LZW compression for content streams"
      ],
      "vsAlternatives": "Huffman coding is optimal for character-by-character encoding but does not exploit repeated substrings. LZW learns patterns adaptively in a single pass, making it suitable for streaming. LZ77 (used in gzip/DEFLATE) typically compresses better than LZW because it uses a sliding window and can reference any previous substring, not just dictionary entries. Modern algorithms like zstd and Brotli combine LZ77-style matching with entropy coding (ANS/Huffman) and achieve much higher compression ratios. LZW's main advantage is implementation simplicity and the fact that the decoder needs no side information — the dictionary is rebuilt implicitly."
    },
    "complexityRank": 6,
    "defaultOrder": 3
  }
];

const isComingSoon = false;

const plannedAlgorithms = [];

const comingSoonMessage = "";
const comingSoonMessageZh = "";

// ─── Python Syntax Highlighting (lightweight) ─────────────────────────────
function highlightPython(code) {
  // Escape HTML
  let s = code.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  // Comments
  s = s.replace(/(#.*?)$/gm, '<span class="code-comment">$1</span>');
  // Triple-quoted strings
  s = s.replace(/("""[\s\S]*?"""|'''[\s\S]*?''')/g, '<span class="code-string">$1</span>');
  // Strings
  s = s.replace(/("(?:[^"\\]|\\.)*"|'(?:[^'\\]|\\.)*')/g, '<span class="code-string">$1</span>');
  // Keywords
  const kws = ['def','class','return','if','elif','else','for','while','in','not','and','or','is','None','True','False','import','from','as','with','try','except','finally','raise','yield','lambda','pass','break','continue','assert','global','nonlocal'];
  const kwRe = new RegExp('\\b(' + kws.join('|') + ')\\b', 'g');
  s = s.replace(kwRe, '<span class="code-keyword">$1</span>');
  // Built-in functions
  const builtins = ['len','range','print','int','float','str','list','dict','set','tuple','sorted','enumerate','zip','map','filter','isinstance','type','super','min','max','sum','abs','any','all','reversed','iter','next','hash','id','open','input'];
  const biRe = new RegExp('\\b(' + builtins.join('|') + ')(?=\\()', 'g');
  s = s.replace(biRe, '<span class="code-builtin">$1</span>');
  // Function definitions
  s = s.replace(/(?<=def\s+)(\w+)/g, '<span class="code-func">$1</span>');
  // Numbers
  s = s.replace(/\b(\d+\.?\d*)\b/g, '<span class="code-number">$1</span>');
  return s;
}

// ─── Render ─────────────────────────────────────────────────────────────────
const algoListEl = document.getElementById('algoList');
const controlsEl = document.getElementById('controls');
let allExpanded = false;

if (isComingSoon) {
  controlsEl.style.display = 'none';
  algoListEl.innerHTML = `
    <div class="coming-soon-container">
      <div class="coming-soon-msg">${comingSoonMessage}</div>
      <div class="coming-soon-msg-zh">${comingSoonMessageZh}</div>
      <ul class="planned-list">
        ${plannedAlgorithms.map(a => `<li><span class="planned-check"></span>${a}</li>`).join('')}
      </ul>
    </div>`;
} else {
  // Hero stats
  const heroStatsEl = document.getElementById('heroStats');
  const difficulties = [...new Set(algorithms.map(a => a.difficulty))];
  heroStatsEl.innerHTML = `
    <span class="badge badge--time">${algorithms.length} algorithms</span>
    ${difficulties.map(d => `<span class="badge badge--${d}">${d}</span>`).join('')}`;

  // Render algorithm cards
  algorithms.forEach((algo, i) => {
    const card = document.createElement('div');
    card.className = 'algo-card fade-in';
    card.dataset.id = algo.id;
    card.dataset.difficulty = algo.difficulty;
    card.dataset.complexityRank = algo.complexityRank;
    card.dataset.defaultOrder = algo.defaultOrder;
    card.id = algo.id;

    const worstTime = algo.complexity?.time?.worst || '';
    const codeHtml = highlightPython(algo.implementation || '');

    const whenToUseHtml = (algo.whenToUse || []).map(w => `<li>${w}</li>`).join('');

    // Complexity table
    const tc = algo.complexity?.time || {};
    const sc = algo.complexity?.space || '';
    const complexityHtml = `
      <table class="complexity-table">
        <tr><th>Metric</th><th>Best</th><th>Average</th><th>Worst</th></tr>
        <tr><td>Time</td><td>${tc.best || '—'}</td><td>${tc.average || '—'}</td><td>${tc.worst || '—'}</td></tr>
        <tr><td colspan="3">Space</td><td>${sc}</td></tr>
      </table>`;

    // Deep dive
    const dd = algo.deepDive || {};
    const variationsHtml = (dd.variations || []).map(v => `<div class="variation-item">${v}</div>`).join('');
    const relatedHtml = (dd.relatedProblems || []).map(r => `<div class="related-item">${r}</div>`).join('');
    const appsHtml = (dd.realWorldApps || []).map(a => `<div class="app-item">${a}</div>`).join('');

    card.innerHTML = `
      <div class="algo-header" onclick="toggleL1(this)">
        <div class="algo-title-group">
          <div class="algo-name">${algo.name}</div>
          <div class="algo-name-zh">${algo.nameZh}</div>
        </div>
        <div class="algo-oneliner">${algo.oneLiner || ''}</div>
        <div class="algo-badges">
          <span class="badge badge--time">${worstTime}</span>
          <span class="badge badge--${algo.difficulty}">${algo.difficulty}</span>
        </div>
        <span class="algo-chevron">▾</span>
      </div>
      <div class="algo-detail">
        <div class="algo-detail-inner">
          <div class="detail-section">
            <h3>Problem Definition</h3>
            <p>${algo.problemDefinition || ''}</p>
            ${algo.problemDefinitionZh ? `<p style="color:var(--text-dim);font-size:0.85rem;margin-top:0.3rem">${algo.problemDefinitionZh}</p>` : ''}
          </div>
          ${whenToUseHtml ? `<div class="detail-section"><h3>When to Use</h3><ul>${whenToUseHtml}</ul></div>` : ''}
          <div class="detail-section">
            <h3>Key Insight</h3>
            <div class="insight-box">
              ${algo.keyInsight || ''}
              ${algo.keyInsightZh ? `<div class="insight-box-zh">${algo.keyInsightZh}</div>` : ''}
            </div>
          </div>
          <div class="detail-section">
            <h3>Implementation</h3>
            <pre class="code-block">${codeHtml}</pre>
          </div>
          <div class="detail-section">
            <h3>Complexity Analysis</h3>
            ${complexityHtml}
          </div>
          ${dd.explanation ? `
          <button class="deep-dive-btn" onclick="toggleL2(this)">Deep Dive ▾</button>
          <div class="algo-deep-dive">
            <div class="algo-deep-dive-inner">
              <div class="detail-section">
                <h3>Detailed Explanation</h3>
                <p>${dd.explanation}</p>
              </div>
              ${dd.walkthrough ? `<div class="detail-section"><h3>Step-by-Step Walkthrough</h3><div class="walkthrough-block">${dd.walkthrough}</div></div>` : ''}
              ${variationsHtml ? `<div class="detail-section"><h3>Variations & Optimizations</h3><div class="variation-list">${variationsHtml}</div></div>` : ''}
              ${relatedHtml ? `<div class="detail-section"><h3>Related Problems</h3><div class="related-list">${relatedHtml}</div></div>` : ''}
              ${appsHtml ? `<div class="detail-section"><h3>Real-World Applications</h3><div class="app-list">${appsHtml}</div></div>` : ''}
              ${dd.vsAlternatives ? `<div class="detail-section"><h3>Comparison with Alternatives</h3><div class="vs-box">${dd.vsAlternatives}</div></div>` : ''}
            </div>
          </div>` : ''}
        </div>
      </div>`;

    algoListEl.appendChild(card);
  });
}

// ─── Expand / Collapse ────────────────────────────────────────────────────
function toggleL1(headerEl) {
  const card = headerEl.closest('.algo-card');
  const detail = card.querySelector('.algo-detail');
  const isOpen = card.classList.contains('expanded-l1');

  if (isOpen) {
    if (card.classList.contains('expanded-l2')) {
      const btn = card.querySelector('.deep-dive-btn');
      if (btn) toggleL2(btn);
    }
    detail.style.maxHeight = '0';
    card.classList.remove('expanded-l1');
  } else {
    detail.style.maxHeight = detail.scrollHeight + 'px';
    card.classList.add('expanded-l1');
  }
}

function toggleL2(btnEl) {
  const card = btnEl.closest('.algo-card');
  const deepDive = card.querySelector('.algo-deep-dive');
  const detail = card.querySelector('.algo-detail');
  const isOpen = card.classList.contains('expanded-l2');

  if (isOpen) {
    deepDive.style.maxHeight = '0';
    card.classList.remove('expanded-l2');
    btnEl.textContent = 'Deep Dive ▾';
  } else {
    deepDive.style.maxHeight = deepDive.scrollHeight + 'px';
    card.classList.add('expanded-l2');
    btnEl.textContent = 'Deep Dive ▴';
    // Recalculate parent
    setTimeout(() => { detail.style.maxHeight = detail.scrollHeight + 'px'; }, 10);
  }
}

function toggleExpandAll() {
  const btn = document.getElementById('expandAllBtn');
  const cards = document.querySelectorAll('.algo-card');
  allExpanded = !allExpanded;

  cards.forEach(card => {
    if (card.style.display === 'none') return;
    const detail = card.querySelector('.algo-detail');
    if (allExpanded) {
      detail.style.maxHeight = detail.scrollHeight + 'px';
      card.classList.add('expanded-l1');
    } else {
      if (card.classList.contains('expanded-l2')) {
        const ddBtn = card.querySelector('.deep-dive-btn');
        if (ddBtn) toggleL2(ddBtn);
      }
      detail.style.maxHeight = '0';
      card.classList.remove('expanded-l1');
    }
  });
  btn.textContent = allExpanded ? 'Collapse All' : 'Expand All';
}

// ─── Sort / Filter ────────────────────────────────────────────────────────
function sortBy(mode, btnEl) {
  document.querySelectorAll('[data-sort]').forEach(b => b.classList.remove('active'));
  btnEl.classList.add('active');

  const list = document.getElementById('algoList');
  const cards = Array.from(list.querySelectorAll('.algo-card'));
  const diffOrder = { easy: 0, medium: 1, hard: 2 };

  cards.sort((a, b) => {
    if (mode === 'difficulty') return (diffOrder[a.dataset.difficulty] || 0) - (diffOrder[b.dataset.difficulty] || 0);
    if (mode === 'complexity') return parseInt(a.dataset.complexityRank) - parseInt(b.dataset.complexityRank);
    return parseInt(a.dataset.defaultOrder) - parseInt(b.dataset.defaultOrder);
  });
  cards.forEach(c => list.appendChild(c));
}

function filterBy(difficulty, btnEl) {
  document.querySelectorAll('[data-filter]').forEach(b => b.classList.remove('active'));
  btnEl.classList.add('active');

  document.querySelectorAll('.algo-card').forEach(card => {
    card.style.display = (difficulty === 'all' || card.dataset.difficulty === difficulty) ? '' : 'none';
  });
}

// ─── Progress Bar ─────────────────────────────────────────────────────────
window.addEventListener('scroll', () => {
  const h = document.documentElement;
  const pct = (h.scrollTop / (h.scrollHeight - h.clientHeight)) * 100;
  document.getElementById('progressBar').style.width = Math.min(pct, 100) + '%';
  document.getElementById('fixedNav').classList.toggle('scrolled', window.scrollY > 50);
});

// ─── Fade-in Observer ─────────────────────────────────────────────────────
const observer = new IntersectionObserver(entries => {
  entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); } });
}, { threshold: 0.05 });
document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));

// ─── URL Hash Support ─────────────────────────────────────────────────────
function handleHash() {
  const hash = window.location.hash.slice(1);
  if (!hash) return;
  const card = document.getElementById(hash);
  if (!card) return;
  setTimeout(() => {
    card.scrollIntoView({ behavior: 'smooth', block: 'center' });
    const header = card.querySelector('.algo-header');
    if (header && !card.classList.contains('expanded-l1')) toggleL1(header);
  }, 300);
}
window.addEventListener('hashchange', handleHash);
handleHash();
</script>

<style>
.theme-toggle {
  margin-left: auto;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--card);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.9rem;
  transition: all 0.3s;
  opacity: 0.7;
  padding: 0;
  line-height: 1;
  flex-shrink: 0;
}
.theme-toggle:hover {
  opacity: 1;
  transform: scale(1.1);
  border-color: var(--accent);
  box-shadow: 0 0 12px var(--glow);
}
</style>
<script>
(function() {
  var KEY = 'hyperion-theme';
  var toggle = document.getElementById('themeToggle');
  var icon = document.getElementById('themeIcon');

  function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    icon.textContent = theme === 'light' ? '\u{1F319}' : '\u{2600}\u{FE0F}';
    localStorage.setItem(KEY, theme);
    window.dispatchEvent(new CustomEvent('themechange', { detail: { theme: theme } }));
  }

  var saved = localStorage.getItem(KEY);
  if (saved) {
    applyTheme(saved);
  } else {
    icon.textContent = '\u{2600}\u{FE0F}';
  }

  toggle.addEventListener('click', function() {
    var current = document.documentElement.getAttribute('data-theme');
    applyTheme(current === 'light' ? 'dark' : 'light');
  });

  // Utility for canvas code: read theme-aware CSS var values
  window.getThemeRGB = function(varName) {
    return getComputedStyle(document.documentElement).getPropertyValue(varName).trim();
  };
})();
</script>
