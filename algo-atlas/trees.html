<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trees · 树 | Algo Atlas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
:root {
  --bg: #0f1117;
  --card: #1a1d27;
  --card-hover: #222636;
  --accent: #6c63ff;
  --accent2: #ff6b6b;
  --accent3: #4ecdc4;
  --accent4: #ffe66d;
  --text: #e8e8f0;
  --text-dim: #8888a0;
  --border: #2a2d3a;
  --glow: rgba(var(--accent-rgb), 0.15);
  --font-sans: 'Noto Sans SC', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  --radius: 14px;
  --success: #34d399;
}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
}
::selection { background: var(--accent); color: #fff; }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ─── Progress Bar ─── */
#progressBar {
  position: fixed;
  top: 0;
  left: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--accent), var(--accent3));
  width: 0%;
  z-index: 100;
  transition: width 0.1s linear;
}

/* ─── Hero (compact) ─── */
.hero {
  padding: 6rem 2rem 3rem;
  text-align: center;
  position: relative;
}
.hero-icon {
  font-size: 4rem;
  margin-bottom: 1rem;
  animation: float 3s ease-in-out infinite;
  filter: drop-shadow(0 0 20px var(--glow));
}
.hero h1 {
  font-size: 2.5rem;
  font-weight: 700;
  background: linear-gradient(135deg, var(--accent), var(--accent3));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 0.2rem;
}
.hero-zh {
  font-size: 1.2rem;
  color: var(--text-dim);
  font-weight: 300;
  margin-bottom: 0.8rem;
}
.hero-desc {
  font-size: 1rem;
  color: var(--accent3);
  font-family: var(--font-mono);
  margin-bottom: 1.5rem;
}
.hero-stats {
  display: flex;
  justify-content: center;
  gap: 0.75rem;
  flex-wrap: wrap;
  margin-bottom: 1.5rem;
}
/* ── Fixed Nav ── */
.fixed-nav { position: fixed; top: 0; left: 0; right: 0; z-index: 9998; padding: 0.6rem 1.5rem; font-size: 0.8rem; display: flex; align-items: center; gap: 0.4rem; background: rgba(15,17,23,0.85); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border-bottom: 1px solid transparent; transition: border-color 0.3s; }
.fixed-nav.scrolled { border-bottom-color: var(--border); }
.fixed-nav a { color: var(--text-dim); text-decoration: none; transition: color 0.3s; }
.fixed-nav a:hover { color: var(--accent); }
.fixed-nav .sep { color: var(--border); margin: 0 0.15rem; }

/* ─── Container ─── */
.container {
  max-width: 900px;
  margin: 0 auto;
  padding: 0 2rem 4rem;
}

/* ─── Controls ─── */
.controls {
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 1rem;
  margin-bottom: 1.5rem;
  padding: 1rem 0;
  border-bottom: 1px solid var(--border);
}
.control-group {
  display: flex;
  align-items: center;
  gap: 0.5rem;
}
.control-label {
  font-size: 0.75rem;
  color: var(--text-dim);
  font-family: var(--font-mono);
  text-transform: uppercase;
  letter-spacing: 1px;
}
.ctrl-btn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-dim);
  font-family: var(--font-mono);
  font-size: 0.75rem;
  padding: 0.3rem 0.7rem;
  border-radius: 0.5rem;
  cursor: pointer;
  transition: all 0.2s ease;
}
.ctrl-btn:hover {
  border-color: var(--accent);
  color: var(--text);
}
.ctrl-btn.active {
  background: rgba(var(--accent-rgb), 0.15);
  border-color: var(--accent);
  color: var(--accent);
}
.expand-all-btn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-dim);
  font-family: var(--font-mono);
  font-size: 0.75rem;
  padding: 0.3rem 0.7rem;
  border-radius: 0.5rem;
  cursor: pointer;
  transition: all 0.2s ease;
}
.expand-all-btn:hover {
  border-color: var(--accent3);
  color: var(--accent3);
}

/* ─── Badge System ─── */
.badge {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  padding: 0.15rem 0.55rem;
  border-radius: 1rem;
  letter-spacing: 0.5px;
  white-space: nowrap;
}
.badge--time {
  background: rgba(var(--accent-rgb), 0.15);
  color: var(--accent);
  border: 1px solid rgba(var(--accent-rgb), 0.3);
}
.badge--space {
  background: rgba(var(--accent3-rgb), 0.1);
  color: var(--accent3);
  border: 1px solid rgba(var(--accent3-rgb), 0.2);
}
.badge--easy {
  background: rgba(var(--accent3-rgb), 0.15);
  color: var(--accent3);
  border: 1px solid rgba(var(--accent3-rgb), 0.3);
}
.badge--medium {
  background: rgba(var(--accent4-rgb), 0.15);
  color: var(--accent4);
  border: 1px solid rgba(var(--accent4-rgb), 0.3);
}
.badge--hard {
  background: rgba(var(--accent2-rgb), 0.15);
  color: var(--accent2);
  border: 1px solid rgba(var(--accent2-rgb), 0.3);
}
.badge--source {
  background: rgba(var(--text-dim-rgb), 0.1);
  color: var(--text-dim);
  border: 1px solid rgba(var(--text-dim-rgb), 0.2);
}

/* ─── Algorithm Card ─── */
.algo-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 0.75rem;
  transition: border-color 0.3s ease, box-shadow 0.3s ease;
  overflow: hidden;
}
.algo-card:hover {
  border-color: rgba(var(--accent-rgb), 0.3);
}
.algo-card.expanded-l1 {
  border-color: var(--accent);
  box-shadow: 0 4px 20px var(--glow);
}

/* ─── Algo Header (Level 0 — always visible) ─── */
.algo-header {
  display: flex;
  align-items: center;
  gap: 1rem;
  padding: 1rem 1.25rem;
  cursor: pointer;
  user-select: none;
  transition: background 0.2s ease;
}
.algo-header:hover {
  background: var(--card-hover);
}
.algo-title-group {
  flex-shrink: 0;
  min-width: 0;
}
.algo-name {
  font-size: 1rem;
  font-weight: 700;
}
.algo-name-zh {
  font-size: 0.8rem;
  color: var(--text-dim);
}
.algo-oneliner {
  flex: 1;
  font-size: 0.8rem;
  color: var(--text-dim);
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.algo-badges {
  display: flex;
  gap: 0.4rem;
  flex-shrink: 0;
}
.algo-chevron {
  font-size: 1rem;
  color: var(--text-dim);
  transition: transform 0.3s ease;
  flex-shrink: 0;
}
.algo-card.expanded-l1 .algo-chevron {
  transform: rotate(180deg);
}

/* ─── Algo Detail (Level 1 — expand on click) ─── */
.algo-detail {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.5s cubic-bezier(0.4, 0, 0.2, 1);
}
.algo-detail-inner {
  padding: 0 1.25rem 1.25rem;
}
.detail-section {
  margin-bottom: 1.25rem;
}
.detail-section:last-child { margin-bottom: 0; }
.detail-section h3 {
  font-size: 0.85rem;
  font-weight: 700;
  color: var(--accent3);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 0.5rem;
  font-family: var(--font-mono);
}
.detail-section p {
  font-size: 0.9rem;
  line-height: 1.7;
  color: var(--text);
}
.detail-section ul {
  list-style: none;
  padding: 0;
}
.detail-section ul li {
  font-size: 0.85rem;
  color: var(--text);
  padding: 0.25rem 0;
  padding-left: 1.2rem;
  position: relative;
}
.detail-section ul li::before {
  content: '›';
  position: absolute;
  left: 0;
  color: var(--accent);
  font-weight: 700;
}
.insight-box {
  background: rgba(var(--accent-rgb), 0.08);
  border-left: 3px solid var(--accent);
  padding: 0.8rem 1rem;
  border-radius: 0 8px 8px 0;
  font-size: 0.9rem;
  line-height: 1.6;
}
.insight-box-zh {
  color: var(--text-dim);
  font-size: 0.8rem;
  margin-top: 0.3rem;
}

/* ─── Code Block ─── */
.code-block {
  background: var(--code-bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1.25rem;
  font-family: var(--font-mono);
  font-size: 0.8rem;
  color: var(--text-dim);
  overflow-x: auto;
  white-space: pre;
  line-height: 1.7;
  position: relative;
}
.code-block::before {
  content: 'Python';
  position: absolute;
  top: 8px;
  right: 12px;
  font-size: 0.65rem;
  color: var(--text-dim);
  letter-spacing: 1.5px;
  text-transform: uppercase;
}
.code-keyword { color: var(--accent); }
.code-string { color: var(--accent3); }
.code-comment { color: #5a5a7a; font-style: italic; }
.code-number { color: var(--accent4); }
.code-func { color: var(--accent2); }
.code-builtin { color: #c792ea; }

/* ─── Complexity Table ─── */
.complexity-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.8rem;
  font-family: var(--font-mono);
}
.complexity-table th {
  color: var(--text-dim);
  font-weight: 400;
  text-align: left;
  padding: 0.4rem 0.8rem;
  border-bottom: 1px solid var(--border);
  text-transform: uppercase;
  letter-spacing: 1px;
  font-size: 0.7rem;
}
.complexity-table td {
  padding: 0.4rem 0.8rem;
  border-bottom: 1px solid rgba(var(--border-rgb), 0.5);
}
.complexity-table tr:last-child td { border-bottom: none; }

/* ─── Deep Dive Button ─── */
.deep-dive-btn {
  display: block;
  width: 100%;
  background: rgba(var(--accent-rgb), 0.06);
  border: 1px dashed rgba(var(--accent-rgb), 0.3);
  color: var(--accent);
  font-family: var(--font-mono);
  font-size: 0.8rem;
  padding: 0.6rem;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.2s ease;
  margin-top: 1rem;
}
.deep-dive-btn:hover {
  background: rgba(var(--accent-rgb), 0.12);
  border-color: var(--accent);
}

/* ─── Deep Dive (Level 2) ─── */
.algo-deep-dive {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.5s cubic-bezier(0.4, 0, 0.2, 1);
}
.algo-deep-dive-inner {
  padding-top: 1rem;
}
.variation-list, .related-list, .app-list {
  display: grid;
  gap: 0.4rem;
}
.variation-item, .related-item, .app-item {
  font-size: 0.85rem;
  padding: 0.4rem 0.8rem;
  background: rgba(var(--accent-rgb), 0.04);
  border-radius: 6px;
  border-left: 2px solid var(--accent);
}
.related-item { border-left-color: var(--accent3); }
.app-item { border-left-color: var(--accent4); }
.vs-box {
  background: rgba(var(--accent2-rgb), 0.06);
  border-left: 3px solid var(--accent2);
  padding: 0.8rem 1rem;
  border-radius: 0 8px 8px 0;
  font-size: 0.85rem;
  line-height: 1.6;
}
.walkthrough-block {
  background: var(--code-bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem;
  font-family: var(--font-mono);
  font-size: 0.78rem;
  color: var(--text-dim);
  white-space: pre-wrap;
  line-height: 1.6;
}

/* ─── Navigation ─── */
.nav-footer {
  display: flex;
  justify-content: space-between;
  align-items: stretch;
  gap: 1rem;
  margin-top: 3rem;
  padding-top: 2rem;
  border-top: 1px solid var(--border);
}
.nav-btn {
  display: flex;
  flex-direction: column;
  gap: 0.2rem;
  text-decoration: none;
  color: var(--text);
  padding: 0.8rem 1.2rem;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  transition: all 0.3s ease;
  min-width: 0;
}
.nav-btn:hover {
  border-color: var(--accent);
  box-shadow: 0 4px 15px var(--glow);
}
.nav-prev { align-items: flex-start; }
.nav-next { align-items: flex-end; }
.nav-label {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  color: var(--text-dim);
  letter-spacing: 1px;
}
.nav-title {
  font-size: 0.9rem;
  font-weight: 500;
}
.nav-placeholder { flex: 1; }

/* ─── Coming Soon (category page) ─── */
.coming-soon-container {
  text-align: center;
  padding: 4rem 2rem;
}
.coming-soon-msg {
  font-size: 1.1rem;
  color: var(--text-dim);
  margin-bottom: 1rem;
}
.coming-soon-msg-zh {
  font-size: 0.95rem;
  color: var(--text-dim);
  margin-bottom: 2rem;
}
.planned-list {
  list-style: none;
  padding: 0;
  max-width: 400px;
  margin: 0 auto;
}
.planned-list li {
  padding: 0.5rem 0;
  font-size: 0.9rem;
  color: var(--text-dim);
  border-bottom: 1px dashed var(--border);
  display: flex;
  align-items: center;
  gap: 0.5rem;
}
.planned-check {
  width: 16px;
  height: 16px;
  border: 1.5px solid var(--border);
  border-radius: 4px;
  flex-shrink: 0;
}

/* ─── Footer ─── */
.footer {
  text-align: center;
  padding: 3rem 2rem;
  color: var(--text-dim);
  font-size: 0.8rem;
  border-top: 1px solid var(--border);
}

/* ─── Fade-in ─── */
.fade-in {
  opacity: 0;
  transform: translateY(20px);
  transition: opacity 0.6s ease, transform 0.6s ease;
}
.fade-in.visible {
  opacity: 1;
  transform: translateY(0);
}

@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

/* ─── Responsive ─── */
@media (max-width: 768px) {
  .hero { padding: 4rem 1.5rem 2rem; }
  .hero h1 { font-size: 1.8rem; }
  .algo-header { flex-wrap: wrap; gap: 0.5rem; }
  .algo-oneliner { display: none; }
  .controls { flex-direction: column; align-items: flex-start; }
  .nav-footer { flex-direction: column; }
}
/* ── RGB triplet defaults (dark) ── */
:root {
  --bg-rgb: 15,17,23;
  --card-rgb: 26,29,39;
  --card-hover-rgb: 34,38,54;
  --text-rgb: 232,232,240;
  --text-dim-rgb: 136,136,160;
  --border-rgb: 42,45,58;
  --accent-rgb: 108,99,255;
  --accent2-rgb: 255,107,107;
  --accent3-rgb: 78,205,196;
  --accent4-rgb: 255,230,109;
  --bg-hero: #13151f;
  --code-bg: #12141c;
  --code-border: #1e2030;
}

/* ── Light theme overrides ── */
[data-theme="light"] {
  --bg: #f5f5f7;
  --card: #ffffff;
  --card-hover: #f0f0f5;
  --accent: #5b52e6;
  --accent2: #e55d5d;
  --accent3: #3cb8b0;
  --accent4: #c49800;
  --text: #1a1a2e;
  --text-dim: #6e6e82;
  --border: #dcdce5;
  --glow: rgba(91,82,230,0.10);
  --success: #059669;
  --warning: #b45309;
  --danger: #dc2626;

  --bg-rgb: 245,245,247;
  --card-rgb: 255,255,255;
  --card-hover-rgb: 240,240,245;
  --text-rgb: 26,26,46;
  --text-dim-rgb: 110,110,130;
  --border-rgb: 220,220,229;
  --accent-rgb: 91,82,230;
  --accent2-rgb: 229,93,93;
  --accent3-rgb: 60,184,176;
  --accent4-rgb: 196,152,0;
  --bg-hero: #e8e8ed;
  --code-bg: #f0f0f5;
  --code-border: #dcdce5;
}

</style>
</head>

<script>
const categoryMeta = {
  "id": "trees",
  "name": "Trees",
  "nameZh": "树",
  "icon": "🌲",
  "description": "Hierarchical structures for efficient searching and ordering",
  "descriptionZh": "用于高效查找和排序的层次结构",
  "dataFile": "trees.json",
  "outputFile": "trees.html",
  "status": "active",
  "order": 5,
  "algoCount": 4
};

const algorithms = [
  {
    "id": "bst-insert-search-delete",
    "name": "BST Insert, Search, Delete",
    "nameZh": "二叉搜索树的插入、查找与删除",
    "difficulty": "easy",
    "source": "algs4",
    "sourceChapter": "3.2",
    "oneLiner": "Core operations on a binary search tree using recursive structure",
    "oneLinerZh": "利用递归结构实现二叉搜索树的核心操作",
    "complexity": {
      "time": {
        "best": "O(log N)",
        "average": "O(log N)",
        "worst": "O(N)"
      },
      "space": "O(N)"
    },
    "problemDefinition": "Maintain a dynamic set of keys in a rooted binary tree where every node's left subtree contains only smaller keys and right subtree contains only larger keys. Support three fundamental operations: insert a new key, search for an existing key, and delete a key while preserving the BST invariant.",
    "problemDefinitionZh": "在一棵有根二叉树中维护动态键集合，其中每个节点的左子树仅包含更小的键，右子树仅包含更大的键。支持三种基本操作：插入新键、查找已有键、删除键且保持 BST 不变量。",
    "whenToUse": [
      "You need a dynamic collection with fast search, insert, and delete",
      "Data arrives in a reasonably random order (avoids degenerate O(N) height)",
      "You need in-order traversal to produce sorted output",
      "Building block before learning balanced trees (red-black, AVL)"
    ],

    "implementation": "class BTreeNode:\n    \"\"\"A node in a B-tree of order M (max M children, M-1 keys).\"\"\"\n    def __init__(self, leaf=True):\n        self.keys = []      # sorted list of keys\n        self.children = []   # children pointers (len = len(keys)+1 for internal)\n        self.leaf = leaf\n\nclass BTree:\n    def __init__(self, M=4):\n        \"\"\"B-tree of order M. M=4 means max 3 keys, 4 children per node.\"\"\"\n        self.M = M\n        self.root = BTreeNode(leaf=True)\n\n    def search(self, key, node=None):\n        \"\"\"Search for key starting from given node (default: root).\"\"\"\n        if node is None:\n            node = self.root\n        i = 0\n        while i < len(node.keys) and key > node.keys[i]:\n            i += 1\n        if i < len(node.keys) and key == node.keys[i]:\n            return (node, i)\n        if node.leaf:\n            return None\n        return self.search(key, node.children[i])\n\n    def insert(self, key):\n        root = self.root\n        if len(root.keys) == self.M - 1:\n            # Root is full — split it and grow the tree taller\n            new_root = BTreeNode(leaf=False)\n            new_root.children.append(self.root)\n            self._split_child(new_root, 0)\n            self.root = new_root\n        self._insert_nonfull(self.root, key)\n\n    def _insert_nonfull(self, node, key):\n        i = len(node.keys) - 1\n        if node.leaf:\n            # Insert key in sorted position\n            node.keys.append(None)\n            while i >= 0 and key < node.keys[i]:\n                node.keys[i + 1] = node.keys[i]\n                i -= 1\n            node.keys[i + 1] = key\n        else:\n            # Find the child to descend into\n            while i >= 0 and key < node.keys[i]:\n                i -= 1\n            i += 1\n            if len(node.children[i].keys) == self.M - 1:\n                self._split_child(node, i)\n                if key > node.keys[i]:\n                    i += 1\n            self._insert_nonfull(node.children[i], key)\n\n    def _split_child(self, parent, i):\n        \"\"\"Split parent.children[i] which is full (M-1 keys).\"\"\"\n        M = self.M\n        full_node = parent.children[i]\n        mid = M // 2 - 1  # index of median key\n\n        # New sibling gets the right half\n        new_node = BTreeNode(leaf=full_node.leaf)\n        new_node.keys = full_node.keys[mid + 1:]\n        if not full_node.leaf:\n            new_node.children = full_node.children[mid + 1:]\n\n        # Median key moves up to parent\n        parent.keys.insert(i, full_node.keys[mid])\n        parent.children.insert(i + 1, new_node)\n\n        # Original node keeps the left half\n        full_node.keys = full_node.keys[:mid]\n        if not full_node.leaf:\n            full_node.children = full_node.children[:mid + 1]",
    "deepDive": {
      "explanation": "A B-tree of order M is a balanced multi-way search tree where: (1) every node has at most M-1 keys and M children; (2) every non-root internal node has at least ceil(M/2)-1 keys; (3) all leaves appear at the same level. Search works like BST but with M-way branching at each node. Insert always goes to a leaf; if the leaf is full, it splits: the median key moves up to the parent, and the node divides into two half-full nodes. Splits can cascade up to the root; when the root splits, the tree grows one level taller. This guarantees the tree height is between log_M(N) and log_(M/2)(N). The proactive splitting variant (used in the implementation above) splits full nodes on the way down, ensuring the parent always has room for a promoted key.",
      "walkthrough": "B-tree of order M=4 (max 3 keys per node).\nInsert: 10, 20, 30, 40, 50, 60, 70\n\nAfter 10, 20, 30: root = [10, 20, 30] (full)\n\nInsert 40: root is full, split!\n  Median = 20 moves up as new root.\n  Left = [10], Right = [30]\n  Insert 40 into right: [30, 40]\n\n       [20]\n      /    \\\n   [10]   [30, 40]\n\nInsert 50: goes to right leaf → [30, 40, 50] (full, but not split yet)\n\nInsert 60: right leaf [30, 40, 50] is full, split first!\n  Median = 40 moves up to root.\n  Left = [30], Right = [50]\n  Then insert 60 → right = [50, 60]\n\n       [20, 40]\n      /   |    \\\n   [10] [30] [50, 60]\n\nInsert 70: goes to [50, 60] → [50, 60, 70] (full but insertion done)\n\nHeight = 2 for 7 keys. With M=1000, height stays 2 until ~10^6 keys!",
      "variations": [
        "B+ tree — all data in leaves, internal nodes store only keys, leaves linked for range scans (used by MySQL InnoDB, PostgreSQL)",
        "B* tree — redistribute keys between siblings before splitting (higher space utilization)",
        "2-3 tree — B-tree with M=3 (conceptual foundation for red-black trees)",
        "LSM tree — write-optimized alternative that batches writes in memory (used by RocksDB, Cassandra)"
      ],
      "relatedProblems": [
        "Design a key-value store with disk persistence",

        "File systems: ext4 (extents tree), NTFS (master file table), HFS+ (catalog file)",
        "SQLite — entire database stored as a B-tree of pages",
        "Windows NTFS directory indexing for fast file lookup"
      ],
      "vsAlternatives": "Binary BST gives height log_2(N) = 30 for 10^9 keys, meaning 30 disk reads per search. B-tree with M=1000 gives height 3: a 10x I/O reduction. Hash tables provide O(1) average but no range queries and poor disk locality. LSM trees (Log-Structured Merge) trade read performance for write throughput — better for write-heavy workloads (append-only), while B-trees excel at read-heavy and mixed workloads. In practice, B+ trees (leaves linked) dominate relational databases because they support both point queries and efficient range scans."
    },

const isComingSoon = false;

const plannedAlgorithms = [];

const comingSoonMessage = "";
const comingSoonMessageZh = "";

// ─── Python Syntax Highlighting (lightweight) ─────────────────────────────
function highlightPython(code) {
  // Escape HTML
  let s = code.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  // Comments
  s = s.replace(/(#.*?)$/gm, '<span class="code-comment">$1</span>');
  // Triple-quoted strings
  s = s.replace(/("""[\s\S]*?"""|'''[\s\S]*?''')/g, '<span class="code-string">$1</span>');
  // Strings
  s = s.replace(/("(?:[^"\\]|\\.)*"|'(?:[^'\\]|\\.)*')/g, '<span class="code-string">$1</span>');
  // Keywords
  const kws = ['def','class','return','if','elif','else','for','while','in','not','and','or','is','None','True','False','import','from','as','with','try','except','finally','raise','yield','lambda','pass','break','continue','assert','global','nonlocal'];
  const kwRe = new RegExp('\\b(' + kws.join('|') + ')\\b', 'g');
  s = s.replace(kwRe, '<span class="code-keyword">$1</span>');
  // Built-in functions
  const builtins = ['len','range','print','int','float','str','list','dict','set','tuple','sorted','enumerate','zip','map','filter','isinstance','type','super','min','max','sum','abs','any','all','reversed','iter','next','hash','id','open','input'];
  const biRe = new RegExp('\\b(' + builtins.join('|') + ')(?=\\()', 'g');
  s = s.replace(biRe, '<span class="code-builtin">$1</span>');
  // Function definitions
  s = s.replace(/(?<=def\s+)(\w+)/g, '<span class="code-func">$1</span>');
  // Numbers
  s = s.replace(/\b(\d+\.?\d*)\b/g, '<span class="code-number">$1</span>');
  return s;
}

// ─── Render ─────────────────────────────────────────────────────────────────
const algoListEl = document.getElementById('algoList');
const controlsEl = document.getElementById('controls');
let allExpanded = false;

if (isComingSoon) {
  controlsEl.style.display = 'none';
  algoListEl.innerHTML = `
    <div class="coming-soon-container">
      <div class="coming-soon-msg">${comingSoonMessage}</div>
      <div class="coming-soon-msg-zh">${comingSoonMessageZh}</div>
      <ul class="planned-list">
        ${plannedAlgorithms.map(a => `<li><span class="planned-check"></span>${a}</li>`).join('')}
      </ul>
    </div>`;
} else {
  // Hero stats
  const heroStatsEl = document.getElementById('heroStats');
  const difficulties = [...new Set(algorithms.map(a => a.difficulty))];
  heroStatsEl.innerHTML = `
    <span class="badge badge--time">${algorithms.length} algorithms</span>
    ${difficulties.map(d => `<span class="badge badge--${d}">${d}</span>`).join('')}`;

  // Render algorithm cards
  algorithms.forEach((algo, i) => {
    const card = document.createElement('div');
    card.className = 'algo-card fade-in';
    card.dataset.id = algo.id;
    card.dataset.difficulty = algo.difficulty;
    card.dataset.complexityRank = algo.complexityRank;
    card.dataset.defaultOrder = algo.defaultOrder;
    card.id = algo.id;

    const worstTime = algo.complexity?.time?.worst || '';
    const codeHtml = highlightPython(algo.implementation || '');

    const whenToUseHtml = (algo.whenToUse || []).map(w => `<li>${w}</li>`).join('');

    // Complexity table
    const tc = algo.complexity?.time || {};
    const sc = algo.complexity?.space || '';
    const complexityHtml = `
      <table class="complexity-table">
        <tr><th>Metric</th><th>Best</th><th>Average</th><th>Worst</th></tr>
        <tr><td>Time</td><td>${tc.best || '—'}</td><td>${tc.average || '—'}</td><td>${tc.worst || '—'}</td></tr>
        <tr><td colspan="3">Space</td><td>${sc}</td></tr>
      </table>`;

    // Deep dive
    const dd = algo.deepDive || {};
    const variationsHtml = (dd.variations || []).map(v => `<div class="variation-item">${v}</div>`).join('');
    const relatedHtml = (dd.relatedProblems || []).map(r => `<div class="related-item">${r}</div>`).join('');
    const appsHtml = (dd.realWorldApps || []).map(a => `<div class="app-item">${a}</div>`).join('');

    card.innerHTML = `
      <div class="algo-header" onclick="toggleL1(this)">
        <div class="algo-title-group">
          <div class="algo-name">${algo.name}</div>
          <div class="algo-name-zh">${algo.nameZh}</div>
        </div>
        <div class="algo-oneliner">${algo.oneLiner || ''}</div>
        <div class="algo-badges">
          <span class="badge badge--time">${worstTime}</span>
          <span class="badge badge--${algo.difficulty}">${algo.difficulty}</span>
        </div>
        <span class="algo-chevron">▾</span>
      </div>
      <div class="algo-detail">
        <div class="algo-detail-inner">
          <div class="detail-section">
            <h3>Problem Definition</h3>
            <p>${algo.problemDefinition || ''}</p>
            ${algo.problemDefinitionZh ? `<p style="color:var(--text-dim);font-size:0.85rem;margin-top:0.3rem">${algo.problemDefinitionZh}</p>` : ''}
          </div>
          ${whenToUseHtml ? `<div class="detail-section"><h3>When to Use</h3><ul>${whenToUseHtml}</ul></div>` : ''}
          <div class="detail-section">
            <h3>Key Insight</h3>
            <div class="insight-box">
              ${algo.keyInsight || ''}
              ${algo.keyInsightZh ? `<div class="insight-box-zh">${algo.keyInsightZh}</div>` : ''}
            </div>
          </div>
          <div class="detail-section">
            <h3>Implementation</h3>
            <pre class="code-block">${codeHtml}</pre>
          </div>
          <div class="detail-section">
            <h3>Complexity Analysis</h3>
            ${complexityHtml}
          </div>
          ${dd.explanation ? `
          <button class="deep-dive-btn" onclick="toggleL2(this)">Deep Dive ▾</button>
          <div class="algo-deep-dive">
            <div class="algo-deep-dive-inner">
              <div class="detail-section">
                <h3>Detailed Explanation</h3>
                <p>${dd.explanation}</p>
              </div>
              ${dd.walkthrough ? `<div class="detail-section"><h3>Step-by-Step Walkthrough</h3><div class="walkthrough-block">${dd.walkthrough}</div></div>` : ''}
              ${variationsHtml ? `<div class="detail-section"><h3>Variations & Optimizations</h3><div class="variation-list">${variationsHtml}</div></div>` : ''}
              ${relatedHtml ? `<div class="detail-section"><h3>Related Problems</h3><div class="related-list">${relatedHtml}</div></div>` : ''}
              ${appsHtml ? `<div class="detail-section"><h3>Real-World Applications</h3><div class="app-list">${appsHtml}</div></div>` : ''}
              ${dd.vsAlternatives ? `<div class="detail-section"><h3>Comparison with Alternatives</h3><div class="vs-box">${dd.vsAlternatives}</div></div>` : ''}
            </div>
          </div>` : ''}
        </div>
      </div>`;

    algoListEl.appendChild(card);
  });
}

// ─── Expand / Collapse ────────────────────────────────────────────────────
function toggleL1(headerEl) {
  const card = headerEl.closest('.algo-card');
  const detail = card.querySelector('.algo-detail');
  const isOpen = card.classList.contains('expanded-l1');

  if (isOpen) {
    if (card.classList.contains('expanded-l2')) {
      const btn = card.querySelector('.deep-dive-btn');
      if (btn) toggleL2(btn);
    }
    detail.style.maxHeight = '0';
    card.classList.remove('expanded-l1');
  } else {
    detail.style.maxHeight = detail.scrollHeight + 'px';
    card.classList.add('expanded-l1');
  }
}

function toggleL2(btnEl) {
  const card = btnEl.closest('.algo-card');
  const deepDive = card.querySelector('.algo-deep-dive');
  const detail = card.querySelector('.algo-detail');
  const isOpen = card.classList.contains('expanded-l2');

  if (isOpen) {
    deepDive.style.maxHeight = '0';
    card.classList.remove('expanded-l2');
    btnEl.textContent = 'Deep Dive ▾';
  } else {
    deepDive.style.maxHeight = deepDive.scrollHeight + 'px';
    card.classList.add('expanded-l2');
    btnEl.textContent = 'Deep Dive ▴';
    // Recalculate parent
    setTimeout(() => { detail.style.maxHeight = detail.scrollHeight + 'px'; }, 10);
  }
}

function toggleExpandAll() {
  const btn = document.getElementById('expandAllBtn');
  const cards = document.querySelectorAll('.algo-card');
  allExpanded = !allExpanded;

  cards.forEach(card => {
    if (card.style.display === 'none') return;
    const detail = card.querySelector('.algo-detail');
    if (allExpanded) {
      detail.style.maxHeight = detail.scrollHeight + 'px';
      card.classList.add('expanded-l1');
    } else {
      if (card.classList.contains('expanded-l2')) {
        const ddBtn = card.querySelector('.deep-dive-btn');
        if (ddBtn) toggleL2(ddBtn);
      }
      detail.style.maxHeight = '0';
      card.classList.remove('expanded-l1');
    }
  });
  btn.textContent = allExpanded ? 'Collapse All' : 'Expand All';
}

// ─── Sort / Filter ────────────────────────────────────────────────────────
function sortBy(mode, btnEl) {
  document.querySelectorAll('[data-sort]').forEach(b => b.classList.remove('active'));
  btnEl.classList.add('active');

  const list = document.getElementById('algoList');
  const cards = Array.from(list.querySelectorAll('.algo-card'));
  const diffOrder = { easy: 0, medium: 1, hard: 2 };

  cards.sort((a, b) => {
    if (mode === 'difficulty') return (diffOrder[a.dataset.difficulty] || 0) - (diffOrder[b.dataset.difficulty] || 0);
    if (mode === 'complexity') return parseInt(a.dataset.complexityRank) - parseInt(b.dataset.complexityRank);
    return parseInt(a.dataset.defaultOrder) - parseInt(b.dataset.defaultOrder);
  });
  cards.forEach(c => list.appendChild(c));
}

function filterBy(difficulty, btnEl) {
  document.querySelectorAll('[data-filter]').forEach(b => b.classList.remove('active'));
  btnEl.classList.add('active');

  document.querySelectorAll('.algo-card').forEach(card => {
    card.style.display = (difficulty === 'all' || card.dataset.difficulty === difficulty) ? '' : 'none';
  });
}

// ─── Progress Bar ─────────────────────────────────────────────────────────
window.addEventListener('scroll', () => {
  const h = document.documentElement;
  const pct = (h.scrollTop / (h.scrollHeight - h.clientHeight)) * 100;
  document.getElementById('progressBar').style.width = Math.min(pct, 100) + '%';
  document.getElementById('fixedNav').classList.toggle('scrolled', window.scrollY > 50);
});

// ─── Fade-in Observer ─────────────────────────────────────────────────────
const observer = new IntersectionObserver(entries => {
  entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); } });
}, { threshold: 0.05 });
document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));

// ─── URL Hash Support ─────────────────────────────────────────────────────
function handleHash() {
  const hash = window.location.hash.slice(1);
  if (!hash) return;
  const card = document.getElementById(hash);
  if (!card) return;
  setTimeout(() => {
    card.scrollIntoView({ behavior: 'smooth', block: 'center' });
    const header = card.querySelector('.algo-header');
    if (header && !card.classList.contains('expanded-l1')) toggleL1(header);
  }, 300);
}
window.addEventListener('hashchange', handleHash);
handleHash();
</script>

<script>
(function() {
  var KEY = 'hyperion-theme';
  var toggle = document.getElementById('themeToggle');
  var icon = document.getElementById('themeIcon');

  function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    icon.textContent = theme === 'light' ? '\u{1F319}' : '\u{2600}\u{FE0F}';
    localStorage.setItem(KEY, theme);
    window.dispatchEvent(new CustomEvent('themechange', { detail: { theme: theme } }));
  }

  var saved = localStorage.getItem(KEY);
  if (saved) {
    applyTheme(saved);
  } else {
    icon.textContent = '\u{2600}\u{FE0F}';
  }

  toggle.addEventListener('click', function() {
    var current = document.documentElement.getAttribute('data-theme');
    applyTheme(current === 'light' ? 'dark' : 'light');
  });

  // Utility for canvas code: read theme-aware CSS var values
  window.getThemeRGB = function(varName) {
    return getComputedStyle(document.documentElement).getPropertyValue(varName).trim();
  };
})();
</script>
