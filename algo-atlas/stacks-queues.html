<style>
:root {
  --bg: #0f1117;
  --card: #1a1d27;
  --card-hover: #222636;
  --accent: #6c63ff;
  --accent2: #ff6b6b;
  --accent3: #4ecdc4;
  --accent4: #ffe66d;
  --text: #e8e8f0;
  --text-dim: #8888a0;
  --border: #2a2d3a;
  --glow: rgba(var(--accent-rgb), 0.15);
  --font-sans: 'Noto Sans SC', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  --radius: 14px;
  --success: #34d399;
}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
}
::selection { background: var(--accent); color: #fff; }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ─── Progress Bar ─── */
#progressBar {
  position: fixed;
  top: 0;
  left: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--accent), var(--accent3));
  width: 0%;
  z-index: 100;
  transition: width 0.1s linear;
}

/* ─── Hero (compact) ─── */
.hero {
  padding: 6rem 2rem 3rem;
  text-align: center;
  position: relative;
}
.hero-icon {
  font-size: 4rem;
  margin-bottom: 1rem;
  animation: float 3s ease-in-out infinite;
  filter: drop-shadow(0 0 20px var(--glow));
}
.hero h1 {
  font-size: 2.5rem;
  font-weight: 700;
  background: linear-gradient(135deg, var(--accent), var(--accent3));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 0.2rem;
}
.hero-zh {
  font-size: 1.2rem;
  color: var(--text-dim);
  font-weight: 300;
  margin-bottom: 0.8rem;
}
.hero-desc {
  font-size: 1rem;
  color: var(--accent3);
  font-family: var(--font-mono);
  margin-bottom: 1.5rem;
}
.hero-stats {
  display: flex;
  justify-content: center;
  gap: 0.75rem;
  flex-wrap: wrap;
  margin-bottom: 1.5rem;
}
/* ── Fixed Nav ── */
.fixed-nav { position: fixed; top: 0; left: 0; right: 0; z-index: 9998; padding: 0.6rem 1.5rem; font-size: 0.8rem; display: flex; align-items: center; gap: 0.4rem; background: rgba(var(--bg-rgb),0.85); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border-bottom: 1px solid transparent; transition: border-color 0.3s; }

.fixed-nav a:hover { color: var(--accent); }

/* ─── Container ─── */
.container {
  max-width: 900px;
  margin: 0 auto;
  padding: 0 2rem 4rem;
}

/* ─── Controls ─── */
.controls {
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 1rem;
  margin-bottom: 1.5rem;
  padding: 1rem 0;
  border-bottom: 1px solid var(--border);
}
.control-group {

  gap: 0.5rem;
}
.control-label {

  color: var(--text-dim);
  font-family: var(--font-mono);
  text-transform: uppercase;
  letter-spacing: 1px;
}
.ctrl-btn {
  background: transparent;

  color: var(--text-dim);
  font-family: var(--font-mono);
  font-size: 0.75rem;
  padding: 0.3rem 0.7rem;
  border-radius: 0.5rem;

  transition: all 0.2s ease;
}
.ctrl-btn:hover {

  color: var(--text);
}
.ctrl-btn.active {

}
.expand-all-btn {

  cursor: pointer;
  transition: all 0.2s ease;
}
.expand-all-btn:hover {

  color: var(--accent3);
}

/* ─── Badge System ─── */
.badge {

  border-radius: 1rem;

}
.badge--time {

}
.detail-section ul {

  padding: 0;
}

  padding: 0.25rem 0;
  padding-left: 1.2rem;
  position: relative;
}
.detail-section ul li::before {

  position: absolute;
  left: 0;
  color: var(--accent);
  font-weight: 700;
}
.insight-box {

  border-left: 3px solid var(--accent);
  padding: 0.8rem 1rem;
  border-radius: 0 8px 8px 0;
  font-size: 0.9rem;
  line-height: 1.6;
}
.insight-box-zh {
  color: var(--text-dim);
  font-size: 0.8rem;
  margin-top: 0.3rem;
}

/* ─── Code Block ─── */
.code-block {
  background: var(--code-bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1.25rem;
  font-family: var(--font-mono);
  font-size: 0.8rem;
  color: var(--text-dim);
  overflow-x: auto;
  white-space: pre;
  line-height: 1.7;
  position: relative;
}
.code-block::before {
  content: 'Python';
  position: absolute;
  top: 8px;
  right: 12px;
  font-size: 0.65rem;
  color: var(--text-dim);
  letter-spacing: 1.5px;
  text-transform: uppercase;
}
.code-keyword { color: var(--accent); }
.code-string { color: var(--accent3); }
.code-comment { color: #5a5a7a; font-style: italic; }
.code-number { color: var(--accent4); }
.code-func { color: var(--accent2); }
.code-builtin { color: #c792ea; }

/* ─── Complexity Table ─── */
.complexity-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.8rem;
  font-family: var(--font-mono);
}
.complexity-table th {
  color: var(--text-dim);
  font-weight: 400;
  text-align: left;
  padding: 0.4rem 0.8rem;
  border-bottom: 1px solid var(--border);
  text-transform: uppercase;
  letter-spacing: 1px;
  font-size: 0.7rem;
}
.complexity-table td {
  padding: 0.4rem 0.8rem;
  border-bottom: 1px solid rgba(var(--border-rgb), 0.5);
}
.complexity-table tr:last-child td { border-bottom: none; }

/* ─── Deep Dive Button ─── */
.deep-dive-btn {
  display: block;
  width: 100%;
  background: rgba(var(--accent-rgb), 0.06);
  border: 1px dashed rgba(var(--accent-rgb), 0.3);
  color: var(--accent);
  font-family: var(--font-mono);
  font-size: 0.8rem;
  padding: 0.6rem;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.2s ease;
  margin-top: 1rem;
}
.deep-dive-btn:hover {
  background: rgba(var(--accent-rgb), 0.12);
  border-color: var(--accent);
}

/* ─── Deep Dive (Level 2) ─── */
.algo-deep-dive {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.5s cubic-bezier(0.4, 0, 0.2, 1);
}
.algo-deep-dive-inner {
  padding-top: 1rem;
}
.variation-list, .related-list, .app-list {
  display: grid;
  gap: 0.4rem;
}
.variation-item, .related-item, .app-item {
  font-size: 0.85rem;
  padding: 0.4rem 0.8rem;
  background: rgba(var(--accent-rgb), 0.04);
  border-radius: 6px;
  border-left: 2px solid var(--accent);
}
.related-item { border-left-color: var(--accent3); }
.app-item { border-left-color: var(--accent4); }
.vs-box {
  background: rgba(var(--accent2-rgb), 0.06);
  border-left: 3px solid var(--accent2);
  padding: 0.8rem 1rem;
  border-radius: 0 8px 8px 0;
  font-size: 0.85rem;
  line-height: 1.6;
}
.walkthrough-block {
  background: var(--code-bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem;
  font-family: var(--font-mono);
  font-size: 0.78rem;
  color: var(--text-dim);
  white-space: pre-wrap;
  line-height: 1.6;
}

/* ─── Navigation ─── */
.nav-footer {
  display: flex;
  justify-content: space-between;
  align-items: stretch;
  gap: 1rem;
  margin-top: 3rem;
  padding-top: 2rem;
  border-top: 1px solid var(--border);
}
.nav-btn {
  display: flex;
  flex-direction: column;
  gap: 0.2rem;
  text-decoration: none;
  color: var(--text);
  padding: 0.8rem 1.2rem;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  transition: all 0.3s ease;
  min-width: 0;
}
.nav-btn:hover {
  border-color: var(--accent);
  box-shadow: 0 4px 15px var(--glow);
}
.nav-prev { align-items: flex-start; }
.nav-next { align-items: flex-end; }
.nav-label {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  color: var(--text-dim);
  letter-spacing: 1px;
}
.nav-title {
  font-size: 0.9rem;
  font-weight: 500;
}
.nav-placeholder { flex: 1; }

/* ─── Coming Soon (category page) ─── */
.coming-soon-container {
  text-align: center;
  padding: 4rem 2rem;
}
.coming-soon-msg {

.planned-list {

}
.planned-list li {

  font-size: 0.9rem;

  border-bottom: 1px dashed var(--border);

  gap: 0.5rem;
}
.planned-check {
  width: 16px;
  height: 16px;
  border: 1.5px solid var(--border);
  border-radius: 4px;
  flex-shrink: 0;
}

/* ─── Footer ─── */
.footer {
  text-align: center;
  padding: 3rem 2rem;
  color: var(--text-dim);
  font-size: 0.8rem;
  border-top: 1px solid var(--border);
}

/* ─── Fade-in ─── */
.fade-in {
  opacity: 0;
  transform: translateY(20px);
  transition: opacity 0.6s ease, transform 0.6s ease;
}
.fade-in.visible {
  opacity: 1;
  transform: translateY(0);
}

@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }

/* ─── Responsive ─── */
@media (max-width: 768px) {
  .hero { padding: 4rem 1.5rem 2rem; }

  .algo-oneliner { display: none; }

const categoryMeta = {

const algorithms = [
  {
    "id": "stack-array",
    "name": "Stack (Array-based)",
    "nameZh": "栈（数组实现）",
    "difficulty": "easy",
    "source": "algs4",
    "sourceChapter": "1.3",
    "oneLiner": "LIFO collection backed by a resizing array with amortized O(1) push/pop",
    "oneLinerZh": "基于动态数组的后进先出集合，均摊 O(1) 压栈/弹栈",
    "complexity": {

        "best": "O(1)",

    "problemDefinition": "Implement a last-in-first-out (LIFO) stack that supports push (add to top) and pop (remove from top) operations. Use a resizing array as the underlying storage: double the array when full, halve it when quarter-full, so that each operation takes amortized constant time.",
    "problemDefinitionZh": "实现一个后进先出（LIFO）栈，支持 push（压入栈顶）和 pop（弹出栈顶）操作。使用动态数组作为底层存储：满时扩容为两倍，四分之一满时缩容为一半，使每次操作的均摊时间为常数。",

    "implementation": "class MaxPQ:\n    \"\"\"Max-priority queue using a 1-indexed binary heap.\"\"\"\n\n    def __init__(self):\n        self._pq = [None]  # 1-indexed; pq[0] unused\n        self._n = 0\n\n    def is_empty(self) -> bool:\n        return self._n == 0\n\n    def __len__(self) -> int:\n        return self._n\n\n    def max(self):\n        if self.is_empty():\n            raise IndexError('max from empty priority queue')\n        return self._pq[1]\n\n    def insert(self, key):\n        self._pq.append(key)\n        self._n += 1\n        self._swim(self._n)\n\n    def del_max(self):\n        if self.is_empty():\n            raise IndexError('del_max from empty priority queue')\n        max_val = self._pq[1]\n        self._swap(1, self._n)\n        self._n -= 1\n        self._pq.pop()\n        if self._n > 0:\n            self._sink(1)\n        return max_val\n\n    def _swim(self, k: int):\n        while k > 1 and self._pq[k // 2] < self._pq[k]:\n            self._swap(k // 2, k)\n            k //= 2\n\n    def _sink(self, k: int):\n        while 2 * k <= self._n:\n            j = 2 * k\n            if j < self._n and self._pq[j] < self._pq[j + 1]:\n                j += 1\n            if self._pq[k] >= self._pq[j]:\n                break\n            self._swap(k, j)\n            k = j\n\n    def _swap(self, i: int, j: int):\n        self._pq[i], self._pq[j] = self._pq[j], self._pq[i]",

      "explanation": "A binary heap is a complete binary tree satisfying the heap-order property: each node's key is >= both children's keys (max-heap). Storing the tree in a 1-indexed array, the parent-child relationships become arithmetic: parent(k) = k//2, left(k) = 2k, right(k) = 2k+1. Swim (bottom-up reheapify) repeatedly compares a node with its parent and swaps if the node is larger, moving it toward the root. Sink (top-down reheapify) repeatedly compares a node with its larger child and swaps if the child is larger, moving it toward the leaves. The completeness of the tree guarantees the height is exactly floor(log2 N), bounding both operations at O(log N).",
      "walkthrough": "insert(5): pq=[_, 5], swim: root, done\ninsert(3): pq=[_, 5, 3], swim: 3 < 5, done\ninsert(7): pq=[_, 5, 3, 7], swim: 7 > 5 → swap → pq=[_, 7, 3, 5]\ninsert(1): pq=[_, 7, 3, 5, 1], swim: 1 < 3, done\ninsert(6): pq=[_, 7, 3, 5, 1, 6], swim: 6 > 3 → swap → pq=[_, 7, 6, 5, 1, 3]\n\ndel_max() → 7:\n  swap(1,5): pq=[_, 3, 6, 5, 1, 7] → pop 7 → pq=[_, 3, 6, 5, 1]\n  sink(1): children are 6,5 → larger is 6 → 3 < 6 → swap → pq=[_, 6, 3, 5, 1]\n  sink(2): children are 1 → 3 > 1 → done\n  Result: pq=[_, 6, 3, 5, 1], max is now 6 ✓",
      "variations": [
        "Min-heap — flip comparisons for del_min; used in Dijkstra's algorithm",
        "Index priority queue — associate priorities with integer indices, supports change-priority",
        "D-ary heap — each node has d children; lower height but more comparisons per level",
        "Fibonacci heap — O(1) amortized insert and decrease-key; used in optimal Dijkstra"
      ],
      "relatedProblems": [
        "Kth Largest Element in a Stream (LeetCode 703)",
        "Merge K Sorted Lists (LeetCode 23)",
        "Top K Frequent Elements (LeetCode 347)",
        "Find Median from Data Stream (LeetCode 295)"
      ],
      "realWorldApps": [
        "Operating system process scheduling — highest-priority process runs next",
        "Dijkstra's shortest path in GPS navigation and network routing",
        "Event-driven simulation engines — process events in chronological order",
        "Huffman compression — build optimal prefix-free codes for data compression"
      ],
      "vsAlternatives": "A sorted array gives O(1) find-max and O(N) insert. An unsorted array gives O(1) insert and O(N) find-max. The binary heap balances both at O(log N). For algorithms needing decrease-key (Dijkstra, Prim), an indexed priority queue adds O(log N) decrease-key. Fibonacci heaps improve decrease-key to O(1) amortized but have high constant factors. Python's heapq module provides a min-heap; for a max-heap, negate keys or use a wrapper."
    },
    "complexityRank": 3,
    "defaultOrder": 4
  }
];

const isComingSoon = false;

const plannedAlgorithms = [];

const comingSoonMessage = "";
const comingSoonMessageZh = "";

// ─── Python Syntax Highlighting (lightweight) ─────────────────────────────
function highlightPython(code) {
  // Escape HTML
  let s = code.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  // Comments
  s = s.replace(/(#.*?)$/gm, '<span class="code-comment">$1</span>');
  // Triple-quoted strings
  s = s.replace(/("""[\s\S]*?"""|'''[\s\S]*?''')/g, '<span class="code-string">$1</span>');
  // Strings
  s = s.replace(/("(?:[^"\\]|\\.)*"|'(?:[^'\\]|\\.)*')/g, '<span class="code-string">$1</span>');
  // Keywords
  const kws = ['def','class','return','if','elif','else','for','while','in','not','and','or','is','None','True','False','import','from','as','with','try','except','finally','raise','yield','lambda','pass','break','continue','assert','global','nonlocal'];
  const kwRe = new RegExp('\\b(' + kws.join('|') + ')\\b', 'g');
  s = s.replace(kwRe, '<span class="code-keyword">$1</span>');
  // Built-in functions
  const builtins = ['len','range','print','int','float','str','list','dict','set','tuple','sorted','enumerate','zip','map','filter','isinstance','type','super','min','max','sum','abs','any','all','reversed','iter','next','hash','id','open','input'];
  const biRe = new RegExp('\\b(' + builtins.join('|') + ')(?=\\()', 'g');
  s = s.replace(biRe, '<span class="code-builtin">$1</span>');
  // Function definitions
  s = s.replace(/(?<=def\s+)(\w+)/g, '<span class="code-func">$1</span>');
  // Numbers
  s = s.replace(/\b(\d+\.?\d*)\b/g, '<span class="code-number">$1</span>');
  return s;
}

// ─── Render ─────────────────────────────────────────────────────────────────
const algoListEl = document.getElementById('algoList');
const controlsEl = document.getElementById('controls');
let allExpanded = false;

if (isComingSoon) {
  controlsEl.style.display = 'none';
  algoListEl.innerHTML = `
    <div class="coming-soon-container">
      <div class="coming-soon-msg">${comingSoonMessage}</div>
      <div class="coming-soon-msg-zh">${comingSoonMessageZh}</div>
      <ul class="planned-list">
        ${plannedAlgorithms.map(a => `<li><span class="planned-check"></span>${a}</li>`).join('')}
      </ul>
    </div>`;
} else {
  // Hero stats
  const heroStatsEl = document.getElementById('heroStats');
  const difficulties = [...new Set(algorithms.map(a => a.difficulty))];
  heroStatsEl.innerHTML = `
    <span class="badge badge--time">${algorithms.length} algorithms</span>
    ${difficulties.map(d => `<span class="badge badge--${d}">${d}</span>`).join('')}`;

  // Render algorithm cards
  algorithms.forEach((algo, i) => {
    const card = document.createElement('div');
    card.className = 'algo-card fade-in';
    card.dataset.id = algo.id;
    card.dataset.difficulty = algo.difficulty;
    card.dataset.complexityRank = algo.complexityRank;
    card.dataset.defaultOrder = algo.defaultOrder;
    card.id = algo.id;

    const worstTime = algo.complexity?.time?.worst || '';
    const codeHtml = highlightPython(algo.implementation || '');

    const whenToUseHtml = (algo.whenToUse || []).map(w => `<li>${w}</li>`).join('');

    // Complexity table
    const tc = algo.complexity?.time || {};
    const sc = algo.complexity?.space || '';
    const complexityHtml = `
      <table class="complexity-table">
        <tr><th>Metric</th><th>Best</th><th>Average</th><th>Worst</th></tr>
        <tr><td>Time</td><td>${tc.best || '—'}</td><td>${tc.average || '—'}</td><td>${tc.worst || '—'}</td></tr>
        <tr><td colspan="3">Space</td><td>${sc}</td></tr>
      </table>`;

    // Deep dive
    const dd = algo.deepDive || {};
    const variationsHtml = (dd.variations || []).map(v => `<div class="variation-item">${v}</div>`).join('');
    const relatedHtml = (dd.relatedProblems || []).map(r => `<div class="related-item">${r}</div>`).join('');
    const appsHtml = (dd.realWorldApps || []).map(a => `<div class="app-item">${a}</div>`).join('');

    card.innerHTML = `
      <div class="algo-header" onclick="toggleL1(this)">
        <div class="algo-title-group">
          <div class="algo-name">${algo.name}</div>
          <div class="algo-name-zh">${algo.nameZh}</div>
        </div>
        <div class="algo-oneliner">${algo.oneLiner || ''}</div>
        <div class="algo-badges">
          <span class="badge badge--time">${worstTime}</span>
          <span class="badge badge--${algo.difficulty}">${algo.difficulty}</span>
        </div>
        <span class="algo-chevron">▾</span>
      </div>
      <div class="algo-detail">
        <div class="algo-detail-inner">
          <div class="detail-section">
            <h3>Problem Definition</h3>
            <p>${algo.problemDefinition || ''}</p>
            ${algo.problemDefinitionZh ? `<p style="color:var(--text-dim);font-size:0.85rem;margin-top:0.3rem">${algo.problemDefinitionZh}</p>` : ''}
          </div>
          ${whenToUseHtml ? `<div class="detail-section"><h3>When to Use</h3><ul>${whenToUseHtml}</ul></div>` : ''}
          <div class="detail-section">
            <h3>Key Insight</h3>
            <div class="insight-box">
              ${algo.keyInsight || ''}
              ${algo.keyInsightZh ? `<div class="insight-box-zh">${algo.keyInsightZh}</div>` : ''}
            </div>
          </div>
          <div class="detail-section">
            <h3>Implementation</h3>
            <pre class="code-block">${codeHtml}</pre>
          </div>
          <div class="detail-section">
            <h3>Complexity Analysis</h3>
            ${complexityHtml}
          </div>
          ${dd.explanation ? `
          <button class="deep-dive-btn" onclick="toggleL2(this)">Deep Dive ▾</button>
          <div class="algo-deep-dive">
            <div class="algo-deep-dive-inner">
              <div class="detail-section">
                <h3>Detailed Explanation</h3>
                <p>${dd.explanation}</p>
              </div>
              ${dd.walkthrough ? `<div class="detail-section"><h3>Step-by-Step Walkthrough</h3><div class="walkthrough-block">${dd.walkthrough}</div></div>` : ''}
              ${variationsHtml ? `<div class="detail-section"><h3>Variations & Optimizations</h3><div class="variation-list">${variationsHtml}</div></div>` : ''}
              ${relatedHtml ? `<div class="detail-section"><h3>Related Problems</h3><div class="related-list">${relatedHtml}</div></div>` : ''}
              ${appsHtml ? `<div class="detail-section"><h3>Real-World Applications</h3><div class="app-list">${appsHtml}</div></div>` : ''}
              ${dd.vsAlternatives ? `<div class="detail-section"><h3>Comparison with Alternatives</h3><div class="vs-box">${dd.vsAlternatives}</div></div>` : ''}
            </div>
          </div>` : ''}
        </div>
      </div>`;

    algoListEl.appendChild(card);
  });
}

// ─── Expand / Collapse ────────────────────────────────────────────────────
function toggleL1(headerEl) {
  const card = headerEl.closest('.algo-card');
  const detail = card.querySelector('.algo-detail');
  const isOpen = card.classList.contains('expanded-l1');

  if (isOpen) {
    if (card.classList.contains('expanded-l2')) {
      const btn = card.querySelector('.deep-dive-btn');
      if (btn) toggleL2(btn);
    }
    detail.style.maxHeight = '0';
    card.classList.remove('expanded-l1');
  } else {
    detail.style.maxHeight = detail.scrollHeight + 'px';
    card.classList.add('expanded-l1');
  }
}

function toggleL2(btnEl) {
  const card = btnEl.closest('.algo-card');
  const deepDive = card.querySelector('.algo-deep-dive');
  const detail = card.querySelector('.algo-detail');
  const isOpen = card.classList.contains('expanded-l2');

  if (isOpen) {
    deepDive.style.maxHeight = '0';
    card.classList.remove('expanded-l2');
    btnEl.textContent = 'Deep Dive ▾';
  } else {
    deepDive.style.maxHeight = deepDive.scrollHeight + 'px';
    card.classList.add('expanded-l2');
    btnEl.textContent = 'Deep Dive ▴';
    // Recalculate parent
    setTimeout(() => { detail.style.maxHeight = detail.scrollHeight + 'px'; }, 10);
  }
}

function toggleExpandAll() {
  const btn = document.getElementById('expandAllBtn');
  const cards = document.querySelectorAll('.algo-card');
  allExpanded = !allExpanded;

  cards.forEach(card => {
    if (card.style.display === 'none') return;
    const detail = card.querySelector('.algo-detail');
    if (allExpanded) {
      detail.style.maxHeight = detail.scrollHeight + 'px';
      card.classList.add('expanded-l1');
    } else {
      if (card.classList.contains('expanded-l2')) {
        const ddBtn = card.querySelector('.deep-dive-btn');
        if (ddBtn) toggleL2(ddBtn);
      }
      detail.style.maxHeight = '0';
      card.classList.remove('expanded-l1');
    }
  });
  btn.textContent = allExpanded ? 'Collapse All' : 'Expand All';
}

// ─── Sort / Filter ────────────────────────────────────────────────────────
function sortBy(mode, btnEl) {
  document.querySelectorAll('[data-sort]').forEach(b => b.classList.remove('active'));
  btnEl.classList.add('active');

  const list = document.getElementById('algoList');
  const cards = Array.from(list.querySelectorAll('.algo-card'));
  const diffOrder = { easy: 0, medium: 1, hard: 2 };

  cards.sort((a, b) => {
    if (mode === 'difficulty') return (diffOrder[a.dataset.difficulty] || 0) - (diffOrder[b.dataset.difficulty] || 0);
    if (mode === 'complexity') return parseInt(a.dataset.complexityRank) - parseInt(b.dataset.complexityRank);
    return parseInt(a.dataset.defaultOrder) - parseInt(b.dataset.defaultOrder);
  });
  cards.forEach(c => list.appendChild(c));
}

function filterBy(difficulty, btnEl) {
  document.querySelectorAll('[data-filter]').forEach(b => b.classList.remove('active'));
  btnEl.classList.add('active');

  document.querySelectorAll('.algo-card').forEach(card => {
    card.style.display = (difficulty === 'all' || card.dataset.difficulty === difficulty) ? '' : 'none';
  });
}

// ─── Progress Bar ─────────────────────────────────────────────────────────
window.addEventListener('scroll', () => {
  const h = document.documentElement;
  const pct = (h.scrollTop / (h.scrollHeight - h.clientHeight)) * 100;
  document.getElementById('progressBar').style.width = Math.min(pct, 100) + '%';
  document.getElementById('fixedNav').classList.toggle('scrolled', window.scrollY > 50);
});

// ─── Fade-in Observer ─────────────────────────────────────────────────────
const observer = new IntersectionObserver(entries => {
  entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); } });
}, { threshold: 0.05 });
document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));

// ─── URL Hash Support ─────────────────────────────────────────────────────
function handleHash() {
  const hash = window.location.hash.slice(1);
  if (!hash) return;
  const card = document.getElementById(hash);
  if (!card) return;
  setTimeout(() => {
    card.scrollIntoView({ behavior: 'smooth', block: 'center' });
    const header = card.querySelector('.algo-header');
    if (header && !card.classList.contains('expanded-l1')) toggleL1(header);
  }, 300);
}
window.addEventListener('hashchange', handleHash);
handleHash();
</script>

<style>
.theme-toggle {
  margin-left: auto;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--card);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.9rem;
  transition: all 0.3s;
  opacity: 0.7;
  padding: 0;
  line-height: 1;
  flex-shrink: 0;
}
.theme-toggle:hover {
  opacity: 1;
  transform: scale(1.1);
  border-color: var(--accent);
  box-shadow: 0 0 12px var(--glow);
}
</style>
<script>
(function() {
  var KEY = 'hyperion-theme';
  var toggle = document.getElementById('themeToggle');
  var icon = document.getElementById('themeIcon');

  function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    icon.textContent = theme === 'light' ? '\u{1F319}' : '\u{2600}\u{FE0F}';
    localStorage.setItem(KEY, theme);
    window.dispatchEvent(new CustomEvent('themechange', { detail: { theme: theme } }));
  }

  var saved = localStorage.getItem(KEY);
  if (saved) {
    applyTheme(saved);
  } else {
    icon.textContent = '\u{2600}\u{FE0F}';
  }

  toggle.addEventListener('click', function() {
    var current = document.documentElement.getAttribute('data-theme');
    applyTheme(current === 'light' ? 'dark' : 'light');
  });

  // Utility for canvas code: read theme-aware CSS var values
  window.getThemeRGB = function(varName) {
    return getComputedStyle(document.documentElement).getPropertyValue(varName).trim();
  };
})();
</script>
